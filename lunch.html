<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>午餐吃什麼？</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft JhengHei", sans-serif;
        }

        body {
            background-color: #fff5e6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        h1 {
            color: #ff7a00;
            margin-bottom: 10px;
        }

        .result {
            font-size: 28px;
            font-weight: bold;
            color: #333;
            margin: 25px 0;
            min-height: 40px;
            padding: 10px;
            background: #fff0e0;
            border-radius: 10px;
        }

        .btn {
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            background: #ff7a00;
            color: white;
            cursor: pointer;
            margin: 5px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #e66a00;
        }

        .input-area {
            margin: 20px 0;
            display: flex;
            gap: 8px;
        }

        input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }

        .food-list {
            text-align: left;
            margin-top: 20px;
        }

        .food-item {
            padding: 8px 12px;
            background: #f8f8f8;
            margin: 5px 0;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
        }

        .delete-btn {
            color: #ff4444;
            background: none;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍚 午餐吃什麼？</h1>
        <p>幫你解決選擇困難</p>

        <div class="result" id="result">點按鈕開始抽選</div>

        <button class="btn" id="randomBtn">開始抽選</button>
        <button class="btn" id="resetBtn">重置清單</button>

        <div class="input-area">
            <input type="text" id="foodInput" placeholder="輸入午餐選項...">
            <button class="btn" id="addBtn">新增</button>
        </div>

        <div class="food-list" id="foodList"></div>
    </div>

    <script>
        // 預設午餐清單
        let foods = JSON.parse(localStorage.getItem('lunchFoods')) || [
            "便當", "麵食", "火鍋", "壽司", "義大利麵",
            "炸雞", "滷味", "粥品", "披薩", "拉麵"
        ];

        const resultEl = document.getElementById('result');
        const randomBtn = document.getElementById('randomBtn');
        const addBtn = document.getElementById('addBtn');
        const resetBtn = document.getElementById('resetBtn');
        const foodInput = document.getElementById('foodInput');
        const foodListEl = document.getElementById('foodList');

        // 渲染清單
        function renderList() {
            foodListEl.innerHTML = '';
            foods.forEach((food, index) => {
                const div = document.createElement('div');
                div.className = 'food-item';
                div.innerHTML = `
                    <span>${food}</span>
                    <button class="delete-btn" onclick="deleteFood(${index})">✕</button>
                `;
                foodListEl.appendChild(div);
            });
            saveData();
        }

        // 隨機選擇
        randomBtn.addEventListener('click', () => {
            if (foods.length === 0) {
                resultEl.textContent = '請先新增午餐選項！';
                return;
            }
            const random = Math.floor(Math.random() * foods.length);
            resultEl.textContent = foods[random];
        });

        // 新增選項
        addBtn.addEventListener('click', () => {
            const food = foodInput.value.trim();
            if (food && !foods.includes(food)) {
                foods.push(food);
                foodInput.value = '';
                renderList();
            }
        });

        // 刪除選項
        window.deleteFood = function(index) {
            foods.splice(index, 1);
            renderList();
        }

        // 重置清單
        resetBtn.addEventListener('click', () => {
            if (confirm('確定要重置所有選項嗎？')) {
                foods = ["便當", "麵食", "火鍋", "壽司", "義大利麵","炸雞", "滷味", "粥品", "披薩", "拉麵"];
                renderList();
            }
        });

        // 儲存到本地
        function saveData() {
            localStorage.setItem('lunchFoods', JSON.stringify(foods));
        }

        // 初始化
        renderList();
    </script>
</body>
</html>
