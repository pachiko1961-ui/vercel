<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>報價管理系統</title>
  <!-- 正確載入 supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>.modal-lg{max-width:900px;}</style>
</head>
<body>

<div id="loginPanel" class="d-flex vh-100 align-items-center justify-content-center">
  <div class="card p-4 shadow-sm" style="width:400px">
    <h3 class="text-center mb-3">🔐 系統登入</h3>
    <div id="loginForm">
      <input class="form-control mb-2" id="email" placeholder="電子信箱" type="email">
      <input class="form-control mb-2" id="password" placeholder="密碼" type="password">
      <button class="btn btn-primary w-100 mb-2" onclick="login()">登入</button>
      <button class="btn btn-outline-secondary w-100" onclick="showRegister()">註冊</button>
    </div>
  </div>
</div>

<div id="mainPanel" class="container py-3 d-none">
  <div class="d-flex justify-content-between mb-2">
    <h4>📋 報價管理系統</h4>
    <div>
      <span id="userEmail" class="me-2"></span>
      <button class="btn btn-sm btn-danger" onclick="logout()">登出</button>
    </div>
  </div>

  <ul class="nav-tabs mb-3 nav">
    <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#cust">客戶</a></li>
    <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#supp">廠商</a></li>
    <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#prod">商品</a></li>
    <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#quote">報價單</a></li>
  </ul>

  <div class="tab-content">
    <div id="cust" class="tab-pane fade show active">
      <div class="d-flex justify-content-between mb-2"><h5>客戶管理</h5><button class="btn btn-sm btn-primary" onclick="openCustomer()">新增</button></div>
      <input class="form-control mb-2" placeholder="搜尋" oninput="loadCustomers()">
      <table class="table table-bordered table-sm"><thead><tr><th>名稱</th><th>聯絡人</th><th>電話</th><th>操作</th></tr></thead><tbody id="custList"></tbody></table>
    </div>

    <div id="supp" class="tab-pane fade">
      <div class="d-flex justify-content-between mb-2"><h5>廠商管理</h5><button class="btn btn-sm btn-primary" onclick="openSupplier()">新增</button></div>
      <input class="form-control mb-2" placeholder="搜尋" oninput="loadSuppliers()">
      <table class="table table-bordered table-sm"><thead><tr><th>名稱</th><th>聯絡人</th><th>電話</th><th>操作</th></tr></thead><tbody id="suppList"></tbody></table>
    </div>

    <div id="prod" class="tab-pane fade">
      <div class="d-flex justify-content-between mb-2"><h5>商品管理</h5><button class="btn btn-sm btn-primary" onclick="openProduct()">新增</button></div>
      <input class="form-control mb-2" placeholder="搜尋" oninput="loadProducts()">
      <table class="table table-bordered table-sm"><thead><tr><th>代號</th><th>名稱</th><th>單位</th><th>售價</th><th>操作</th></tr></thead><tbody id="prodList"></tbody></table>
    </div>

    <div id="quote" class="tab-pane fade">
      <div class="d-flex justify-content-between mb-2">
        <h5>報價單管理</h5>
        <div>
          <button class="btn btn-sm btn-primary me-2" onclick="openProductHistory()">商品歷史報價查詢</button>
          <button class="btn btn-sm btn-success" onclick="openQuote()">新增報價單</button>
        </div>
      </div>
      <input class="form-control mb-2" placeholder="搜尋：單號/客戶/商品/狀態" oninput="loadQuotes()">
      <table class="table table-bordered table-sm">
        <thead>
          <tr>
            <th>報價單號</th>
            <th>客戶</th>
            <th>商品內容</th>
            <th>狀態</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="quoteList"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal fade" id="modal"><div class="modal-dialog" id="mdSize"><div class="modal-content" id="mdBody"></div></div></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ===================== 請填入你的 SUPABASE 資訊 =====================
const SUPABASE_URL = "https://kqxwjzabeeexqmqjsont.supabase.co";
const SUPABASE_KEY = "sb_publishable_P4N84KRlgvy1n7tn7KPeVw_rNX4Igwm";
// ==================================================================

// ✅ 修正：使用正確 UMD 套件名稱
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const modal = new bootstrap.Modal(document.getElementById('modal'));
let user = null;

window.onload = checkAuth;
async function checkAuth() {
  const { data } = await sb.auth.getUser();
  if (data.user) {
    user = data.user;
    loginPanel.classList.add('d-none');
    mainPanel.classList.remove('d-none');
    userEmail.textContent = user.email;
    loadAll();
  }
}

async function login() {
  const { error } = await sb.auth.signInWithPassword({ email: email.value, password: password.value });
  if (error) alert("登入錯誤："+error.message); else location.reload();
}
async function logout() { await sb.auth.signOut(); location.reload(); }

function showRegister() {
  loginForm.innerHTML = `
    <h5>註冊帳號</h5>
    <input class="form-control mb-2" id="rEmail" type="email" placeholder="信箱">
    <input class="form-control mb-2" id="rPassword" type="password" placeholder="密碼至少6碼">
    <button class="btn btn-success w-100 mb-2" onclick="register()">註冊</button>
    <button class="btn w-100 btn-sm" onclick="location.reload()">返回</button>
  `;
}
async function register() {
  const e = rEmail.value.trim(); const p = rPassword.value.trim();
  if (!e || !p) { alert("請輸入信箱與密碼"); return; }
  if (p.length < 6) { alert("密碼至少6碼"); return; }
  const { error } = await sb.auth.signUp({ email: e, password: p });
  if (error) alert("註冊失敗："+error.message); else alert("註冊成功！請登入");
}

function show(html, lg=false) { mdSize.className = lg ? "modal-dialog modal-lg" : "modal-dialog"; mdBody.innerHTML = html; modal.show(); }
function closeModal() { modal.hide(); }
function money(v) { return Number(v||0).toLocaleString(); }
function uid() { return user.id; }

// 報價單號
async function quoteNo() {
  const now = new Date();
  const y = now.getFullYear().toString().slice(2);
  const m = String(now.getMonth()+1).padStart(2,'0');
  const d = String(now.getDate()).padStart(2,'0');
  const dc = y+m+d;
  const { data } = await sb.from("quotations").select("quote_no").like("quote_no",`Q${dc}%`).order("quote_no",{ascending:false}).limit(1);
  let seq=1; if(data && data.length>0) seq=parseInt(data[0].quote_no.slice(-2))+1;
  return `Q${dc}${String(seq).padStart(2,'0')}`;
}

// 客戶
async function loadCustomers(){
  const kw=document.querySelector("#cust input").value;
  const {data}=await sb.from("customers").select("*").ilike("name",`%${kw}%`).order("created_at",{ascending:false});
  let h=""; if(data) data.forEach(i=>h+=`<tr><td>${i.name}</td><td>${i.contact_person||"-"}</td><td>${i.phone||"-"}</td><td><button class='btn btn-sm btn-warning' onclick='editCustomer("${i.id}")'>編</button><button class='btn btn-sm btn-danger' onclick='delCustomer("${i.id}")'>刪</button></td></tr>`);
  custList.innerHTML=h;
}
function openCustomer(id){
  show(`<div class="modal-header"><h5>${id?"編輯":"新增"}客戶</h5><button class="btn-close" onclick="closeModal()"></button></div>
  <div class="modal-body"><input class="form-control mb-2" id="c_name" placeholder="名稱"><input class="form-control mb-2" id="c_contact" placeholder="聯絡人"><input class="form-control mb-2" id="c_phone" placeholder="電話"><textarea class="form-control" id="c_addr" placeholder="地址"></textarea></div>
  <div class="modal-footer"><button class="btn btn-primary" onclick="${id?`updateCustomer('${id}')`:'saveCustomer()'}">儲存</button></div>`);
  if(id)sb.from("customers").select("*").eq("id",id).single().then(r=>{c_name.value=r.data.name; c_contact.value=r.data.contact_person||""; c_phone.value=r.data.phone||""; c_addr.value=r.data.address||"";});
}
async function saveCustomer(){await sb.from("customers").insert([{name:c_name.value,contact_person:c_contact.value,phone:c_phone.value,address:c_addr.value,user_id:uid()}]);closeModal();loadCustomers();}
async function updateCustomer(id){await sb.from("customers").update({name:c_name.value,contact_person:c_contact.value,phone:c_phone.value,address:c_addr.value}).eq("id",id);closeModal();loadCustomers();}
async function delCustomer(id){if(confirm("確定刪除?")){await sb.from("customers").delete().eq("id",id);loadCustomers();}}

// 廠商
async function loadSuppliers(){
  const kw=document.querySelector("#supp input").value;
  const {data}=await sb.from("suppliers").select("*").ilike("name",`%${kw}%`).order("created_at",{ascending:false});
  let h=""; if(data) data.forEach(i=>h+=`<tr><td>${i.name}</td><td>${i.contact_person||"-"}</td><td>${i.phone||"-"}</td><td><button class='btn btn-sm btn-warning' onclick='editSupplier("${i.id}")'>編</button><button class='btn btn-sm btn-danger' onclick='delSupplier("${i.id}")'>刪</button></td></tr>`);
  suppList.innerHTML=h;
}
function openSupplier(id){
  show(`<div class="modal-header"><h5>${id?"編輯":"新增"}廠商</h5><button class="btn-close" onclick="closeModal()"></button></div>
  <div class="modal-body"><input class="form-control mb-2" id="s_name" placeholder="名稱"><input class="form-control mb-2" id="s_contact" placeholder="聯絡人"><input class="form-control mb-2" id="s_phone" placeholder="電話"><textarea class="form-control" id="s_addr" placeholder="地址"></textarea></div>
  <div class="modal-footer"><button class="btn btn-primary" onclick="${id?`updateSupplier('${id}')`:'saveSupplier()'}">儲存</button></div>`);
  if(id)sb.from("suppliers").select("*").eq("id",id).single().then(r=>{s_name.value=r.data.name; s_contact.value=r.data.contact_person||""; s_phone.value=r.data.phone||""; s_addr.value=r.data.address||"";});
}
async function saveSupplier(){await sb.from("suppliers").insert([{name:s_name.value,contact_person:s_contact.value,phone:s_phone.value,address:s_addr.value,user_id:uid()}]);closeModal();loadSuppliers();}
async function updateSupplier(id){await sb.from("suppliers").update({name:s_name.value,contact_person:s_contact.value,phone:s_phone.value,address:s_addr.value}).eq("id",id);closeModal();loadSuppliers();}
async function delSupplier(id){if(confirm("確定刪除?")){await sb.from("suppliers").delete().eq("id",id);loadSuppliers();}}

// 商品
async function loadProducts(){
  const kw=document.querySelector("#prod input").value;
  const {data}=await sb.from("products").select("*").or(`product_code.ilike.%${kw}%,product_name.ilike.%${kw}%`).order("created_at",{ascending:false});
  let h=""; if(data) data.forEach(i=>h+=`<tr><td>${i.product_code}</td><td>${i.product_name}</td><td>${i.unit}</td><td>${money(i.sale_price)}</td><td><button class='btn btn-sm btn-warning' onclick='editProduct("${i.id}")'>編</button><button class='btn btn-sm btn-danger' onclick='delProduct("${i.id}")'>刪</button></td></tr>`);
  prodList.innerHTML=h;
}
function openProduct(id){
  show(`<div class="modal-header"><h5>${id?"編輯":"新增"}商品</h5><button class="btn-close" onclick="closeModal()"></button></div>
  <div class="modal-body"><input class="form-control mb-2" id="p_code" placeholder="商品代號"><input class="form-control mb-2" id="p_name" placeholder="名稱"><input class="form-control mb-2" id="p_unit" placeholder="單位"><input class="form-control mb-2" id="p_price" type="number" placeholder="售價"><textarea class="form-control" id="p_remark" placeholder="備註"></textarea></div>
  <div class="modal-footer"><button class="btn btn-primary" onclick="${id?`updateProduct('${id}')`:'saveProduct()'}">儲存</button></div>`);
  if(id)sb.from("products").select("*").eq("id",id).single().then(r=>{p_code.value=r.data.product_code; p_name.value=r.data.product_name; p_unit.value=r.data.unit; p_price.value=r.data.sale_price; p_remark.value=r.data.remark||"";});
}
async function saveProduct(){await sb.from("products").insert([{product_code:p_code.value,product_name:p_name.value,unit:p_unit.value,sale_price:parseFloat(p_price.value),remark:p_remark.value,user_id:uid()}]);closeModal();loadProducts();}
async function updateProduct(id){await sb.from("products").update({product_code:p_code.value,product_name:p_name.value,unit:p_unit.value,sale_price:parseFloat(p_price.value),remark:p_remark.value}).eq("id",id);closeModal();loadProducts();}
async function delProduct(id){if(confirm("確定刪除?")){await sb.from("products").delete().eq("id",id);loadProducts();}}

// 報價單列表
async function loadQuotes() {
  const kw = document.querySelector("#quote input").value.trim().toLowerCase();
  const { data: quotes, error } = await sb.from("quotations").select("*").order("created_at", { ascending: false });

  if (error || !quotes) { quoteList.innerHTML = "<tr><td colspan='5' class='text-center'>載入失敗</td></tr>"; return; }

  let rows = [];
  for (const q of quotes) {
    const { data: items } = await sb.from("quotation_items").select("product_name").eq("quotation_id", q.id);
    const { data: cu } = await sb.from("customers").select("name").eq("id", q.customer_id);

    const custName = (cu?.[0]?.name || "").toLowerCase();
    let productText = items?.length ? items.map(i => i.product_name).join("、") : "無商品";
    const match = !kw || q.quote_no.includes(kw) || custName.includes(kw) || productText.toLowerCase().includes(kw) || (q.status||"").toLowerCase().includes(kw);

    if (match) {
      rows.push(`<tr>
        <td>${q.quote_no}</td>
        <td>${cu?.[0]?.name || "-"}</td>
        <td>${productText.length>25 ? productText.substring(0,25)+"..." : productText}</td>
        <td>${q.status || "待確認"}</td>
        <td>
          <button class='btn btn-sm btn-info' onclick='viewQuote("${q.id}")'>檢</button>
          <button class='btn btn-sm btn-warning' onclick='editQuote("${q.id}")'>編</button>
          <button class='btn btn-sm btn-danger' onclick='delQuote("${q.id}")'>刪</button>
        </td>
      </tr>`);
    }
  }
  quoteList.innerHTML = rows.join("") || "<tr><td colspan='5' class='text-center'>無資料</td></tr>";
}

// 編輯報價單
async function editQuote(id){
  const {data:q} = await sb.from("quotations").select("*").eq("id",id).single();
  const {data:c}=await sb.from("customers").select("id,name");
  const {data:s}=await sb.from("suppliers").select("id,name");
  const {data:items}=await sb.from("quotation_items").select("*").eq("quotation_id",id);
  
  let itemRows = "";
  if(items && items.length>0) items.forEach((item,i)=>{
    itemRows+=`<tr><td>NO.${i+1}</td><td>${item.product_name}</td><td class="text-end">${item.quantity}</td><td>${item.unit||"-"}</td><td class="text-end">${money(item.unit_price)}</td><td class="text-end">${money(item.subtotal)}</td></tr>`;
  });

  show(`<div class="modal-header"><h5>編輯報價單</h5><button class="btn-close" onclick="closeModal()"></button></div>
  <div class="modal-body">
    <div class="row mb-2">
      <div class="col-4"><input class="form-control" id="q_no" value="${q.quote_no}" readonly></div>
      <div class="col-4"><input type="date" class="form-control" id="q_date" value="${q.quote_date}"></div>
      <div class="col-4"><select class="form-control" id="q_status"><option ${q.status=="待確認"?"selected":""}>待確認</option><option ${q.status=="已成交"?"selected":""}>已成交</option><option ${q.status=="已取消"?"selected":""}>已取消</option></select></div>
    </div>
    <div class="row mb-2">
      <div class="col-6"><select class="form-control" id="q_cust">${c.map(x=>`<option value="${x.id}" ${x.id==q.customer_id?"selected":""}>${x.name}</option>`).join('')}</select></div>
      <div class="col-6"><select class="form-control" id="q_supp">${s.map(x=>`<option value="${x.id}" ${x.id==q.supplier_id?"selected":""}>${x.name}</option>`).join('')}</select></div>
    </div>
    <table class="table table-sm table-bordered"><thead><tr><th>編號</th><th>商品名稱</th><th class="text-end">數量</th><th>單位</th><th class="text-end">單價</th><th class="text-end">小計</th></tr></thead><tbody>${itemRows}</tbody></table>
    <div class="text-end mt-2"><h5>總金額：${money(q.total_amount)}</h5></div>
  </div>
  <div class="modal-footer"><button class="btn btn-primary" onclick="updateQuote('${id}')">儲存</button></div>`,true);
}
async function updateQuote(id){await sb.from("quotations").update({quote_date:q_date.value,customer_id:q_cust.value,supplier_id:q_supp.value,status:q_status.value}).eq("id",id);alert("儲存成功！");closeModal();loadQuotes();}

// 新增報價單
let items=[];
async function openQuote(){
  items=[]; // 重置商品列表
  const newQNo = await quoteNo();
  // 獲取客戶、廠商、商品列表（增加錯誤處理）
  const [cRes, sRes, pRes] = await Promise.all([
    sb.from("customers").select("id,name"),
    sb.from("suppliers").select("id,name"),
    sb.from("products").select("*")
  ]);
  
  const c = cRes.data || [];
  const s = sRes.data || [];
  const p = pRes.data || [];

  // ✅ 修正1：商品下拉框空值處理
  let productOptions = '<option value="">選擇商品</option>';
  if(p.length > 0){
    productOptions += p.map(x=>`<option data-price="${x.sale_price}" data-unit="${x.unit}" value="${x.product_name}">${x.product_name}</option>`).join('');
  } else {
    productOptions += '<option value="" disabled>暂无商品，請先新增商品</option>';
  }

  // ✅ 修正2：客戶/廠商下拉框空值處理
  let customerOptions = c.length > 0 ? c.map(x=>`<option value="${x.id}">${x.name}</option>`).join('') : '<option value="" disabled>暂无客戶，請先新增客戶</option>';
  let supplierOptions = s.length > 0 ? s.map(x=>`<option value="${x.id}">${x.name}</option>`).join('') : '<option value="" disabled>暂无廠商，請先新增廠商</option>';
  
  show(`<div class="modal-header"><h5>新增報價單</h5><button class="btn-close" onclick="closeModal()"></button></div>
  <div class="modal-body">
    <div class="row mb-2">
      <div class="col-4"><input class="form-control" id="q_no" value="${newQNo}" readonly></div>
      <div class="col-4"><input type="date" class="form-control" id="q_date" value="${new Date().toISOString().split('T')[0]}"></div>
      <div class="col-4"><select class="form-control" id="q_status"><option selected>待確認</option><option>已成交</option><option>已取消</option></select></div>
    </div>
    <div class="row mb-2">
      <div class="col-6"><select class="form-control" id="q_cust">${customerOptions}</select></div>
      <div class="col-6"><select class="form-control" id="q_supp">${supplierOptions}</select></div>
    </div>
    <select class="form-control mb-2" onchange="fillProduct()" id="q_prod">${productOptions}</select>
    <div class="input-group mb-2">
      <input class="form-control" id="i_name" placeholder="商品" readonly>
      <input class="form-control" id="i_qty" type="number" value="1" placeholder="數量" min="1">
      <input class="form-control" id="i_unit" placeholder="單位" readonly>
      <input class="form-control" id="i_price" type="number" placeholder="單價" min="0">
      <button class="btn btn-primary" onclick="addItem()">加入</button>
    </div>
    <table class="table table-sm table-bordered"><thead><tr><th>編號</th><th>商品名稱</th><th class="text-end">數量</th><th>單位</th><th class="text-end">單價</th><th class="text-end">小計</th><th></th></tr></thead><tbody id="itemList"></tbody></table>
    <div class="text-end mt-2"><h5>總金額：<span id="total">0</span></h5></div>
  </div>
  <div class="modal-footer"><button class="btn btn-success" onclick="saveQuote()" ${c.length===0 || s.length===0 || p.length===0 ? 'disabled' : ''}>儲存</button></div>`,true);
  
  // ✅ 修正3：確保DOM渲染完成後執行渲染
  setTimeout(() => {
    renderItems();
  }, 100);
}

// ✅ 修正4：商品選擇填充邏輯增強
function fillProduct(){
  const prodSelect = document.getElementById('q_prod');
  const opt = prodSelect.options[prodSelect.selectedIndex];
  if(opt && opt.value){
    document.getElementById('i_name').value = opt.value;
    document.getElementById('i_price').value = opt.dataset.price || '';
    document.getElementById('i_unit').value = opt.dataset.unit || '';
  } else {
    // 清空輸入框
    document.getElementById('i_name').value = '';
    document.getElementById('i_price').value = '';
    document.getElementById('i_unit').value = '';
  }
}

// ✅ 修正5：加入商品邏輯增強
function addItem(){
  const i_name = document.getElementById('i_name');
  const i_qty = document.getElementById('i_qty');
  const i_unit = document.getElementById('i_unit');
  const i_price = document.getElementById('i_price');
  
  const name = i_name.value.trim();
  const qty = parseInt(i_qty.value);
  const unit = i_unit.value.trim();
  const price = parseFloat(i_price.value);
  
  if(!name){
    alert("請先選擇商品");
    return;
  }
  if(isNaN(qty) || qty < 1){
    alert("數量必須是大於0的數字");
    i_qty.value = 1;
    return;
  }
  if(isNaN(price) || price < 0){
    alert("單價必須是大於等於0的數字");
    return;
  }
  
  items.push({
    name: name,
    unit: unit,
    qty: qty,
    price: price,
    sub: qty * price
  });
  
  // 清空輸入框並重置選擇
  i_name.value = "";
  i_qty.value = 1;
  i_unit.value = "";
  i_price.value = "";
  document.getElementById('q_prod').selectedIndex = 0;
  
  // 重新渲染商品列表
  renderItems();
}

// ✅ 修正6：商品列表渲染函數增強
function renderItems(){
  const itemList = document.getElementById('itemList');
  const totalEl = document.getElementById('total');
  
  if(!itemList || !totalEl) return;
  
  let h="", t=0;
  if(items.length > 0){
    items.forEach((it,i)=>{
      t += it.sub;
      h += `<tr>
        <td>NO.${i+1}</td>
        <td>${it.name}</td>
        <td class="text-end">${it.qty}</td>
        <td>${it.unit||"-"}</td>
        <td class="text-end">${money(it.price)}</td>
        <td class="text-end">${money(it.sub)}</td>
        <td><button class="btn btn-sm btn-danger" onclick="delItem(${i})">刪</button></td>
      </tr>`;
    });
  } else {
    h = `<tr><td colspan="7" class="text-center text-muted">尚未加入商品</td></tr>`;
  }
  
  itemList.innerHTML = h;
  totalEl.innerText = money(t);
}

// ✅ 修正7：刪除商品函數增強
function delItem(i){
  if(confirm("確定刪除此商品?")){
    items.splice(i,1);
    renderItems();
  }
}

// 儲存報價單
async function saveQuote(){
  if(items.length===0){
    alert("請加入商品");
    return;
  }
  
  // 驗證必填欄位
  const q_cust = document.getElementById('q_cust');
  const q_supp = document.getElementById('q_supp');
  if(!q_cust.value){
    alert("請選擇客戶");
    return;
  }
  if(!q_supp.value){
    alert("請選擇廠商");
    return;
  }
  
  const total = items.reduce((sum, it) => sum + it.sub, 0);
  
  const { data: quote, error } = await sb.from("quotations").insert([{
    quote_no: document.getElementById('q_no').value,
    customer_id: q_cust.value,
    supplier_id: q_supp.value,
    quote_date: document.getElementById('q_date').value,
    status: document.getElementById('q_status').value,
    total_amount: total,
    user_id: uid()
  }]).select();
  
  if (error || !quote) { 
    console.error(error); 
    alert("報價單儲存失敗：" + (error?.message || '未知錯誤')); 
    return; 
  }

  const quoteItems = items.map(it => ({
  quotation_id: quote[0].id,
  product_name: it.name,
  unit: it.unit || "-", // 賦默認值，避免空值
  quantity: parseInt(it.qty),
  unit_price: parseFloat(it.price),
  subtotal: parseFloat(it.sub),
  user_id: uid()
}));

  const { error: itemError } = await sb.from("quotation_items").insert(quoteItems);
  
  if (itemError) { 
    console.error(itemError); 
    alert("商品明細儲存失敗：" + (itemError?.message || '未知錯誤')); 
    return; 
  }

  alert("儲存成功！");
  closeModal();
  loadQuotes();
}

// 檢視報價單
async function viewQuote(id){
  const {data:q}=await sb.from("quotations").select("*").eq("id",id).single();
  const {data:i}=await sb.from("quotation_items").select("*").eq("quotation_id",id);
  const {data:cu}=await sb.from("customers").select("name").eq("id",q.customer_id);
  const {data:su}=await sb.from("suppliers").select("name").eq("id",q.supplier_id);
  show(`<div class="modal-header"><h5>檢視報價單</h5><button class="btn-close" onclick="closeModal()"></button></div>
  <div class="modal-body"><p>客戶：${cu?.[0]?.name||"-"} / 廠商：${su?.[0]?.name||"-"} / 狀態：${q.status}</p>
  <table class="table table-sm"><tr><th>商品</th><th>數量</th><th>單位</th><th>單價</th><th>小計</th></tr>${i.map(x=>`<tr><td>${x.product_name}</td><td class="text-end">${x.quantity}</td><td>${x.unit}</td><td class="text-end">${money(x.unit_price)}</td><td class="text-end">${money(x.subtotal)}</td></tr>`).join('')}</table>
  <div class="text-end">總金額：${money(q.total_amount)}</div></div>`,true);
}
async function delQuote(id){if(confirm("確定刪除?")){await sb.from("quotation_items").delete().eq("quotation_id",id);await sb.from("quotations").delete().eq("id",id);loadQuotes();}}

// 商品歷史查詢
function openProductHistory(){show(`<div class="modal-header"><h5>📊 商品歷史報價查詢</h5><button class="btn-close" onclick="closeModal()"></button></div><div class="modal-body p-3"><div class="input-group mb-3"><input type="text" id="searchProduct" class="form-control" placeholder="輸入商品名稱"><button class="btn btn-primary" onclick="loadProductHistory()">查詢</button></div><div style="max-height:400px;overflow-y:auto"><table class="table table-sm table-bordered"><thead class="table-light"><tr><th>報價日期</th><th>客戶</th><th>商品</th><th>數量</th><th>單位</th><th>單價</th><th>小計</th><th>單號</th></tr></thead><tbody id="historyBody"></tbody></table></div></div>`,true);}
async function loadProductHistory(){const k=document.getElementById("searchProduct").value.trim();if(!k){alert("請輸入商品名稱");return;}const {data:items}=await sb.from("quotation_items").select(`product_name,unit,unit_price,quantity,subtotal,quotations(quote_no,quote_date,customer_id)`).ilike("product_name",`%${k}%`);const b=document.getElementById("historyBody");b.innerHTML="<tr><td colspan='8'>查詢中...</td></tr>";let h="";for(const it of items||[]){const q=it.quotations;const {data:c}=await sb.from("customers").select("name").eq("id",q.customer_id);h+=`<tr><td>${q.quote_date}</td><td>${c?.[0]?.name||"-"}</td><td>${it.product_name}</td><td class="text-end">${it.quantity}</td><td>${it.unit||"-"}</td><td class="text-end">${money(it.unit_price)}</td><td class="text-end">${money(it.subtotal)}</td><td>${q.quote_no}</td></tr>`;}b.innerHTML=h||"<tr><td colspan='8' class='text-center'>無資料</td></tr>";}

function loadAll(){loadCustomers();loadSuppliers();loadProducts();loadQuotes();}
</script>
