<!DOCTYPE html>
<html lang="zh-TW">
<head>

  <title>報價管理系統</title>

<body>

<div id="loginPanel" class="d-flex vh-100 align-items-center justify-content-center">

    <h3 class="text-center mb-3">🔐 系統登入</h3>
    <div id="loginForm">
      <input class="form-control mb-2" id="email" placeholder="電子信箱" type="email">
      <input class="form-control mb-2" id="password" placeholder="密碼" type="password">
      <button class="btn btn-primary w-100 mb-2" onclick="login()">登入</button>
      <button class="btn btn-outline-secondary w-100" onclick="showRegister()">註冊</button>
    </div>
  </div>
</div>

<div id="mainPanel" class="container py-3 d-none">
  <div class="d-flex justify-content-between mb-2">
    <h4>📋 報價管理系統</h4>
    <div>
      <span id="userEmail" class="me-2"></span>
      <button class="btn btn-sm btn-danger" onclick="logout()">登出</button>
    </div>
  </div>

  <ul class="nav-tabs mb-3 nav">
    <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#cust">客戶</a></li>

  <div class="tab-content">
    <div id="cust" class="tab-pane fade show active">
      <div class="d-flex justify-content-between mb-2"><h5>客戶管理</h5><button class="btn btn-sm btn-primary" onclick="openCustomer()">新增</button></div>
      <input class="form-control mb-2" placeholder="搜尋" oninput="loadCustomers()">
      <table class="table table-bordered table-sm"><thead><tr><th>名稱</th><th>聯絡人</th><th>電話</th><th>操作</th></tr></thead><tbody id="custList"></tbody></table>
    </div>

    <div id="supp" class="tab-pane fade">
      <div class="d-flex justify-content-between mb-2"><h5>廠商管理</h5><button class="btn btn-sm btn-primary" onclick="openSupplier()">新增</button></div>
      <input class="form-control mb-2" placeholder="搜尋" oninput="loadSuppliers()">

    </div>

    <div id="prod" class="tab-pane fade">

      <div class="d-flex justify-content-between mb-2">
        <h5>商品管理</h5>
        <div>
          <button class="btn btn-sm btn-info me-2" onclick="openSpecTable()">規格表</button>

        </div>
      </div>

        </thead>
        <tbody id="prodList"></tbody>
      </table>
    </div>

    <div id="quote" class="tab-pane fade show active">
  <div class="d-flex justify-content-between mb-2">
    <h5>報價單管理</h5>
    <div>

      <button class="btn btn-sm btn-secondary me-2" onclick="toggleSelectAllQuotes()">全選/取消全選</button>
      <button class="btn btn-sm btn-primary me-2" onclick="openProductHistory()">商品歷史報價查詢</button>
      <button class="btn btn-sm btn-success" onclick="openQuote()">新增報價單</button>

  </div>

        <th>客戶</th>

// 客戶編輯 - 綁定到window

// 廠商編輯 - 綁定到window
window.editSupplier = async function(id){

// 商品編輯 - 綁定到window (新增成本、資料更新日期、更新廠商欄位)

  // 取得所有廠商列表用於下拉選單

async function login() {
  const { error } = await sb.auth.signInWithPassword({ email: email.value, password: password.value });
  if (error) alert("登入錯誤："+error.message); else location.reload();
}
async function logout() { await sb.auth.signOut(); location.reload(); }

function showRegister() {
  loginForm.innerHTML = `
    <h5>註冊帳號</h5>
    <input class="form-control mb-2" id="rEmail" type="email" placeholder="信箱">
    <input class="form-control mb-2" id="rPassword" type="password" placeholder="密碼至少6碼">
    <button class="btn btn-success w-100 mb-2" onclick="register()">註冊</button>
    <button class="btn w-100 btn-sm" onclick="location.reload()">返回</button>
  `;
}
async function register() {
  const e = rEmail.value.trim(); const p = rPassword.value.trim();
  if (!e || !p) { alert("請輸入信箱與密碼"); return; }
  if (p.length < 6) { alert("密碼至少6碼"); return; }
  const { error } = await sb.auth.signUp({ email: e, password: p });
  if (error) alert("註冊失敗："+error.message); else alert("註冊成功！請登入");
}

function show(html, lg=false) { mdSize.className = lg ? "modal-dialog modal-lg" : "modal-dialog"; mdBody.innerHTML = html; modal.show(); }
function closeModal() { modal.hide(); }
function money(v) { return Number(v||0).toLocaleString(); }
function uid() { return user.id; }

// 報價單號
async function quoteNo() {
  const now = new Date();
  const y = now.getFullYear().toString().slice(2);
  const m = String(now.getMonth()+1).padStart(2,'0');
  const d = String(now.getDate()).padStart(2,'0');
  const dc = y+m+d;
  const { data } = await sb.from("quotations").select("quote_no").like("quote_no",`Q${dc}%`).order("quote_no",{ascending:false}).limit(1);
  let seq=1; if(data && data.length>0) seq=parseInt(data[0].quote_no.slice(-2))+1;
  return `Q${dc}${String(seq).padStart(2,'0')}`;
}

async function saveCustomer(){await sb.from("customers").insert([{name:c_name.value,contact_person:c_contact.value,phone:c_phone.value,address:c_addr.value,user_id:uid()}]);closeModal();loadCustomers();}

// 商品 (新增成本、資料更新日期、更新廠商欄位處理)
async function loadProducts(){
  const kw=document.querySelector("#prod input").value;
  const {data}=await sb.from("products").select("*").or(`product_code.ilike.%${kw}%,product_name.ilike.%${kw}%`).order("created_at",{ascending:false});
  
  let h=""; 
  if(data) {
    for (const i of data) {
      // 取得更新廠商名稱
      let supplierName = "-";
      if (i.update_supplier_id) {
        const { data: supp } = await sb.from("suppliers").select("name").eq("id", i.update_supplier_id).single();
        supplierName = supp?.name || "-";
      }
      
      h+=`<tr>
        <td>${i.product_code}</td>
        <td>${i.product_name}</td>
        <td>${i.unit}</td>
        <td>${money(i.sale_price)}</td>
        <td>${money(i.cost || 0)}</td>
        <td>${i.update_date || "-"}</td>
        <td>${supplierName}</td>
        <td>
          <button class='btn btn-sm btn-warning' onclick='editProduct("${i.id}")'>編</button>
          <button class='btn btn-sm btn-danger' onclick='delProduct("${i.id}")'>刪</button>
        </td>
      </tr>`;
    }
  }
  prodList.innerHTML=h;
}

// 儲存商品 (新增成本、資料更新日期、更新廠商欄位)
async function saveProduct(){
  await sb.from("products").insert([{
    product_code:p_code.value,
    product_name:p_name.value,
    unit:p_unit.value,
    sale_price:parseFloat(p_price.value),
    cost: parseFloat(p_cost.value) || 0,

    update_supplier_id: p_update_supplier.value || null, // 儲存更新廠商ID
    remark:p_remark.value,
    user_id:uid()
  }]);
  closeModal();
  loadProducts();
}

// 更新商品 (新增成本、資料更新日期、更新廠商欄位)
async function updateProduct(id){
  await sb.from("products").update({
    product_code:p_code.value,
    product_name:p_name.value,
    unit:p_unit.value,
    sale_price:parseFloat(p_price.value),
    cost: parseFloat(p_cost.value) || 0,

    update_supplier_id: p_update_supplier.value || null, // 更新廠商ID
    remark:p_remark.value
  }).eq("id",id);
  closeModal();
  loadProducts();
}

// 報價單列表
async function loadQuotes() {
  const kw = document.querySelector("#quote input").value.trim().toLowerCase();
  const { data: quotes, error } = await sb.from("quotations").select("*").order("created_at", { ascending: false });

  if (error || !quotes) { quoteList.innerHTML = "<tr><td colspan='6' class='text-center'>載入失敗</td></tr>"; return; }

  let rows = [];
  for (const q of quotes) {
    const { data: items } = await sb.from("quotation_items").select("product_name").eq("quotation_id", q.id);
    const { data: cu } = await sb.from("customers").select("name").eq("id", q.customer_id);

    const custName = (cu?.[0]?.name || "").toLowerCase();
    let productText = items?.length ? items.map(i => i.product_name).join("、") : "無商品";
    const match = !kw || q.quote_no.includes(kw) || custName.includes(kw) || productText.toLowerCase().includes(kw) || (q.status||"").toLowerCase().includes(kw);

    if (match) {
      rows.push(`<tr>
        <td><input type="checkbox" class="quote-checkbox" value="${q.id}"></td>
        <td>${q.quote_no}</td>
        <td>${cu?.[0]?.name || "-"}</td>
        <td>${productText.length>25 ? productText.substring(0,25)+"..." : productText}</td>
        <td>${q.status || "待確認"}</td>
        <td>
          <button class='btn btn-sm btn-info' onclick='viewQuote("${q.id}")'>檢</button>
          <button class='btn btn-sm btn-warning' onclick='editQuote("${q.id}")'>編</button>
          <button class='btn btn-sm btn-danger' onclick='delQuote("${q.id}")'>刪</button>
        </td>
      </tr>`);
    }
  }
  quoteList.innerHTML = rows.join("") || "<tr><td colspan='6' class='text-center'>無資料</td></tr>";
}

// 編輯報價單
async function editQuote(id){
  const {data:q} = await sb.from("quotations").select("*").eq("id",id).single();
  const {data:c}=await sb.from("customers").select("id,name");
  const {data:s}=await sb.from("suppliers").select("id,name");
  const {data:items}=await sb.from("quotation_items").select("*").eq("quotation_id",id);
  
  let itemRows = "";
  if(items && items.length>0) items.forEach((item,i)=>{
    itemRows+=`<tr data-item-id="${i}">
      <td>NO.${i+1}</td>
      <td class="product-name">${item.product_name}</td>
      <td class="text-end quantity">${item.quantity}</td>
      <td class="unit">${item.unit||"-"}</td>
      <td class="text-end unit-price">${money(item.unit_price)}</td>
      <td class="text-end subtotal">${money(item.subtotal)}</td>
      <td class="text-end profit">${money(item.subtotal - (item.cost || 0) * item.quantity)}</td>
      <td></td>
    </tr>`;
  });

  show(`<div class="modal-header"><h5>編輯報價單</h5><button class="btn-close" onclick="closeModal()"></button></div>
  <div class="modal-body">
    <div class="row mb-2">
      <div class="col-4"><input class="form-control" id="q_no" value="${q.quote_no}" readonly></div>
      <div class="col-4"><input type="date" class="form-control" id="q_date" value="${q.quote_date}"></div>
      <div class="col-4"><select class="form-control" id="q_status"><option ${q.status=="待確認"?"selected":""}>待確認</option><option ${q.status=="已成交"?"selected":""}>已成交</option><option ${q.status=="已取消"?"selected":""}>已取消</option></select></div>
    </div>
    <div class="row mb-2">
      <div class="col-6"><select class="form-control" id="q_cust">${c.map(x=>`<option value="${x.id}" ${x.id==q.customer_id?"selected":""}>${x.name}</option>`)}</select></div>
      <div class="col-6"><textarea class="form-control" id="q_remark" placeholder="備註">${q.remark || ""}</textarea></div>
    </div>
    <table class="table table-sm table-bordered" id="quoteItemsTable">
      <thead>
        <tr><th>編號</th><th>商品名稱</th><th class="text-end">數量</th><th>單位</th><th class="text-end">單價</th><th class="text-end">小計</th><th class="text-end">利潤</th></tr>
      </thead>
      <tbody>${itemRows}</tbody>
    </table>
    <div class="text-end mt-2">
      <h5>總金額：${money(q.total_amount)}</h5>
      <h5 class="mt-2">總成本：${money(q.total_cost || 0)}</h5>
      <h5 class="mt-2">總利潤：${money(q.total_amount - (q.total_cost || 0))}</h5>
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn btn-secondary" onclick="copyQuoteToClipboard('${id}')">複製</button>
    <button class="btn btn-primary" onclick="updateQuote('${id}')">儲存</button>
  </div>`,true);
}

// 複製報價單資訊到剪貼簿
async function copyQuoteToClipboard(quoteId) {
  try {
    const {data:q} = await sb.from("quotations").select("*").eq("id",quoteId).single();
    const {data:items}=await sb.from("quotation_items").select("*").eq("quotation_id",quoteId);
    
    let copyText =`\n`;
    items.forEach((item, i) => {
      copyText += `NO.${i+1} ${item.product_name} ${item.quantity} ${item.unit||"-"} $${money(item.unit_price)}\n`;
    });
    
    await navigator.clipboard.writeText(copyText);
    alert("報價單資訊已複製到剪貼簿！");
  } catch (error) {
    console.error("複製失敗：", error);
    alert("複製失敗，請手動複製！");
  }
}

// 保留原有的 updateQuote 函數 (增加備註欄位更新)

}

// 新增報價單 (修改廠商欄位為備註)
let items=[];
async function openQuote(){
  items=[]; const newQNo = await quoteNo();
  const {data:c}=await sb.from("customers").select("id,name");
  const {data:p}=await sb.from("products").select("*");
  
  show(`<div class="modal-header"><h5>新增報價單</h5><button class="btn-close" onclick="closeModal()"></button></div>
  <div class="modal-body">
    <div class="row mb-2">
      <div class="col-4"><input class="form-control" id="q_no" value="${newQNo}" readonly></div>
      <div class="col-4"><input type="date" class="form-control" id="q_date" value="${new Date().toISOString().split('T')[0]}"></div>
      <div class="col-4"><select class="form-control" id="q_status"><option>待確認</option><option>已成交</option><option>已取消</option></select></div>
    </div>
    <div class="row mb-2">
      <div class="col-6"><select class="form-control" id="q_cust">${c.map(x=>`<option value="${x.id}">${x.name}</option>`)}</select></div>
      <div class="col-6"><textarea class="form-control" id="q_remark" placeholder="請輸入備註"></textarea></div>
    </div>
    <select class="form-control mb-2" onchange="fillProduct()" id="q_prod">
      <option value="">選擇商品</option>
      ${p.map(x=>`<option data-price="${x.sale_price}" data-cost="${x.cost}" data-unit="${x.unit}" value="${x.product_name}">${x.product_name}</option>`)}
    </select>
    <div class="input-group mb-2">
      <input class="form-control" id="i_name" placeholder="商品" readonly>
      <input class="form-control" id="i_qty" type="number" value="1" placeholder="數量">
      <input class="form-control" id="i_unit" placeholder="單位" readonly>
      <input class="form-control" id="i_price" type="number" placeholder="單價">
      <input class="form-control" id="i_cost" type="number" placeholder="成本">
      <button class="btn btn-primary" onclick="addItem()">加入</button>
    </div>
    <table class="table table-sm table-bordered">
      <thead>
        <tr>
          <th>編號</th><th>商品名稱</th><th class="text-end">數量</th><th>單位</th>
          <th class="text-end">單價</th><th class="text-end">成本</th><th class="text-end">利潤</th>
          <th class="text-end">小計</th><th></th>
        </tr>
      </thead>
      <tbody id="itemList"></tbody>
    </table>
    <div class="text-end mt-2">
      <h6>總售價：<span id="totalPrice">0</span></h6>
      <h6>總成本：<span id="totalCost">0</span></h6>
      <h6>總利潤：<span id="totalProfit">0</span></h6>
    </div>
  </div>
  <div class="modal-footer"><button class="btn btn-success" onclick="saveQuote()">儲存</button></div>`,true);
  renderItems();
}

function fillProduct(){
  const opt = q_prod.options[q_prod.selectedIndex];
  if(opt.value){
    i_name.value=opt.value; 
    i_price.value=opt.dataset.price; 
    i_unit.value=opt.dataset.unit;
    i_cost.value=opt.dataset.cost || "";
  }
}

function addItem(){
  const name=i_name.value, 
        qty=parseInt(i_qty.value), 
        unit=i_unit.value, 
        price=parseFloat(i_price.value),
        cost=parseFloat(i_cost.value) || 0;
  
  if(!name){
    alert("請選擇商品");
    return;
  }
  if(isNaN(qty) || qty <=0){
    alert("數量必須大於0");
    return;
  }
  if(isNaN(price) || price <=0){
    alert("單價必須大於0");
    return;
  }
  
  items.push({
    name,unit,qty,price,cost,
    sub:qty*price
  });
  i_name.value=""; 
  i_qty.value=1; 
  i_unit.value=""; 
  i_price.value="";
  i_cost.value="";
  renderItems();
}

function renderItems(){
  let h="", totalPrice=0, totalCost=0, totalProfit=0;
  items.forEach((it,i)=>{
    const itemCost = it.cost || (it.price * 0.7);
    const itemProfit = it.sub - (itemCost * it.qty);
    
    totalPrice += it.sub;       
    totalCost += itemCost * it.qty;
    totalProfit += itemProfit;  
    h+=`<tr>
      <td>NO.${i+1}</td>
      <td>${it.name}</td>
      <td class="text-end">${it.qty}</td>
      <td>${it.unit||"-"}</td>
      <td class="text-end">${money(it.price)}</td>
      <td class="text-end">${money(itemCost)}</td>
      <td class="text-end">${money(itemProfit)}</td>
      <td class="text-end">${money(it.sub)}</td>
      <td><button class="btn btn-sm btn-danger" onclick="delItem(${i})">刪</button></td>
    </tr>`;
  });
  itemList.innerHTML=h; 
  document.getElementById("totalPrice").innerText = money(totalPrice);
  document.getElementById("totalCost").innerText = money(totalCost);
  document.getElementById("totalProfit").innerText = money(totalProfit);
}

function delItem(i){
  items.splice(i,1);
  renderItems();
}

// 儲存報價單 (增加備註欄位儲存)
async function saveQuote(){
  if(items.length===0){
    alert("請加入商品");
    return;
  }
  
  const totalAmount = items.reduce((sum, it) => sum + it.sub, 0);
  const totalCost = items.reduce((sum, it) => sum + (it.qty * it.cost), 0);
  const totalProfit = items.reduce((sum, it) => sum + (it.sub - (it.qty * it.cost)), 0);
  
  const { data: quote, error } = await sb.from("quotations").insert([{
    quote_no: q_no.value,
    customer_id: q_cust.value,
    remark: q_remark.value, // 新增備註欄位儲存
    quote_date: q_date.value,
    status: q_status.value,
    total_amount: totalAmount,
    total_cost: totalCost,
    total_profit: totalProfit,
    user_id: uid()
  }]).select();
  
  if (error || !quote) { 
    console.error("報價單主表儲存失敗：", error); 
    alert("報價單儲存失敗：" + error.message); 
    return; 
  }

  const quoteItems = items.map(it => ({
    quotation_id: quote[0].id,
    product_name: it.name,
    unit: it.unit,
    quantity: parseInt(it.qty),
    unit_price: parseFloat(it.price),
    cost: parseFloat(it.cost),
    subtotal: parseFloat(it.sub),
    profit: parseFloat(it.sub - (it.qty * it.cost)),
    user_id: uid()
  }));

  const { error: itemError } = await sb.from("quotation_items").insert(quoteItems);
  
  if (itemError) { 
    console.error("報價明細儲存失敗：", itemError); 
    alert("商品明細儲存失敗：" + itemError.message); 
    return; 
  }

  alert("儲存成功！");
  closeModal();
  loadQuotes();
}

  show(`<div class="modal-header"><h5>📊 商品歷史報價查詢</h5><button class="btn-close" onclick="closeModal()"></button></div>
  <div class="modal-body p-3">

// 刪除選取的報價單
async function batchDeleteQuotes() {
  const selectedCheckboxes = document.querySelectorAll(".quote-checkbox:checked");
  if (selectedCheckboxes.length === 0) {
    alert("請至少選擇一筆報價單！");
    return;
  }

  const confirmDelete = confirm(`確定要刪除選取的 ${selectedCheckboxes.length} 筆報價單嗎？\n刪除後無法復原！`);
  if (!confirmDelete) return;

  try {
    const selectedIds = Array.from(selectedCheckboxes).map(checkbox => checkbox.value);
    
    for (const id of selectedIds) {
      await sb.from("quotation_items").delete().eq("quotation_id", id);
      await sb.from("quotations").delete().eq("id", id);
    }

    alert(`成功刪除 ${selectedCheckboxes.length} 筆報價單！`);
    loadQuotes();
    document.getElementById("selectAllQuotes").checked = false;
  } catch (error) {
    console.error("批次刪除失敗：", error);
    alert("刪除失敗！請稍後再試或檢查網路連線。");
  }
}

// 修改 loadProductHistory 函數，支援多條件查詢
async function loadProductHistory(){
  const productKeyword = document.getElementById("searchProduct").value.trim().toLowerCase();
  const dateKeyword = document.getElementById("searchDate").value;
  const customerKeyword = document.getElementById("searchCustomer").value.trim().toLowerCase();
  
  if(!productKeyword && !dateKeyword && !customerKeyword){
    alert("請至少輸入一個搜尋條件（商品名稱、報價日期、客戶名稱）");
    return;
  }

  const b=document.getElementById("historyBody");
  b.innerHTML="<tr><td colspan='9' class='text-center'>查詢中...</td></tr>";

  try {
    let query = sb.from("quotation_items").select(`
      product_name,unit,unit_price,quantity,subtotal,profit,
      quotations(quote_no,quote_date,customer_id)
    `);
    
    if(productKeyword){
      query = query.ilike("product_name", `%${productKeyword}%`);
    }

    const {data:items, error} = await query;
    
    if(error || !items){
      b.innerHTML="<tr><td colspan='9' class='text-center'>查無資料</td></tr>";
      return;
    }

    let h="";
    for(const it of items){
      const q=it.quotations;
      if(!q) continue;

      if(dateKeyword && q.quote_date !== dateKeyword){
        continue;
      }

      let custName = "-";
      if(q.customer_id){
        const {data:c}=await sb.from("customers").select("name").eq("id",q.customer_id);
        custName = c?.[0]?.name || "-";
      }
      
      if(customerKeyword && !custName.toLowerCase().includes(customerKeyword)){
        continue;
      }

      h+=`<tr>
        <td>${q.quote_date}</td>
        <td>${custName}</td>
        <td>${it.product_name}</td>
        <td class="text-end">${it.quantity}</td>
        <td>${it.unit||"-"}</td>
        <td class="text-end">${money(it.unit_price)}</td>
        <td class="text-end">${money(it.subtotal)}</td>
        <td class="text-end">${money(it.profit || 0)}</td>
        <td>${q.quote_no}</td>
      </tr>`;
    }

    b.innerHTML=h||"<tr><td colspan='9' class='text-center'>無符合條件的資料</td></tr>";
    
  } catch (err) {
    console.error("查詢錯誤：", err);
    b.innerHTML="<tr><td colspan='9' class='text-center'>查詢失敗，請稍後再試</td></tr>";
  }
}

  loadCustomers();
  loadSuppliers();

  loadQuotes();
}
