// ========== 開啟廠商網址 ==========
window.openSupplierUrl = async function(id) {
  try {
    const { data } = await sb.from("suppliers").select("url").eq("id", id).single();
    if (data && data.url) {
      window.open(data.url, '_blank');

  }

// ========== 打開廠商資料 ==========
function openSupplier(id){
  show(`<div class="modal-header"><h5>${id?"編輯":"新增"}廠商</h5><button class="btn-close" onclick="closeModal()"></button></div>
  <div class="modal-body">
    <input class="form-control mb-2" id="s_name" placeholder="廠商名稱">
    <input class="form-control mb-2" id="s_contact" placeholder="廠商聯絡人">
    <input class="form-control mb-2" id="s_phone" placeholder="廠商電話">
    <textarea class="form-control mb-2" id="s_addr" placeholder="廠商地址"></textarea>
    <input class="form-control mb-2" id="s_url" placeholder="廠商網址 (選填)" type="url">
  </div>
  <div class="modal-footer"><button class="btn btn-primary" onclick="${id?`updateSupplier('${id}')`:'saveSupplier()'}">儲存</button></div>`);
  
  if(id) {
    sb.from("suppliers").select("*").eq("id",id).single().then(r=>{
      s_name.value=r.data.name; 
      s_contact.value=r.data.contact_person||""; 
      s_phone.value=r.data.phone||""; 
      s_addr.value=r.data.address||"";
      s_url.value = r.data.url || "";
    });
  }
}
// ========== 儲存廠商資料 ==========
async function saveSupplier(){
  await sb.from("suppliers").insert([{
    name:s_name.value,
    contact_person:s_contact.value,
    phone:s_phone.value,
    address:s_addr.value,
    url: s_url.value || null,
    user_id:uid()
  }]);
  closeModal();
  loadSuppliers();
}
// ========== 更新廠商資料 ==========
async function updateSupplier(id){

    phone:s_phone.value,
    address:s_addr.value,
    url: s_url.value || null

async function loadSuppliers(){
  const kw=document.querySelector("#supp input").value;
  const {data}=await sb.from("suppliers").select("*").ilike("name",`%${kw}%`).order("created_at",{ascending:false});

//載入商品
async function loadProducts(){
  // 移除搜尋關鍵字相關程式
  const sortBy = document.getElementById("prodSortBy")?.value || "created_at_desc";
  
  let sortColumn = "created_at";
  let sortOrder = false;
  let sortBySupplier = false;
  let supplierSortOrder = true;
  switch(sortBy) {
    case "created_at_asc":
      sortColumn = "created_at";
      sortOrder = true;
      break;
    case "product_code_asc":
      sortColumn = "product_code";
      sortOrder = true;
      break;
    case "product_code_desc":
      sortColumn = "product_code";
      sortOrder = false;
      break;
    case "product_name_asc":
      sortColumn = "product_name";
      sortOrder = true;
      break;
    case "product_name_desc":
      sortColumn = "product_name";
      sortOrder = false;
      break;
    case "update_date_desc":
      sortColumn = "update_date";
      sortOrder = false;
      break;
    case "update_supplier_asc":
      sortBySupplier = true;
      supplierSortOrder = true;
      break;
    case "update_supplier_desc":
      sortBySupplier = true;
      supplierSortOrder = false;
      break;
    default:
      sortColumn = "product_code";
      sortOrder = true;
  }
  
  // 移除搜尋條件，查詢所有商品
  let {data}=await sb.from("products").select("*");
  
  if (sortBySupplier && data) {
    const { data: allSuppliers } = await sb.from("suppliers").select("id,name");
    const supplierMap = {};
    allSuppliers.forEach(supp => {
      supplierMap[supp.id] = supp.name || "未設定";
    });
    
    data = data.map(product => ({
      ...product,
      supplier_name: supplierMap[product.update_supplier_id] || "未設定"
    }));
    
    data.sort((a, b) => {
      const nameA = a.supplier_name.toLowerCase();
      const nameB = b.supplier_name.toLowerCase();
      return supplierSortOrder 
        ? nameA.localeCompare(nameB, 'zh-TW') 
        : nameB.localeCompare(nameA, 'zh-TW');
    });
  } else if (data) {
    data.sort((a, b) => {
      let valA = a[sortColumn];
      let valB = b[sortColumn];
      
      if (typeof valA === 'string' && typeof valB === 'string') {
        return sortOrder 
          ? valA.localeCompare(valB, 'zh-TW') 
          : valB.localeCompare(valA, 'zh-TW');
      } else {
        return sortOrder ? (valA - valB) : (valB - valA);
      }
    });
  }
  
  let h=""; 
  if(data) {
    for (const i of data) {
      let supplierName = "-";
      if (i.update_supplier_id) {
        const { data: supp } = await sb.from("suppliers").select("name").eq("id", i.update_supplier_id).single();
        supplierName = supp?.name || "-";
      }
      
      h+=`<tr>
        <td>${i.product_code}</td>
        <td>${i.product_name}</td>
        <td class="text-center">${i.unit}</td> 
        <td class="text-end">${money(i.sale_price)}</td>
        <td class="text-end">${money(i.cost || 0)}</td>
        <td>${i.update_date || "-"}</td>
        <td>${supplierName}</td>
        <td>
          <button class='btn btn-sm btn-info me-1' onclick='openProductUrl("${i.id}")'>網頁</button>
          <button class='btn btn-sm btn-warning me-1' onclick='editProduct("${i.id}")'>編輯</button>
          <button class='btn btn-sm btn-danger' onclick='delProduct("${i.id}")'>刪除</button>
        </td>
      </tr>`;
    }
  }
  prodList.innerHTML=h;
}

// 執行商品進階搜尋
async function doProductSearch() {
  // 獲取搜尋條件
  const searchName = document.getElementById('search_product_name').value.trim().toLowerCase();
  const searchCode = document.getElementById('search_product_code').value.trim().toLowerCase();
  const searchSupplierId = document.getElementById('search_supplier').value;
  const searchRemark = document.getElementById('search_remark').value.trim().toLowerCase();
  
  // 構建查詢條件
  let query = sb.from("products").select("*");
  
  // 商品名稱模糊搜尋
  if (searchName) {
    query = query.ilike("product_name", `%${searchName}%`);
  }
  
  // 商品代號模糊搜尋
  if (searchCode) {
    query = query.ilike("product_code", `%${searchCode}%`);
  }
  
  // 廠商篩選
  if (searchSupplierId) {
    query = query.eq("update_supplier_id", searchSupplierId);
  }
  
  // 備註模糊搜尋
  if (searchRemark) {
    query = query.ilike("remark", `%${searchRemark}%`);
  }
  
  // 執行查詢
  const { data: products, error } = await query;
  
  if (error) {
    alert("搜尋失敗：" + error.message);
    return;
  }
  
  // 獲取廠商對映表（用於顯示廠商名稱）
  const { data: allSuppliers } = await sb.from("suppliers").select("id,name");
  const supplierMap = {};
  allSuppliers.forEach(s => {
    supplierMap[s.id] = s.name || "未設定";
  });
  
  // 渲染搜尋結果
  let resultHtml = "";
  if (products && products.length > 0) {
    products.forEach(item => {
      const supplierName = supplierMap[item.update_supplier_id] || "-";
      resultHtml += `
        <tr>
          <td>${item.product_code}</td>
          <td>${item.product_name}</td>
          <td class="text-center">${item.unit}</td>
          <td class="text-end">${money(item.sale_price)}</td>
          <td class="text-end">${money(item.cost || 0)}</td>
          <td>${item.update_date || "-"}</td>
          <td>${supplierName}</td>
          <td>
            <button class='btn btn-sm btn-info me-1' onclick='openProductUrl("${item.id}")'>網</button>
            <button class='btn btn-sm btn-warning me-1' onclick='editProduct("${item.id}")'>編</button>
            <button class='btn btn-sm btn-danger' onclick='delProduct("${item.id}")'>刪</button>
          </td>
        </tr>
      `;
    });
  } else {
    resultHtml = `<tr><td colspan="8" class="text-center">無符合條件的商品</td></tr>`;
  }
  
  document.getElementById('productSearchResult').innerHTML = resultHtml;
}

// ========== 新增：清空搜尋條件 & 結果 ==========
function clearSearchConditions() {
  // 清空所有輸入框
  document.getElementById('search_product_name').value = '';
  document.getElementById('search_product_code').value = '';
  document.getElementById('search_supplier').value = '';
  document.getElementById('search_remark').value = '';

  // 清空搜尋結果表格
  document.getElementById('productSearchResult').innerHTML = '';
}

// ========== 報價單管理 - 核心修正：成本/利潤計算 ==========
async function loadQuotes() {
  const kw = document.querySelector("#quote input").value.trim().toLowerCase();
  const sortBy = document.getElementById("quoteSortBy")?.value || "last_days";
  
  let sortColumn = "created_at";
  let sortOrder = false;
  let sortByCustomer = false;
  let sortByProductContent = false;
  let customerSortOrder = true;
  let productContentSortOrder = true;
  // 新增：是否過濾最近當天
  let filterLastDays = false;
  
  switch(sortBy) {
    case "created_at_asc":
      sortColumn = "created_at";
      sortOrder = true;
      break;
    case "quote_no_desc":
      sortColumn = "quote_no";
      sortOrder = false;
      break;
    case "status_asc":
      sortColumn = "status";
      sortOrder = true;
      break;
    case "quote_date_desc":
      sortColumn = "quote_date";
      sortOrder = false;
      break;
    case "customer_name_asc":
      sortByCustomer = true;
      customerSortOrder = true;
      break;
    case "customer_name_desc":
      sortByCustomer = true;
      customerSortOrder = false;
      break;
    case "product_content_asc":
      sortByProductContent = true;
      productContentSortOrder = true;
      break;
    case "product_content_desc":
      sortByProductContent = true;
      productContentSortOrder = false;
      break;
    // 新增：當天過濾邏輯
    case "last_days":
      filterLastDays = true;
      sortColumn = "quote_no"; // 按報價單號排序
      sortOrder = false; // 最新的在前
      break;
    default:
      sortColumn = "created_at";
      sortOrder = false;
  }
  
  // 計算當天前的日期（格式：YYYY-MM-DD）
  const threeDaysAgo = new Date();
  threeDaysAgo.setDate(threeDaysAgo.getDate());
  const threeDaysAgoStr = threeDaysAgo.toISOString().split('T')[0];

  // 查詢報價單：增加日期過濾條件
  let quotesQuery = sb.from("quotations").select("*");
  
  // 如果開啟最近當天過濾，添加日期條件
  if (filterLastDays) {
    quotesQuery = quotesQuery.gte("quote_date", threeDaysAgoStr);
  }
  
  // 執行查詢並排序
  const { data: quotes, error } = await quotesQuery.order(sortColumn, { ascending: sortOrder });

  if (error || !quotes) { 
    quoteList.innerHTML = "<tr><td colspan='7' class='text-center'>載入失敗</td></tr>"; 
    return; 
  }

  const { data: allCustomers } = await sb.from("customers").select("id,name");
  const customerMap = {};
  allCustomers.forEach(cust => {
    customerMap[cust.id] = cust.name || "未知客戶";
  });

  const quoteProductMap = {};
  for (const q of quotes) {
    const { data: items } = await sb.from("quotation_items")
      .select("product_name")
      .eq("quotation_id", q.id);
    quoteProductMap[q.id] = items?.map(i => i.product_name).join("、") || "無商品";
  }

  let sortedQuotes = [...quotes];
  if (sortByCustomer) {
    sortedQuotes.sort((a, b) => {
      const nameA = (customerMap[a.customer_id] || "未知客戶").toLowerCase();
      const nameB = (customerMap[b.customer_id] || "未知客戶").toLowerCase();
      return customerSortOrder 
        ? nameA.localeCompare(nameB, 'zh-TW') 
        : nameB.localeCompare(nameA, 'zh-TW');
    });
  } else if (sortByProductContent) {
    sortedQuotes.sort((a, b) => {
      const contentA = quoteProductMap[a.id].toLowerCase();
      const contentB = quoteProductMap[b.id].toLowerCase();
      return productContentSortOrder
        ? contentA.localeCompare(contentB, 'zh-TW')
        : contentB.localeCompare(contentA, 'zh-TW');
    });
  }

  let rows = [];
  for (const q of sortedQuotes) {
    const custName = (customerMap[q.customer_id] || "").toLowerCase();
    const productText = quoteProductMap[q.id];
    // 修正：報價單號搜尋不區分大小寫
    const quoteNoMatch = q.quote_no.toLowerCase().includes(kw);
    const match = !kw || quoteNoMatch || custName.includes(kw) || productText.toLowerCase().includes(kw) || (q.status||"").toLowerCase().includes(kw);

    if (match) {
      rows.push(`<tr>
        <td><input type="checkbox" class="quote-checkbox" value="${q.id}"></td>
        <td>${q.quote_no}</td>
        <td>${q.quote_date || "-"}</td>
        <td>${customerMap[q.customer_id] || "-"}</td>
        <td>${productText}</td>
        <td>${q.status || "報價中"}</td>
        <td>
          <button class='btn btn-sm btn-info' onclick='viewQuote("${q.id}")'>檢視</button>
          <button class='btn btn-sm btn-warning' onclick='editQuote("${q.id}")'>編輯</button>
          <button class='btn btn-sm btn-danger' onclick='delQuote("${q.id}")'>刪除</button>
        </td>
      </tr>`);
    }
  }
  quoteList.innerHTML = rows.join("") || "<tr><td colspan='7' class='text-center'>無資料</td></tr>";
}

// ========== 匯入舊商品編輯後另存為新商品 ==========
async function importOldProduct() {
  // 獲取所有商品列表（用於下拉選擇）
  const { data: allProducts } = await sb.from("products").select("id,product_code,product_name");
  if (!allProducts || allProducts.length === 0) {
    alert("暫無舊商品可匯入！");
    return;
  }

  // 構建舊商品下拉選單選項（先存為變數，用於搜尋過濾）
  const buildProductOptions = (keyword = "") => {
    const lowerKeyword = keyword.toLowerCase().trim();
    return allProducts
      .filter(p => {
        // 匹配商品代號或商品名稱（包含部份文字）
        const codeMatch = p.product_code?.toLowerCase().includes(lowerKeyword) || false;
        const nameMatch = p.product_name?.toLowerCase().includes(lowerKeyword) || false;
        return codeMatch || nameMatch;
      })
      .map(p => 
        `<option value="${p.id}">[${p.product_code || '無代號'}] ${p.product_name}</option>`
      ).join('') || '<option value="">無符合的商品</option>';
  };

  // 彈出選擇舊商品的模態框（新增搜尋框）
  show(`
    <div class="modal-header">
      <h5>匯入舊商品</h5>
      <button class="btn-close" onclick="closeModal()"></button>
    </div>
    <div class="modal-body">
      <div class="mb-3">
        <label class="form-label">搜尋商品（名稱/代號）</label>
        <input type="text" class="form-control mb-2" id="oldProductSearch" placeholder="輸入商品名稱或代號關鍵字...">
        <label class="form-label">選擇要匯入的舊商品</label>
        <select class="form-control" id="importOldProdId">
          <option value="">-- 請選擇舊商品 --</option>
          ${buildProductOptions()}
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="loadOldProductData()">確認匯入</button>
    </div>
  `, true);

  // 綁定搜尋框事件：即時過濾商品列表
  const searchInput = document.getElementById('oldProductSearch');
  const productSelect = document.getElementById('importOldProdId');
  
  searchInput.addEventListener('input', (e) => {
    const keyword = e.target.value;
    // 保留預設選項 + 過濾後的商品選項
    productSelect.innerHTML = `
      <option value="">-- 請選擇舊商品 --</option>
      ${buildProductOptions(keyword)}
    `;
  });
}

// 加載選擇的舊商品數據並開啟編輯表單（另存為新商品）
async function loadOldProductData() {
  const oldProdId = document.getElementById('importOldProdId').value;
  if (!oldProdId) {
    alert("請選擇要匯入的舊商品！");
    return;
  }

  // 獲取舊商品完整數據
  const { data: oldProduct } = await sb.from("products")
    .select("*")
    .eq("id", oldProdId)
    .single();
  
  if (!oldProduct) {
    alert("舊商品數據加載失敗！");
    closeModal();
    return;
  }

  // 關閉當前選擇模態框，打開商品新增表單（預填舊商品數據）
  closeModal();
  
  // 獲取廠商列表（用於表單下拉選單）
  const { data: suppliers } = await sb.from("suppliers").select("id,name");
  const supplierOptions = suppliers.map(s => 
    `<option value="${s.id}" ${s.id === oldProduct.update_supplier_id ? 'selected' : ''}>${s.name}</option>`
  ).join('');

  // 打開新增商品表單，預填舊商品數據（標註為匯入）
  show(`
    <div class="modal-header">
      <h5>匯入舊商品 → 新增新商品</h5>
      <button class="btn-close" onclick="closeModal()"></button>
    </div>
    <div class="modal-body">
      <div class="alert alert-info mb-3">
        已匯入舊商品數據，可修改後另存為新商品（商品代號建議重新編號）
      </div>
      <input class="form-control mb-2" id="p_code" placeholder="商品代號" value="${oldProduct.product_code}">
      <input class="form-control mb-2" id="p_name" placeholder="名稱" value="${oldProduct.product_name}">
      <input class="form-control mb-2" id="p_unit" placeholder="單位" value="${oldProduct.unit}">
      <input class="form-control mb-2" id="p_price" type="number" placeholder="售價" style="text-align: right;" value="${oldProduct.sale_price}">
      <input class="form-control mb-2" id="p_cost" type="number" placeholder="成本" style="text-align: right;" value="${oldProduct.cost || ''}">
      <input class="form-control mb-2" id="p_update_date" type="date" placeholder="資料更新日期" value="${oldProduct.update_date || new Date().toISOString().split('T')[0]}">
      <select class="form-control mb-2" id="p_update_supplier">
        <option value="">選擇進貨的廠商</option>
        ${supplierOptions}
      </select>
      <input class="form-control mb-2" id="p_url" placeholder="商品網址 (選填)" type="url" value="${oldProduct.product_url || ''}">
      <textarea class="form-control" id="p_remark" placeholder="備註">${oldProduct.remark || ''}</textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveImportedProduct()">另存為新商品</button>
    </div>
  `, true);
}

// 儲存匯入後編輯的新商品
async function saveImportedProduct() {
  const productCode = document.getElementById('p_code').value.trim();
  const productName = document.getElementById('p_name').value.trim();
  const unit = document.getElementById('p_unit').value.trim();
  const salePrice = parseFloat(document.getElementById('p_price').value) || 0;
  const cost = parseFloat(document.getElementById('p_cost').value) || 0;
  const updateDate = document.getElementById('p_update_date').value;
  const updateSupplierId = document.getElementById('p_update_supplier').value || null;
  const productUrl = document.getElementById('p_url').value.trim() || null;
  const remark = document.getElementById('p_remark').value.trim();

  // 表單驗證
  if (!productCode || !productName) {
    alert("商品代號和名稱為必填項！");
    return;
  }

  try {
    // 插入新商品（不修改原舊商品，完全新增）
    await sb.from("products").insert([{
      product_code: productCode,
      product_name: productName,
      unit: unit,
      sale_price: salePrice,
      cost: cost,
      update_date: updateDate,
      update_supplier_id: updateSupplierId,
      product_url: productUrl,
      remark: remark,
      user_id: uid() // 當前登入用戶ID
    }]);

    //alert("舊商品匯入並另存為新商品成功！");
    closeModal();
    loadProducts(); // 重新加載商品列表
  } catch (error) {
    console.error("儲存匯入商品失敗：", error);
    alert("儲存失敗，請稍後再試！");
  }
}

//編輯報價單
async function editQuote(id){
  const {data:q} = await sb.from("quotations").select("*").eq("id",id).single();
  const {data:c}=await sb.from("customers").select("id,name");
  const {data:s}=await sb.from("suppliers").select("id,name");
  const {data:items}=await sb.from("quotation_items")
    .select("*")
    .eq("quotation_id",id)
    .order("display_order", { ascending: true });

  let itemRows = "";
  if(items && items.length>0) items.forEach((item,i)=>{
    const profit = (item.subtotal || 0) - ( (item.cost || 0) * (item.quantity || 0) );
    itemRows+=`<tr data-item-id="${item.id}" data-display-order="${item.display_order || i}">
      <td>NO.${i+1}</td>
      <td class="product-name">${item.product_name}</td>
      <td class="text-end quantity">${item.quantity}</td>
      <td class="unit">${item.unit||"-"}</td>
      <td class="text-end unit-price">${money(item.unit_price)}</td>
      <td class="text-end subtotal">${money(item.subtotal)}</td>
      <td class="text-end profit">${money(profit)}</td>
      <td class="text-center">
        <button class="btn btn-xs btn-secondary move-up" onclick="moveItemUp('${id}', this)" title="上移">↑</button>
        <button class="btn btn-xs btn-secondary move-down" onclick="moveItemDown('${id}', this)" title="下移">↓</button>
      </td>
    </tr>`;
  });

  const totalCost = items?.reduce((sum, item) => sum + (item.cost || 0) * (item.quantity || 0), 0) || 0;
  const totalProfit = (q.total_amount || 0) - totalCost;

  show(`<div class="modal-header"><h5>編輯報價單</h5><button class="btn-close" onclick="closeModal()"></button></div>
  <div class="modal-body">
    <div class="row mb-2">
      <div class="col-4"><input class="form-control" id="q_no" value="${q.quote_no}" readonly></div>
      <div class="col-4"><input type="date" class="form-control" id="q_date" value="${q.quote_date}"></div>
      <div class="col-4"><select class="form-control" id="q_status"><option ${q.status=="報價中"?"selected":""}>報價中</option><option ${q.status=="已成交"?"selected":""}>已成交</option><option ${q.status=="模版"?"selected":""}>模版</option></select></div>
    </div>
    <div class="row mb-2">
      <div class="col-6"><select class="form-control" id="q_cust">${c.map(x=>`<option value="${x.id}" ${x.id==q.customer_id?"selected":""}>${x.name}</option>`)}</select></div>
      <div class="col-6"><textarea class="form-control" id="q_remark" placeholder="備註">${q.remark || ""}</textarea></div>
    </div>
    <div class="mb-2">
      <button class="btn btn-sm btn-danger" onclick="saveItemOrder('${id}')">保存商品排序</button>
      <small class="text-muted ms-2">調整順序後請點擊保存</small>
    </div>
    <table class="table table-sm table-bordered" id="quoteItemsTable">
      <thead>
        <tr>
          <th>編號</th>
          <th>商品名稱</th>
          <th class="text-end">數量</th>
          <th>單位</th>
          <th class="text-end">單價</th>
          <th class="text-end">小計</th>
          <th class="text-end">利潤</th>
          <th class="text-center" width="80">排序</th>
        </tr>
      </thead>
      <tbody id="quoteItemsBody">${itemRows}</tbody>
    </table>
    <div class="text-end mt-2">
      <h5>總金額：${money(q.total_amount)}</h5>
      <h5 class="mt-2">總成本：${money(totalCost)}</h5>
      <h5 class="mt-2">總利潤：${money(totalProfit)}</h5>
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn btn-secondary" onclick="copyQuoteToClipboard('${id}')">複製明細</button>
    <button class="btn btn-primary" onclick="updateQuote('${id}')">儲存</button>
  </div>`,true);

  initDragSort();
}

//複製報價單內容到剪簿
async function copyQuoteToClipboard(quoteId) {
  try {
    const {data:q} = await sb.from("quotations").select("*").eq("id",quoteId).single();

// 加入商品到報價單
window.addQuoteItem = function() {
  const qty = parseInt(document.getElementById('itemQty').value) || 1;

  const searchInput = document.getElementById('productSearchInput').value;
  
  if (!searchInput || !price) {

  }

  const productName = searchInput.replace(/^\[.*?\]\s*/, '');
  const unit = window.selectedProductUnit || '-';
  const cost = window.selectedProductCost || 0;
  const subtotal = qty * price;
  const profit = subtotal - (qty * cost);

  // 添加到商品列表
  items.push({

    quantity: qty,
    unit: unit,
    unit_price: price,
    subtotal: subtotal,
    cost: cost,
    profit: profit
  });

  renderQuoteItems();
  calculateTotal();
  
  // 清空輸入框
  document.getElementById('productSearchInput').value = '';
  document.getElementById('itemPrice').value = '';
  delete window.selectedProductCost;
  delete window.selectedProductUnit;

// 初始化拖曳排序
function initDragSort() {
  const tbody = document.getElementById('quoteItemsBody');
  if (!tbody) return;

  const rows = tbody.querySelectorAll('tr');
  rows.forEach(row => {
    row.draggable = true;
    row.addEventListener('dragstart', (e) => {
      e.dataTransfer.setData('text/plain', row.dataset.itemId);
      setTimeout(() => row.classList.add('dragging'), 0);
    });
    row.addEventListener('dragend', () => {
      row.classList.remove('dragging');
    });
  });

  tbody.addEventListener('dragover', (e) => {
    e.preventDefault();
    const draggingRow = document.querySelector('.dragging');
    const afterElement = getDragAfterElement(tbody, e.clientY);
    if (afterElement) {
      tbody.insertBefore(draggingRow, afterElement);
    } else {
      tbody.appendChild(draggingRow);
    }
    updateRowNumbers(); // 更新編號
  });
}

// 輔助函數：獲取拖曳目標位置
function getDragAfterElement(container, y) {
  const draggableElements = [...container.querySelectorAll('tr:not(.dragging)')];
  return draggableElements.reduce((closest, child) => {
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height / 2;
    if (offset < 0 && offset > closest.offset) {
      return { offset: offset, element: child };
    } else {
      return closest;
    }
  }, { offset: Number.NEGATIVE_INFINITY }).element;
}

// 更新行號
function updateRowNumbers() {
  const tbody = document.getElementById('quoteItemsBody');
  if (!tbody) return;
  const rows = tbody.querySelectorAll('tr');
  rows.forEach((row, index) => {
    row.querySelector('td:first-child').textContent = `NO.${index + 1}`;
  });
}

// 上移商品
function moveItemUp(quoteId, btn) {
  const row = btn.closest('tr');
  const prevRow = row.previousElementSibling;
  if (prevRow) {
    row.parentNode.insertBefore(row, prevRow);
    updateRowNumbers();
  }
}

// 下移商品
function moveItemDown(quoteId, btn) {
  const row = btn.closest('tr');
  const nextRow = row.nextElementSibling;
  if (nextRow) {
    row.parentNode.insertBefore(nextRow, row);
    updateRowNumbers();
  }
}

  const status = document.getElementById('q_status').value;

  const totalCost = items.reduce((sum, item) => sum + (item.cost * item.quantity), 0);

  if (!quoteNo || !quoteDate || !customerId || items.length === 0) {
    alert("請填寫必要欄位並至少加入一項商品！");
    return;

  try {

    const { data: quote } = await sb.from("quotations").insert([{
      quote_no: quoteNo,
      quote_date: quoteDate,
      customer_id: customerId,
      total_amount: totalAmount,
      status: status,
      remark: remark,
      user_id: uid()

    // 2. 新增報價單明細
    const quoteItems = items.map((item, i) => ({
      quotation_id: quote.id,
      product_name: item.product_name,
      quantity: item.quantity,
      unit: item.unit,
      unit_price: item.unit_price,
      subtotal: item.subtotal,
      cost: item.cost,

    }));

    await sb.from("quotation_items").insert(quoteItems);

    //alert("報價單儲存成功！");

    loadQuotes();
  } catch (error) {
    console.error("儲存報價單失敗：", error);
    alert("儲存失敗，請稍後再試！");
  }
}

// 輔助函數：生成報價單號
async function quoteNo() {
  const date = new Date();
  const y = date.getFullYear().toString().slice(2);
  const m = (date.getMonth() + 1).toString().padStart(2, '0');
  const d = date.getDate().toString().padStart(2, '0');
  const prefix = `QT${y}${m}${d}`;
  
  const { data: quotes } = await sb.from("quotations")
    .select("quote_no")
    .ilike("quote_no", `${prefix}%`)
    .order("quote_no", { ascending: false })
    .limit(1);

  const count = quotes.length > 0 ? parseInt(quotes[0].quote_no.replace(prefix, '')) + 1 : 1;
  return `${prefix}${count.toString().padStart(3, '0')}`;
}

// 計算總金額/成本/利潤
function calculateTotal() {
  const totalAmount = items.reduce((sum, item) => sum + item.subtotal, 0);
  const totalCost = items.reduce((sum, item) => sum + (item.cost * item.quantity), 0);
  const totalProfit = totalAmount - totalCost;

  document.getElementById('totalAmount').textContent = money(totalAmount);
  document.getElementById('totalCost').textContent = money(totalCost);
  document.getElementById('totalProfit').textContent = money(totalProfit);
}

// 輔助函數：金額格式化
function money(num) {
  return num.toLocaleString('zh-TW', { minimumFractionDigits: 0, maximumFractionDigits: 2 });

// ========== 核心：統一報價單號生成函數 (修正版) ==========
async function quoteNo() {
  try {
    // 1. 取得當前日期資訊
    const now = new Date();
    const year = now.getFullYear().toString().slice(-2); // 年度末2碼 (如2026→26)
    const month = String(now.getMonth() + 1).padStart(2, '0'); // 月份補0
    const day = String(now.getDate()).padStart(2, '0'); // 日期補0
    const datePrefix = `${year}${month}${day}`; // 如260527
    
    // 2. 從資料庫查詢當日最新的報價單號
    const { data: latestQuotes, error } = await sb.from("quotations")
      .select("quote_no")
      .like("quote_no", `Q${datePrefix}%`) // 匹配當日開頭的編號
      .order("quote_no", { ascending: false })
      .limit(1);

    if (error) throw error;

    // 3. 計算流水號
    let serialNo = "01"; // 預設起始流水號
    if (latestQuotes && latestQuotes.length > 0) {
      const latestNo = latestQuotes[0].quote_no;
      const latestSerial = latestNo.slice(-2); // 截取最後2位流水號
      const newSerial = (parseInt(latestSerial) + 1).toString().padStart(2, '0');
      serialNo = newSerial;
    }

    // 4. 生成最終報價單號
    return `Q${datePrefix}${serialNo}`; // 如Q26052701
  } catch (error) {
    console.error("生成報價單號失敗：", error);
    // 異常時使用預設編號（保證功能可用）
    const now = new Date();
    const year = now.getFullYear().toString().slice(-2);
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const day = String(now.getDate()).padStart(2, '0');
    return `Q${year}${month}${day}01`;
  }
}
// 客戶管理
async function loadCustomers(){
  const kw=document.querySelector("#cust input").value;
  const {data}=await sb.from("customers").select("*").ilike("name",`%${kw}%`).order("created_at",{ascending:false});
  let h=""; if(data) data.forEach(i=>h+=`<tr><td>${i.name}</td><td>${i.contact_person||"-"}</td><td>${i.phone||"-"}</td><td><button class='btn btn-sm btn-warning' onclick='editCustomer("${i.id}")'>編輯</button><button class='btn btn-sm btn-danger' onclick='delCustomer("${i.id}")'>刪除</button></td></tr>`);
  custList.innerHTML=h;
}

function editCustomer(id) {
  openCustomer(id);
}

function openCustomer(id){
  show(`<div class="modal-header"><h5>${id?"編輯":"新增"}客戶</h5><button class="btn-close" onclick="closeModal()"></button></div>
  <div class="modal-body"><input class="form-control mb-2" id="c_name" placeholder="客戶名稱"><input class="form-control mb-2" id="c_contact" placeholder="客戶聯絡人"><input class="form-control mb-2" id="c_phone" placeholder="客戶電話"><textarea class="form-control" id="c_addr" placeholder="客戶地址"></textarea></div>
  <div class="modal-footer"><button class="btn btn-primary" onclick="${id?`updateCustomer('${id}')`:'saveCustomer()'}">儲存</button></div>`);
  if(id)sb.from("customers").select("*").eq("id",id).single().then(r=>{c_name.value=r.data.name; c_contact.value=r.data.contact_person||""; c_phone.value=r.data.phone||""; c_addr.value=r.data.address||"";});
}

//儲存客戶資料
async function saveCustomer(){
  await sb.from("customers").insert([{
    name:c_name.value,
    contact_person:c_contact.value,
    phone:c_phone.value,
    address:c_addr.value,
    user_id:uid()
  }]);
  closeModal();
  loadCustomers();
}

//更新客戶資料
async function updateCustomer(id){
  await sb.from("customers").update({
    name:c_name.value,
    contact_person:c_contact.value,
    phone:c_phone.value,
    address:c_addr.value
  }).eq("id",id);
  closeModal();
  loadCustomers();
}

//刪除客戶資料
async function delCustomer(id){
  if(confirm("確定刪除?")){
    await sb.from("customers").delete().eq("id",id);
    loadCustomers();
  }
}

// 批量刪除報價單
async function batchDeleteQuotes() {
  const checkboxes = document.querySelectorAll('.quote-checkbox:checked');
  if (checkboxes.length === 0) {
    alert("請選擇要刪除的報價單！");
    return;
  }
  
  if (!confirm(`確定要刪除選取的 ${checkboxes.length} 筆報價單？`)) {
    return;
  }
  
  const ids = Array.from(checkboxes).map(cb => cb.value);
  try {
    // 先刪除明細
    await sb.from("quotation_items").delete().in("quotation_id", ids);
    // 再刪除主檔
    await sb.from("quotations").delete().in("id", ids);
    
    //alert("刪除成功！");
    loadQuotes();
  } catch (error) {
    console.error("批量刪除失敗：", error);
    alert("刪除失敗，請稍後再試！");
  }
}

// 全選/取消全選報價單
function toggleSelectAllQuotes() {
  const checkboxes = document.querySelectorAll('.quote-checkbox');
  const headerCheckbox = document.querySelector('#quote table thead th input[type="checkbox"]');
  const isAllChecked = headerCheckbox?.checked || false;
  
  checkboxes.forEach(cb => {
    cb.checked = !isAllChecked;
  });
  
  if (headerCheckbox) {
    headerCheckbox.checked = !isAllChecked;
  }
}

// 檢視報價單
async function viewQuote(id) {
  const {data:q} = await sb.from("quotations").select("*").eq("id",id).single();
  const {data:items}=await sb.from("quotation_items").select("*").eq("quotation_id",id);
  const {data:customer}=await sb.from("customers").select("name").eq("id", q.customer_id).single();
  
  let itemRows = "";
  let totalCost = 0;
  let totalProfit = 0;
  
  if(items && items.length>0) {
    items.forEach((item,i)=>{
      const cost = (item.cost || 0) * (item.quantity || 0);
      const profit = (item.subtotal || 0) - cost;
      totalCost += cost;
      totalProfit += profit;
      
      itemRows+=`<tr>
        <td>NO.${i+1}</td>
        <td>${item.product_name}</td>
        <td class="text-end">${item.quantity}</td>
        <td>${item.unit||"-"}</td>
        <td class="text-end">${money(item.unit_price)}</td>
        <td class="text-end">${money(item.cost)}</td>
        <td class="text-end">${money(item.subtotal)}</td>
        <td class="text-end">${money(profit)}</td>
      </tr>`;
    });
  }
  
  show(`<div class="modal-header"><h5>檢視報價單 ${q.quote_no}</h5><button class="btn-close" onclick="closeModal()"></button></div>
  <div class="modal-body">
    <div class="row mb-3">
      <div class="col-6"><strong>報價日期：</strong>${q.quote_date || "-"}</div>
      <div class="col-6"><strong>客戶：</strong>${customer?.name || "-"}</div>
    </div>
    <div class="row mb-3">
      <div class="col-6"><strong>狀態：</strong>${q.status || "報價中"}</div>
      <div class="col-6"><strong>備註：</strong>${q.remark || "-"}</div>
    </div>
    <table class="table table-sm table-bordered">
      <thead>
        <tr>
          <th>編號</th><th>商品名稱</th><th class="text-end">數量</th><th>單位</th>
          <th class="text-end">單價</th><th class="text-end">成本</th><th class="text-end">小計</th>
          <th class="text-end">利潤</th>
        </tr>
      </thead>
      <tbody>${itemRows}</tbody>
    </table>
    <div class="text-end mt-2">
      <h5>總金額：${money(q.total_amount)}</h5>
      <h5 class="mt-2">總成本：${money(totalCost)}</h5>
      <h5 class="mt-2">總利潤：${money(totalProfit)}</h5>
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn btn-secondary" onclick="copyQuoteToClipboard('${id}')">複製明細</button>
    <button class="btn btn-primary" onclick="closeModal()">關閉</button>
  </div>`,true);
}

// 刪除報價單
async function delQuote(id) {
  if (!confirm("確定要刪除此報價單？")) return;
  
  try {
    // 先刪除明細
    await sb.from("quotation_items").delete().eq("quotation_id", id);
    // 再刪除主檔
    await sb.from("quotations").delete().eq("id", id);
    
    //alert("刪除成功！");
    loadQuotes();
  } catch (error) {
    console.error("刪除報價單失敗：", error);
    alert("刪除失敗，請稍後再試！");
  }
}

// 商品歷史報價查詢
function openProductHistory(){
  show(`<div class="modal-header"><h5>📊 商品歷史報價查詢</h5><button class="btn-close" onclick="closeModal()"></button></div>
  <div class="modal-body p-3">
    <div class="row mb-3">
      <div class="col-md-4">
        <input type="text" id="searchProduct" class="form-control" placeholder="輸入商品名稱">
      </div>
      <div class="col-md-3">
        <input type="date" id="searchDate" class="form-control" placeholder="選擇報價日期">
      </div>
      <div class="col-md-3">

      </div>
      <div class="col-md-2 d-flex gap-1">
        <button class="btn btn-primary flex-fill" onclick="loadProductHistory()">查詢</button>

          </tr>
        </thead>
        <tbody id="historyBody"></tbody>
      </table>
    </div>
  </div>`,true);
}

//載入歷史報價單
async function loadProductHistory(){
  const productKeyword = document.getElementById("searchProduct").value.trim().toLowerCase();
  const dateKeyword = document.getElementById("searchDate").value;
  const customerKeyword = document.getElementById("searchCustomer").value.trim().toLowerCase();
  
  if(!productKeyword && !dateKeyword && !customerKeyword){
    alert("請至少輸入一個搜尋條件（商品名稱、報價日期、客戶名稱）");
    return;
  }

  const b=document.getElementById("historyBody");
  b.innerHTML="<tr><td colspan='9' class='text-center'>查詢中...</td></tr>";

  try {
    let query = sb.from("quotation_items").select(`
      product_name,unit,unit_price,quantity,subtotal,profit,
      quotations(quote_no,quote_date,customer_id)
    `);
    
    if(productKeyword){
      query = query.ilike("product_name", `%${productKeyword}%`);
    }

    const {data:items, error} = await query;
    
    if(error || !items){
      b.innerHTML="<tr><td colspan='9' class='text-center'>查無資料</td></tr>";
      return;
    }

    let h="";
    for(const it of items){
      const q=it.quotations;
      if(!q) continue;

      if(dateKeyword && q.quote_date !== dateKeyword){
        continue;
      }

      let custName = "-";
      if(q.customer_id){
        const {data:cust} = await sb.from("customers").select("name").eq("id", q.customer_id).single();
        custName = cust?.name || "-";
        if(customerKeyword && !custName.toLowerCase().includes(customerKeyword)){
          continue;
        }
      }

      h+=`<tr>
        <td>${q.quote_date || "-"}</td>
        <td>${custName}</td>
        <td>${it.product_name}</td>
        <td class="text-end">${it.quantity}</td>
        <td>${it.unit || "-"}</td>
        <td class="text-end">${money(it.unit_price)}</td>
        <td class="text-end">${money(it.subtotal)}</td>
        <td>${q.quote_no}</td>
      </tr>`;
    }
    b.innerHTML = h || "<tr><td colspan='9' class='text-center'>查無資料</td></tr>";
  } catch (error) {
    console.error("載入歷史報價失敗：", error);
    b.innerHTML="<tr><td colspan='9' class='text-center'>查詢失敗，請稍後再試</td></tr>";
  }
}

function clearSearchFields() {
  document.getElementById("searchProduct").value = "";
  document.getElementById("searchDate").value = "";
  document.getElementById("searchCustomer").value = "";
  document.getElementById("historyBody").innerHTML = "";
}

//搜尋商品
async function searchProductHistory() {
  const prodName = document.getElementById('historyProdName').value.trim().toLowerCase();
  if (!prodName) {
    alert("請輸入商品名稱！");
    return;
  }
  
  // 查詢包含該商品的報價單明細
  const { data: items } = await sb.from("quotation_items")
    .select(`
      *,
      quotations:quotation_id (quote_no, quote_date, customer_id),
      customers:quotations.customer_id (name)
    `)
    .ilike("product_name", `%${prodName}%`);
  
  if (!items || items.length === 0) {
    document.getElementById('historyList').innerHTML = '<tr><td colspan="7" class="text-center">無相關歷史報價</td></tr>';
    return;
  }
  
  let html = '';
  items.forEach(item => {
    html += `<tr>
      <td>${item.quotations?.quote_no || '-'}</td>
      <td>${item.quotations?.quote_date || '-'}</td>
      <td>${item.customers?.name || '-'}</td>
      <td>${item.product_name}</td>
      <td class="text-end">${item.quantity}</td>
      <td class="text-end">${money(item.unit_price)}</td>
      <td class="text-end">${money(item.cost)}</td>
    </tr>`;
  });
  
  document.getElementById('historyList').innerHTML = html;
}
