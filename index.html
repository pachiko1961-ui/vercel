<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>報價管理系統</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .modal-lg{max-width:900px;}
    /* 排序按鈕樣式優化 */
    .sort-btn {
      border: none;
      background: transparent;
      padding: 0;
      color: #0d6efd;
      cursor: pointer;
      font-size: 0.9em;
    }
    .sort-btn:hover {
      text-decoration: underline;
    }
    .sort-indicator {
      font-size: 0.8em;
      margin-left: 4px;
    }
  </style>
</head>
<body>

<!-- 原有 HTML 結構不變 -->
<div id="loginPanel" class="d-flex vh-100 align-items-center justify-content-center">
  <div class="card p-4 shadow-sm" style="width:400px">
    <h3 class="text-center mb-3">🔐 系統登入</h3>
    <div id="loginForm">
      <input class="form-control mb-2" id="email" placeholder="電子信箱" type="email">
      <input class="form-control mb-2" id="password" placeholder="密碼" type="password">
      <button class="btn btn-primary w-100 mb-2" onclick="login()">登入</button>
      <button class="btn btn-outline-secondary w-100" onclick="showRegister()">註冊</button>
    </div>
  </div>
</div>

<div id="mainPanel" class="container py-3 d-none">
  <!-- 原有導航/面板結構不變 -->
  <div class="d-flex justify-content-between mb-2">
    <h4>📋 報價管理系統</h4>
    <div>
      <span id="userEmail" class="me-2"></span>
      <button class="btn btn-sm btn-danger" onclick="logout()">登出</button>
    </div>
  </div>

  <ul class="nav-tabs mb-3 nav">
    <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#cust">客戶</a></li>
    <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#supp">廠商</a></li>
    <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#prod">商品</a></li>
    <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#quote">報價單</a></li>
  </ul>

  <div class="tab-content">
    <!-- 客戶面板不變 -->
    <div id="cust" class="tab-pane fade show active">
      <div class="d-flex justify-content-between mb-2"><h5>客戶管理</h5><button class="btn btn-sm btn-primary" onclick="openCustomer()">新增</button></div>
      <input class="form-control mb-2" placeholder="搜尋" oninput="loadCustomers()">
      <table class="table table-bordered table-sm"><thead><tr><th>名稱</th><th>聯絡人</th><th>電話</th><th>操作</th></tr></thead><tbody id="custList"></tbody></table>
    </div>

    <!-- 廠商面板 - 結構不變 -->
    <div id="supp" class="tab-pane fade">
      <div class="d-flex justify-content-between mb-2"><h5>廠商管理</h5><button class="btn btn-sm btn-primary" onclick="openSupplier()">新增</button></div>
      <input class="form-control mb-2" placeholder="搜尋" oninput="loadSuppliers()">
      <table class="table table-bordered table-sm"><thead><tr><th>名稱</th><th>聯絡人</th><th>電話</th><th>操作</th></tr></thead><tbody id="suppList"></tbody></table>
    </div>

    <!-- 商品面板 - 新增排序功能 -->
    <div id="prod" class="tab-pane fade">
      <div class="d-flex justify-content-between mb-2">
        <h5>商品管理</h5>
        <div>
          <button class="btn btn-sm btn-info me-2" onclick="openSpecTable()">規格表</button>
          <button class="btn btn-sm btn-primary" onclick="openProduct()">新增</button>
        </div>
      </div>
      <input class="form-control mb-2" placeholder="搜尋" oninput="loadProducts()">
      <!-- 新增排序控制區 -->
      <div class="mb-2 d-flex align-items-center gap-3">
        <span class="text-muted small">排序：</span>
        <button class="sort-btn" onclick="sortProducts('product_code')">
          代號 <span id="sort-indicator-code" class="sort-indicator"></span>
        </button>
        <button class="sort-btn" onclick="sortProducts('product_name')">
          名稱 <span id="sort-indicator-name" class="sort-indicator"></span>
        </button>
        <button class="sort-btn" onclick="sortProducts('sale_price')">
          售價 <span id="sort-indicator-price" class="sort-indicator"></span>
        </button>
        <button class="sort-btn" onclick="sortProducts('cost')">
          成本 <span id="sort-indicator-cost" class="sort-indicator"></span>
        </button>
        <button class="sort-btn" onclick="sortProducts('update_date')">
          更新日期 <span id="sort-indicator-date" class="sort-indicator"></span>
        </button>
      </div>
      <table class="table table-bordered table-sm">
        <thead>
          <tr>
            <th>代號</th><th>名稱</th><th>單位</th><th>售價</th><th>成本</th>
            <th>資料更新日期</th><th>更新的廠商</th><th>操作</th>
          </tr>
        </thead>
        <tbody id="prodList"></tbody>
      </table>
    </div>

    <!-- 報價單面板 - 新增排序功能 -->
    <div id="quote" class="tab-pane fade">
      <div class="d-flex justify-content-between mb-2">
        <h5>報價單管理</h5>
        <div>
          <button class="btn btn-sm btn-danger me-2" onclick="batchDeleteQuotes()">刪除選取</button>
          <button class="btn btn-sm btn-secondary me-2" onclick="toggleSelectAllQuotes()">全選/取消全選</button>
          <button class="btn btn-sm btn-primary me-2" onclick="openProductHistory()">歷史報價單查詢</button>
          <button class="btn btn-sm btn-success" onclick="openQuote()">新增報價單</button>
        </div>
      </div>
      <input class="form-control mb-2" placeholder="搜尋：單號/客戶/商品/狀態" oninput="loadQuotes()">
      <!-- 新增報價單排序控制區 -->
      <div class="mb-2 d-flex align-items-center gap-3">
        <span class="text-muted small">排序：</span>
        <button class="sort-btn" onclick="sortQuotes('quote_no')">
          報價單號 <span id="sort-indicator-quote-no" class="sort-indicator"></span>
        </button>
        <button class="sort-btn" onclick="sortQuotes('customer')">
          客戶 <span id="sort-indicator-customer" class="sort-indicator"></span>
        </button>
        <button class="sort-btn" onclick="sortQuotes('status')">
          狀態 <span id="sort-indicator-status" class="sort-indicator"></span>
        </button>
        <button class="sort-btn" onclick="sortQuotes('created_at')">
          建立日期 <span id="sort-indicator-date" class="sort-indicator"></span>
        </button>
      </div>
      <table class="table table-bordered table-sm">
        <thead>
          <tr>
            <th><input type="checkbox" id="selectAllQuotes"></th>
            <th>報價單號</th>
            <th>客戶</th>
            <th>商品內容</th>
            <th>狀態</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="quoteList"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal fade" id="modal"><div class="modal-dialog" id="mdSize"><div class="modal-content" id="mdBody"></div></div></div>

<!-- 新增匯入舊報價的彈窗 -->
<!-- 替換原有的匯入舊報價單彈窗 -->
<div class="modal fade" id="importQuoteModal">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">匯入舊報價單</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">舊報價單單號</label>
          <!-- 新增手動輸入框 -->
          <input type="text" class="form-control mb-2" id="importQuoteNoInput" placeholder="手動輸入報價單單號 (例如：Q24010101)">
          <div class="form-text text-muted">或從下方選擇已存在的報價單</div>
          <!-- 保留下拉選單 -->
          <select class="form-select mt-2" id="importQuoteSelect">
            <option value="">請選擇報價單號</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
        <button type="button" class="btn btn-primary" onclick="confirmImportQuote()">確認匯入</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ===================== 請填入你的 SUPABASE 資訊 =====================
const SUPABASE_URL = "https://kqxwjzabeeexqmqjsont.supabase.co";
const SUPABASE_KEY = "sb_publishable_P4N84KRlgvy1n7tn7KPeVw_rNX4Igwm";
// ==================================================================

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const modal = new bootstrap.Modal(document.getElementById('modal'));
// 初始化匯入報價單彈窗
const importQuoteModal = new bootstrap.Modal(document.getElementById('importQuoteModal'));
let user = null;
// 全域變數儲存當前新增報價單的狀態
let currentNewQuoteState = {
  items: [],
  quoteNo: ""
};

// 新增：商品排序狀態管理
let productSortState = {
  column: 'created_at', // 預設排序欄位
  order: 'desc'        // 預設排序方式 (asc/desc)
};

// 新增：報價單排序狀態管理
let quoteSortState = {
  column: 'created_at', // 預設排序欄位
  order: 'desc'         // 預設排序方式 (asc/desc)
};

function openSpecTable() {
  window.open('p-table.html', '_blank');
}

window.onload = checkAuth;
async function checkAuth() {
  const { data } = await sb.auth.getUser();
  if (data.user) {
    user = data.user;
    loginPanel.classList.add('d-none');
    mainPanel.classList.remove('d-none');
    userEmail.textContent = user.email;
    loadAll();
  }
}

function loadAll() {
  loadCustomers();
  loadSuppliers();
  loadProducts();
  loadQuotes();
}
// 刪除廠商函數（保留）
async function delSupplier(id){
  if(confirm("確定刪除?")){
    await sb.from("suppliers").delete().eq("id",id);
    loadSuppliers();
  }
}

// 編輯廠商函數（與 openSupplier 合併，保留兼容性）
function editSupplier(id) {
  openSupplier(id);
}


// 新增：商品排序函數
function sortProducts(column) {
  // 切換排序方向（如果點擊同一欄位）
  if (productSortState.column === column) {
    productSortState.order = productSortState.order === 'asc' ? 'desc' : 'asc';
  } else {
    // 切換新欄位預設升序
    productSortState.column = column;
    productSortState.order = 'asc';
  }
  
  // 更新排序指示器顯示
  updateSortIndicators();
  
  // 重新加載商品列表（應用排序）
  loadProducts();
}

// 新增：更新商品排序指示器（顯示當前排序狀態）
function updateSortIndicators() {
  // 重置所有指示器
  document.querySelectorAll('.sort-indicator').forEach(el => el.textContent = '');
  
  // 設置當前排序欄位的指示器
  const indicatorId = `sort-indicator-${
    productSortState.column === 'product_code' ? 'code' :
    productSortState.column === 'product_name' ? 'name' :
    productSortState.column === 'sale_price' ? 'price' :
    productSortState.column === 'cost' ? 'cost' :
    productSortState.column === 'update_date' ? 'date' : ''
  }`;
  
  const indicator = document.getElementById(indicatorId);
  if (indicator) {
    indicator.textContent = productSortState.order === 'asc' ? '↑' : '↓';
  }
}

// 新增：報價單排序函數
function sortQuotes(column) {
  // 切換排序方向（如果點擊同一欄位）
  if (quoteSortState.column === column) {
    quoteSortState.order = quoteSortState.order === 'asc' ? 'desc' : 'asc';
  } else {
    // 切換新欄位預設升序
    quoteSortState.column = column;
    quoteSortState.order = 'asc';
  }
  
  // 更新報價單排序指示器顯示
  updateQuoteSortIndicators();
  
  // 重新加載報價單列表（應用排序）
  loadQuotes();
}

// 新增：更新報價單排序指示器
function updateQuoteSortIndicators() {
  // 重置所有報價單排序指示器
  document.querySelectorAll('[id^="sort-indicator-quote-"]').forEach(el => el.textContent = '');
  document.getElementById('sort-indicator-customer').textContent = '';
  document.getElementById('sort-indicator-status').textContent = '';
  document.getElementById('sort-indicator-date').textContent = '';
  
  // 設置當前排序欄位的指示器
  let indicatorId = '';
  switch (quoteSortState.column) {
    case 'quote_no':
      indicatorId = 'sort-indicator-quote-no';
      break;
    case 'customer':
      indicatorId = 'sort-indicator-customer';
      break;
    case 'status':
      indicatorId = 'sort-indicator-status';
      break;
    case 'created_at':
      indicatorId = 'sort-indicator-date';
      break;
  }
  
  const indicator = document.getElementById(indicatorId);
  if (indicator) {
    indicator.textContent = quoteSortState.order === 'asc' ? '↑' : '↓';
  }
}

// ========== 新增函數：加載舊報價單列表用於匯入 ==========
// ========== 修改：加載舊報價單列表用於匯入（增加單號映射） ==========
let quoteNoToIdMap = {}; // 新增：儲存單號與ID的對應關係
// 修正：加載舊報價單列表（新增輸入框事件綁定）
async function loadOldQuotesForImport() {
  try {
    const { data: quotes, error } = await sb.from("quotations")
      .select("id, quote_no, customer_id")
      .order("created_at", { ascending: false });
      
    if (error || !quotes) {
      alert("加載舊報價單失敗：" + (error?.message || "無可用報價單"));
      return;
    }
    
    // 重置映射表
    quoteNoToIdMap = {};
    const selectElement = document.getElementById("importQuoteSelect");
    selectElement.innerHTML = '<option value="">請選擇報價單號</option>';
    
    for (const quote of quotes) {
      const { data: customer } = await sb.from("customers")
        .select("name")
        .eq("id", quote.customer_id)
        .single();
        
      const customerName = customer?.name || "未知客戶";
      selectElement.innerHTML += `<option value="${quote.id}">${quote.quote_no} (${customerName})</option>`;
      // 建立單號到ID的映射（大小寫不敏感）
      quoteNoToIdMap[quote.quote_no.toUpperCase()] = quote.id;
    }
    
    // 清空手動輸入框
    const manualInput = document.getElementById("importQuoteNoInput");
    manualInput.value = "";
    
    // 新增：綁定輸入事件，自動匹配下拉選單
    manualInput.oninput = function() {
      const inputVal = this.value.trim().toUpperCase();
      if (quoteNoToIdMap[inputVal]) {
        // 自動選中對應的下拉選項
        selectElement.value = quoteNoToIdMap[inputVal];
      } else {
        selectElement.value = ""; // 無匹配則清空下拉選單
      }
    };
    
    // 顯示匯入彈窗
    importQuoteModal.show();
  } catch (error) {
    console.error("加載舊報價單失敗：", error);
    alert("加載舊報價單失敗，請稍後再試");
  }
}// ========== 新增函數：確認匯入舊報價單 ==========
// 修正：確認匯入舊報價單（支援手動輸入單號）
async function confirmImportQuote() {
  // 1. 優先處理手動輸入的報價單號
  const manualQuoteNo = document.getElementById('importQuoteNoInput').value.trim().toUpperCase();
  let quoteId = '';
  
  // 判斷是否手動輸入了單號
  if (manualQuoteNo) {
    // 透過映射表查找對應的ID
    quoteId = quoteNoToIdMap[manualQuoteNo];
    if (!quoteId) {
      alert(`找不到報價單號：${manualQuoteNo}，請確認單號正確！`);
      return;
    }
  } else {
    // 2. 手動輸入為空時，讀取下拉選單的值
    quoteId = document.getElementById('importQuoteSelect').value;
    if (!quoteId) {
      alert("請選擇或手動輸入要匯入的報價單號");
      return;
    }
  }
  
  try {
    // 取得舊報價單主資訊
    const { data: quote, error: quoteError } = await sb.from("quotations")
      .select("*")
      .eq("id", quoteId)
      .single();
      
    if (quoteError || !quote) {
      alert("取得報價單資訊失敗：" + (quoteError?.message || "無此報價單"));
      return;
    }
    
    // 取得舊報價單明細
    const { data: items, error: itemsError } = await sb.from("quotation_items")
      .select("*")
      .eq("quotation_id", quoteId);
      
    if (itemsError || !items) {
      alert("取得報價單明細失敗：" + (itemsError?.message || "無商品明細"));
      return;
    }
    
    // 轉換格式並更新當前新增報價單的商品列表
    currentNewQuoteState.items = items.map(item => ({
      name: item.product_name,
      unit: item.unit || "",
      qty: item.quantity,
      price: item.unit_price,
      cost: item.cost || 0,
      sub: item.subtotal
    }));
    
    // 更新表單欄位
    document.getElementById("q_cust").value = quote.customer_id;
    document.getElementById("q_remark").value = quote.remark || "";
    document.getElementById("q_status").value = quote.status || "待確認";
    
    // 重新渲染商品列表
    renderItems();
    
    // 關閉匯入彈窗
    importQuoteModal.hide();
    alert("舊報價單資料匯入成功！");
    
  } catch (error) {
    console.error("匯入報價單失敗：", error);
    alert("匯入報價單失敗，請稍後再試");
  }
}
// ========== 新增函數：開啟廠商網址 ==========
window.openSupplierUrl = async function(id) {
  try {
    // 從Supabase取得該廠商的URL
    const { data } = await sb.from("suppliers").select("url").eq("id", id).single();
    
    if (data && data.url) {
      // 開啟新視窗打開廠商網址
      window.open(data.url, '_blank');
    } else {
      alert("該廠商尚未設定網址！");
    }
  } catch (error) {
    console.error("取得廠商網址失敗：", error);
    alert("取得廠商網址失敗，請稍後再試！");
  }
};

// ========== 核心修改1：廠商新增/編輯表單加入「網址」欄位 ==========
function openSupplier(id){
  show(`<div class="modal-header"><h5>${id?"編輯":"新增"}廠商</h5><button class="btn-close" onclick="closeModal()"></button></div>
  <div class="modal-body">
    <input class="form-control mb-2" id="s_name" placeholder="名稱">
    <input class="form-control mb-2" id="s_contact" placeholder="聯絡人">
    <input class="form-control mb-2" id="s_phone" placeholder="電話">
    <textarea class="form-control mb-2" id="s_addr" placeholder="地址"></textarea>
    <!-- 新增：廠商網址欄位 -->
    <input class="form-control mb-2" id="s_url" placeholder="廠商網址 (選填)" type="url">
  </div>
  <div class="modal-footer"><button class="btn btn-primary" onclick="${id?`updateSupplier('${id}')`:'saveSupplier()'}">儲存</button></div>`);
  
  if(id) {
    sb.from("suppliers").select("*").eq("id",id).single().then(r=>{
      s_name.value=r.data.name; 
      s_contact.value=r.data.contact_person||""; 
      s_phone.value=r.data.phone||""; 
      s_addr.value=r.data.address||"";
      // 新增：載入廠商網址
      s_url.value = r.data.url || "";
    });
  }
}

// ========== 核心修改2：儲存廠商時加入「網址」欄位 ==========
async function saveSupplier(){
  await sb.from("suppliers").insert([{
    name:s_name.value,
    contact_person:s_contact.value,
    phone:s_phone.value,
    address:s_addr.value,
    // 新增：儲存廠商網址
    url: s_url.value || null,
    user_id:uid()
  }]);
  closeModal();
  loadSuppliers();
}

// ========== 核心修改3：更新廠商時加入「網址」欄位 ==========
async function updateSupplier(id){
  await sb.from("suppliers").update({
    name:s_name.value,
    contact_person:s_contact.value,
    phone:s_phone.value,
    address:s_addr.value,
    // 新增：更新廠商網址
    url: s_url.value || null
  }).eq("id",id);
  closeModal();
  loadSuppliers();
}

// ========== 核心修改4：廠商列表加載邏輯 - 新增「網」按鈕 ==========
async function loadSuppliers(){
  const kw=document.querySelector("#supp input").value;
  const {data}=await sb.from("suppliers").select("*").ilike("name",`%${kw}%`).order("created_at",{ascending:false});
  let h=""; 
  if(data) data.forEach(i=>{
    h+=`<tr>
      <td>${i.name}</td>
      <td>${i.contact_person||"-"}</td>
      <td>${i.phone||"-"}</td>

async function quoteNo() {

  const m = String(now.getMonth()+1).padStart(2,'0');
  const d = String(now.getDate()).padStart(2,'0');
  const dc = y+m+d;
  const { data } = await sb.from("quotations").select("quote_no").like("quote_no",`Q${dc}%`).order("quote_no",{ascending:false}).limit(1);

}

// 報價單相關邏輯 - 新增排序支援
async function loadQuotes() {
  const kw = document.querySelector("#quote input").value.trim().toLowerCase();
  
  // 1. 取得所有報價單基礎資料（帶排序）
  let quotesQuery = sb.from("quotations").select("*");
  
  // 應用排序條件
  if (quoteSortState.column === 'quote_no' || quoteSortState.column === 'created_at' || quoteSortState.column === 'status') {
    quotesQuery = quotesQuery.order(quoteSortState.column, { 
      ascending: quoteSortState.order === 'asc' 
    });
  }
  
  // 如果是按客戶排序，需要先取得所有報價單再處理
  const { data: quotes, error } = await quotesQuery;

  if (error || !quotes) { 
    quoteList.innerHTML = "<tr><td colspan='6' class='text-center'>載入失敗</td></tr>"; 
    return; 
  }

  // 2. 處理客戶排序（需要聯表查詢客戶名稱）
  let quotesWithCustomer = [];
  for (const q of quotes) {
    const { data: cu } = await sb.from("customers").select("name").eq("id", q.customer_id);
    q.customer_name = cu?.[0]?.name || "未知客戶";
    quotesWithCustomer.push(q);
  }
  
  // 如果當前排序列是客戶，則重新排序
  if (quoteSortState.column === 'customer') {
    quotesWithCustomer.sort((a, b) => {
      const nameA = a.customer_name.toLowerCase();
      const nameB = b.customer_name.toLowerCase();
      if (quoteSortState.order === 'asc') {
        return nameA.localeCompare(nameB);
      } else {
        return nameB.localeCompare(nameA);
      }
    });
  }

  // 3. 處理搜尋和渲染
  let rows = [];
  for (const q of quotesWithCustomer) {
    const { data: items } = await sb.from("quotation_items").select("product_name").eq("quotation_id", q.id);
    
    const custName = q.customer_name.toLowerCase();
    let productText = items?.length ? items.map(i => i.product_name).join("、") : "無商品";
    const match = !kw || q.quote_no.includes(kw) || custName.includes(kw) || productText.toLowerCase().includes(kw) || (q.status||"").toLowerCase().includes(kw);

    if (match) {
      rows.push(`<tr>
        <td><input type="checkbox" class="quote-checkbox" value="${q.id}"></td>
        <td>${q.quote_no}</td>
        <td>${q.customer_name || "-"}</td>
        <td>${productText.length>25 ? productText.substring(0,25)+"..." : productText}</td>
        <td>${q.status || "待確認"}</td>
        <td>
          <button class='btn btn-sm btn-info' onclick='viewQuote("${q.id}")'>檢</button>
          <button class='btn btn-sm btn-warning' onclick='editQuote("${q.id}")'>編</button>
          <button class='btn btn-sm btn-danger' onclick='delQuote("${q.id}")'>刪</button>
        </td>
      </tr>`);
    }
  }
  
  quoteList.innerHTML = rows.join("") || "<tr><td colspan='6' class='text-center'>無資料</td></tr>";
}

            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
              <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/>
              <path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
    <select class="form-control mb-2" onchange="fillProduct()" id="q_prod">
      <option value="">選擇商品</option>
      ${p.map(x=>`<option data-price="${x.sale_price}" data-cost="${x.cost}" data-unit="${x.unit}" value="${x.product_name}">${x.product_name}</option>`)}
    </select>
    <div class="input-group mb-2">
      <input class="form-control" id="i_name" placeholder="商品" readonly>
      <input class="form-control" id="i_qty" type="number" value="1" placeholder="數量">
      <input class="form-control" id="i_unit" placeholder="單位" readonly>
      <input class="form-control" id="i_price" type="number" placeholder="單價">
      <input class="form-control" id="i_cost" type="number" placeholder="成本">
      <button class="btn btn-primary" onclick="addItem()">加入</button>
    </div>
    <table class="table table-sm table-bordered">
      <thead>
        <tr>
          <th>編號</th><th>商品名稱</th><th class="text-end">數量</th><th>單位</th>
          <th class="text-end">單價</th><th class="text-end">成本</th><th class="text-end">利潤</th>
          <th class="text-end">小計</th><th></th>
        </tr>
      </thead>
      <tbody id="itemList"></tbody>
    </table>
    <div class="text-end mt-2">
      <h6>總售價：<span id="totalPrice">0</span></h6>
      <h6>總成本：<span id="totalCost">0</span></h6>
      <h6>總利潤：<span id="totalProfit">0</span></h6>
    </div>
  </div>
  <div class="modal-footer"><button class="btn btn-success" onclick="saveQuote()">儲存</button></div>`,true);
  renderItems();
}

function fillProduct() {
  const select = document.getElementById('q_prod');
  const selected = select.options[select.selectedIndex];
  
  if (selected.value) {
    document.getElementById('i_name').value = selected.value;
    document.getElementById('i_unit').value = selected.dataset.unit || '';
    document.getElementById('i_price').value = selected.dataset.price || '';
    document.getElementById('i_cost').value = selected.dataset.cost || '';
  } else {
    document.getElementById('i_name').value = '';
    document.getElementById('i_unit').value = '';
    document.getElementById('i_price').value = '';
    document.getElementById('i_cost').value = '';
  }
}

function addItem() {
  const name = document.getElementById('i_name').value;
  const qty = parseInt(document.getElementById('i_qty').value) || 1;
  const unit = document.getElementById('i_unit').value;
  const price = parseFloat(document.getElementById('i_price').value) || 0;
  const cost = parseFloat(document.getElementById('i_cost').value) || 0;
  
  if (!name || price <= 0) {
    alert("請選擇商品並填寫有效的單價");
    return;
  }
  
  const sub = price * qty;
  const profit = (price - cost) * qty;
  
  // 更新全域狀態
  currentNewQuoteState.items.push({
    name, qty, unit, price, cost, sub, profit
  });
  
  // 保持原有變數兼容
  items = currentNewQuoteState.items;
  
  renderItems();
}

function renderItems() {
  const itemList = document.getElementById('itemList');
  const totalPriceEl = document.getElementById('totalPrice');
  const totalCostEl = document.getElementById('totalCost');
  const totalProfitEl = document.getElementById('totalProfit');
  
  let html = '';
  let totalPrice = 0;
  let totalCost = 0;
  let totalProfit = 0;
  
  currentNewQuoteState.items.forEach((item, index) => {
    totalPrice += item.sub;
    totalCost += item.cost * item.qty;
    totalProfit += (item.price - item.cost) * item.qty;
    
    html += `<tr>
      <td>${index + 1}</td>
      <td>${item.name}</td>
      <td class="text-end">${item.qty}</td>
      <td>${item.unit || '-'}</td>
      <td class="text-end">${money(item.price)}</td>
      <td class="text-end">${money(item.cost)}</td>
      <td class="text-end">${money((item.price - item.cost) * item.qty)}</td>
      <td class="text-end">${money(item.sub)}</td>
      <td class="text-center">
        <button class="btn btn-sm btn-danger" onclick="removeItem(${index})">刪</button>
      </td>
    </tr>`;
  });
  
  itemList.innerHTML = html;
  totalPriceEl.textContent = money(totalPrice);
  totalCostEl.textContent = money(totalCost);
  totalProfitEl.textContent = money(totalProfit);
}

function removeItem(index) {
  currentNewQuoteState.items.splice(index, 1);
  items = currentNewQuoteState.items; // 保持兼容
  renderItems();
}

async function saveQuote() {
  const quoteNo = document.getElementById('q_no').value;
  const quoteDate = document.getElementById('q_date').value;
  const customerId = document.getElementById('q_cust').value;
  const status = document.getElementById('q_status').value;
  const remark = document.getElementById('q_remark').value;
  
  if (!customerId) {
    alert("請選擇客戶");
    return;
  }
  
  if (currentNewQuoteState.items.length === 0) {
    alert("請至少加入一項商品");
    return;
  }
  
  // 計算總金額、總成本
  const totalAmount = currentNewQuoteState.items.reduce((sum, item) => sum + item.sub, 0);
  const totalCost = currentNewQuoteState.items.reduce((sum, item) => sum + (item.cost * item.qty), 0);
  
  try {
    // 插入報價單主檔
    const { data: newQuote, error: quoteError } = await sb.from("quotations").insert([{
      quote_no: quoteNo,
      quote_date: quoteDate,
      customer_id: customerId,
      status: status,
      remark: remark,
      total_amount: totalAmount,
      total_cost: totalCost,
      user_id: uid()
    }]).select();
    
    if (quoteError || !newQuote) {
      throw new Error(quoteError?.message || "建立報價單失敗");
    }
    
    const quotationId = newQuote[0].id;
    
    // 插入報價單明細
    const itemsToInsert = currentNewQuoteState.items.map(item => ({
      quotation_id: quotationId,
      product_name: item.name,
      quantity: item.qty,
      unit: item.unit,
      unit_price: item.price,
      cost: item.cost,
      subtotal: item.sub
    }));
    
    await sb.from("quotation_items").insert(itemsToInsert);
    
    alert("報價單儲存成功！");
    closeModal();
    loadQuotes();
  } catch (error) {
    console.error("儲存報價單失敗：", error);
    alert("儲存失敗：" + error.message);
  }
}

// 新增：歷史報價單查詢
function openProductHistory(){
  show(`<div class="modal-header"><h5>📊 歷史報價單查詢</h5><button class="btn-close" onclick="closeModal()"></button></div>
  <div class="modal-body p-3">
    <div class="row mb-3">
      <div class="col-md-4">
        <input type="text" id="searchProduct" class="form-control" placeholder="輸入商品名稱">
      </div>
      <div class="col-md-3">
        <input type="date" id="searchDate" class="form-control" placeholder="選擇報價日期">
      </div>
      <div class="col-md-3">
        <input type="text" id="searchCustomer" class="form-control" placeholder="輸入客戶名稱">
      </div>
      <div class="col-md-2 d-flex gap-1">
        <button class="btn btn-primary flex-fill" onclick="loadProductHistory()">查詢</button>
        <button class="btn btn-secondary flex-fill" onclick="clearSearchFields()">清空</button>
      </div>
    </div>
    <div style="max-height:400px;overflow-y:auto">
      <table class="table table-sm table-bordered">
        <thead class="table-light">
          <tr>
            <th>報價日期</th><th>客戶</th><th>商品</th><th>數量</th><th>單位</th><th>單價</th><th>小計</th><th>利潤</th><th>單號</th>
          </tr>
        </thead>
        <tbody id="historyBody"></tbody>
      </table>
    </div>
  </div>`,true);
}
async function loadProductHistory(){
  const productKeyword = document.getElementById("searchProduct").value.trim().toLowerCase();
  const dateKeyword = document.getElementById("searchDate").value;
  const customerKeyword = document.getElementById("searchCustomer").value.trim().toLowerCase();
  
  if(!productKeyword && !dateKeyword && !customerKeyword){
    alert("請至少輸入一個搜尋條件（商品名稱、報價日期、客戶名稱）");
    return;
  }

  const b=document.getElementById("historyBody");
  b.innerHTML="<tr><td colspan='9' class='text-center'>查詢中...</td></tr>";

  try {
    let query = sb.from("quotation_items").select(`
      product_name,unit,unit_price,quantity,subtotal,profit,
      quotations(quote_no,quote_date,customer_id)
    `);
    
    if(productKeyword){
      query = query.ilike("product_name", `%${productKeyword}%`);
    }

    const {data:items, error} = await query;
    
    if(error || !items){
      b.innerHTML="<tr><td colspan='9' class='text-center'>查無資料</td></tr>";
      return;
    }

    let h="";
    for(const it of items){
      const q=it.quotations;
      if(!q) continue;

      if(dateKeyword && q.quote_date !== dateKeyword){
        continue;
      }

      let custName = "-";
      if(q.customer_id){
        const {data:cust} = await sb.from("customers").select("name").eq("id", q.customer_id).single();
        custName = cust?.name || "-";
        if(customerKeyword && !custName.toLowerCase().includes(customerKeyword)){
          continue;
        }
      }

      h+=`<tr>
        <td>${q.quote_date || "-"}</td>
        <td>${custName}</td>
        <td>${it.product_name}</td>
        <td class="text-end">${it.quantity}</td>
        <td>${it.unit || "-"}</td>
        <td class="text-end">${money(it.unit_price)}</td>
        <td class="text-end">${money(it.subtotal)}</td>
        <td class="text-end">${money(it.profit || 0)}</td>
        <td>${q.quote_no}</td>
      </tr>`;
    }

    b.innerHTML = h || "<tr><td colspan='9' class='text-center'>查無資料</td></tr>";
  } catch (error) {
    console.error("載入歷史報價失敗：", error);
    b.innerHTML="<tr><td colspan='9' class='text-center'>查詢失敗，請稍後再試</td></tr>";
  }
}

function clearSearchFields() {
  document.getElementById("searchProduct").value = "";
  document.getElementById("searchDate").value = "";
  document.getElementById("searchCustomer").value = "";
  document.getElementById("historyBody").innerHTML = "";
}

</script>
