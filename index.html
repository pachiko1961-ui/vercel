// ========== 新增函數：開啟廠商網址 ==========
window.openSupplierUrl = async function(id) {
  try {
    // 從Supabase取得該廠商的URL
    const { data } = await sb.from("suppliers").select("url").eq("id", id).single();
    
    if (data && data.url) {
      // 開啟新視窗打開廠商網址
      window.open(data.url, '_blank');
    } else {
      alert("該廠商尚未設定網址！");
    }
  } catch (error) {
    console.error("取得廠商網址失敗：", error);
    alert("取得廠商網址失敗，請稍後再試！");
  }
};

// ========== 核心修改1：廠商新增/編輯表單加入「網址」欄位 ==========
function openSupplier(id){
  show(`<div class="modal-header"><h5>${id?"編輯":"新增"}廠商</h5><button class="btn-close" onclick="closeModal()"></button></div>
  <div class="modal-body">
    <input class="form-control mb-2" id="s_name" placeholder="名稱">
    <input class="form-control mb-2" id="s_contact" placeholder="聯絡人">
    <input class="form-control mb-2" id="s_phone" placeholder="電話">
    <textarea class="form-control mb-2" id="s_addr" placeholder="地址"></textarea>
    <!-- 新增：廠商網址欄位 -->
    <input class="form-control mb-2" id="s_url" placeholder="廠商網址 (選填)" type="url">
  </div>
  <div class="modal-footer"><button class="btn btn-primary" onclick="${id?`updateSupplier('${id}')`:'saveSupplier()'}">儲存</button></div>`);
  
  if(id) {
    sb.from("suppliers").select("*").eq("id",id).single().then(r=>{
      s_name.value=r.data.name; 
      s_contact.value=r.data.contact_person||""; 
      s_phone.value=r.data.phone||""; 
      s_addr.value=r.data.address||"";
      // 新增：載入廠商網址
      s_url.value = r.data.url || "";
    });
  }
}

// ========== 核心修改2：儲存廠商時加入「網址」欄位 ==========
async function saveSupplier(){
  await sb.from("suppliers").insert([{
    name:s_name.value,
    contact_person:s_contact.value,
    phone:s_phone.value,
    address:s_addr.value,
    // 新增：儲存廠商網址
    url: s_url.value || null,
    user_id:uid()
  }]);
  closeModal();
  loadSuppliers();
}

// ========== 核心修改3：更新廠商時加入「網址」欄位 ==========

  await sb.from("suppliers").update({
    name:s_name.value,
    contact_person:s_contact.value,
    phone:s_phone.value,
    address:s_addr.value,
    // 新增：更新廠商網址
    url: s_url.value || null

// ========== 核心修改4：廠商列表加載邏輯 - 新增「網」按鈕 ==========

async function login() {

  if (error) alert("登入錯誤："+error.message); else location.reload();

function showRegister() {

async function register() {
  const e = rEmail.value.trim(); const p = rPassword.value.trim();
  if (!e || !p) { alert("請輸入信箱與密碼"); return; }
  if (p.length < 6) { alert("密碼至少6碼"); return; }
  const { error } = await sb.auth.signUp({ email: e, password: p });
  if (error) alert("註冊失敗："+error.message); else alert("註冊成功！請登入");
}

// 報價單號生成邏輯不變
async function quoteNo() {
  const now = new Date();
  const y = now.getFullYear().toString().slice(2);
  const m = String(now.getMonth()+1).padStart(2,'0');
  const d = String(now.getDate()).padStart(2,'0');
  const dc = y+m+d;
  const { data } = await sb.from("quotations").select("quote_no").like("quote_no",`Q${dc}%`).order("quote_no",{ascending:false}).limit(1);
  let seq=1; if(data && data.length>0) seq=parseInt(data[0].quote_no.slice(-2))+1;
  return `Q${dc}${String(seq).padStart(2,'0')}`;
}

// ========== 商品管理 - 新增排序邏輯 ==========
async function loadProducts(){
  const kw=document.querySelector("#prod input").value;
  const sortBy = document.getElementById("prodSortBy")?.value || "created_at_desc";
  
  // 解析排序參數
  let sortColumn = "created_at";
  let sortOrder = false; // false = descending (最新在前), true = ascending (最舊在前)
  let sortBySupplier = false; // 標記是否按廠商排序
  let supplierSortOrder = true; // 廠商排序方向 (預設升序)
  switch(sortBy) {
    case "created_at_asc":
      sortColumn = "created_at";
      sortOrder = true;
      break;
    case "product_code_asc":
      sortColumn = "product_code";
      sortOrder = true;
      break;
    case "product_code_desc":
      sortColumn = "product_code";
      sortOrder = false;
      break;
    case "product_name_asc":
      sortColumn = "product_name";
      sortOrder = true;
      break;
    case "product_name_desc":
      sortColumn = "product_name";
      sortOrder = false;
      break;
    case "update_date_desc":
      sortColumn = "update_date";
      sortOrder = false;
      break;
    case "update_supplier_asc":
      sortBySupplier = true;
      supplierSortOrder = true; // A-Z 升序
      break;
    case "update_supplier_desc":
      sortBySupplier = true;
      supplierSortOrder = false; // Z-A 降序
      break;
    default: // product_code_desc
      sortColumn = "product_code";
      sortOrder = true;
  }
  
  // 查詢商品資料
  let {data}=await sb.from("products")
    .select("*")
    .or(`product_code.ilike.%${kw}%,product_name.ilike.%${kw}%`);
  
  // 如果需要按廠商排序，先補充廠商名稱再排序
  if (sortBySupplier && data) {
    // 先獲取所有廠商的對應關係
    const { data: allSuppliers } = await sb.from("suppliers").select("id,name");
    const supplierMap = {};
    allSuppliers.forEach(supp => {
      supplierMap[supp.id] = supp.name || "未設定";
    });
    
    // 為每個商品補充廠商名稱
    data = data.map(product => {
      return {
        ...product,
        supplier_name: supplierMap[product.update_supplier_id] || "未設定"
      };
    });
    
    // 按廠商名稱排序
    data.sort((a, b) => {
      const nameA = a.supplier_name.toLowerCase();
      const nameB = b.supplier_name.toLowerCase();
      if (supplierSortOrder) {
        // 升序 (A-Z)
        return nameA.localeCompare(nameB, 'zh-TW');
      } else {
        // 降序 (Z-A)
        return nameB.localeCompare(nameA, 'zh-TW');
      }
    });
  } else if (data) {
    // 原有排序邏輯
    data.sort((a, b) => {
      let valA = a[sortColumn];
      let valB = b[sortColumn];
      
      // 處理字串/數字類型的排序
      if (typeof valA === 'string' && typeof valB === 'string') {
        return sortOrder 
          ? valA.localeCompare(valB, 'zh-TW') 
          : valB.localeCompare(valA, 'zh-TW');
      } else {
        return sortOrder ? (valA - valB) : (valB - valA);
      }
    });
  }
  
  let h=""; 
  if(data) {
    for (const i of data) {
      let supplierName = "-";
      if (i.update_supplier_id) {
        const { data: supp } = await sb.from("suppliers").select("name").eq("id", i.update_supplier_id).single();
        supplierName = supp?.name || "-";
      }

async function loadQuotes() {
  const kw = document.querySelector("#quote input").value.trim().toLowerCase();
  const sortBy = document.getElementById("quoteSortBy")?.value || "created_at_desc";
  
  // 解析排序參數
  let sortColumn = "created_at";
  let sortOrder = false;
  // 新增標記：是否按客戶/商品內容排序（需要額外處理）
  let sortByCustomer = false;
  let sortByProductContent = false;
  let customerSortOrder = true; // 客戶排序方向
  let productContentSortOrder = true; // 商品內容排序方向
  
  switch(sortBy) {
    case "created_at_asc":
      sortColumn = "created_at";
      sortOrder = true;
      break;
    case "quote_no_desc":
      sortColumn = "quote_no";
      sortOrder = false;
      break;
    case "status_asc":
      sortColumn = "status";
      sortOrder = true;
      break;
    case "quote_date_desc":
      sortColumn = "quote_date";
      sortOrder = false;
      break;
    // 新增客戶排序處理
    case "customer_name_asc":
      sortByCustomer = true;
      customerSortOrder = true; // A-Z 升序
      break;
    case "customer_name_desc":
      sortByCustomer = true;
      customerSortOrder = false; // Z-A 降序
      break;
    // 新增商品內容排序處理
    case "product_content_asc":
      sortByProductContent = true;
      productContentSortOrder = true; // A-Z 升序
      break;
    case "product_content_desc":
      sortByProductContent = true;
      productContentSortOrder = false; // Z-A 降序
      break;
    default: // created_at_desc
      sortColumn = "created_at";
      sortOrder = false;
  }
  
  // 獲取報價單基礎資料
  const { data: quotes, error } = await sb.from("quotations")
    .select("*")
    .order(sortColumn, { ascending: sortOrder });

  if (error || !quotes) { 
    quoteList.innerHTML = "<tr><td colspan='6' class='text-center'>載入失敗</td></tr>"; 
    return; 
  }

  // 預先加載所有客戶資料（優化效能，避免重複查詢）
  const { data: allCustomers } = await sb.from("customers").select("id,name");
  const customerMap = {};
  allCustomers.forEach(cust => {
    customerMap[cust.id] = cust.name || "未知客戶";
  });

  // 預先加載所有報價單對應的商品內容
  const quoteProductMap = {};
  for (const q of quotes) {
    const { data: items } = await sb.from("quotation_items")
      .select("product_name")
      .eq("quotation_id", q.id);
    quoteProductMap[q.id] = items?.map(i => i.product_name).join("、") || "無商品";
  }

  // 處理排序（客戶/商品內容）
  let sortedQuotes = [...quotes];
  if (sortByCustomer) {
    // 按客戶名稱排序
    sortedQuotes.sort((a, b) => {
      const nameA = (customerMap[a.customer_id] || "未知客戶").toLowerCase();
      const nameB = (customerMap[b.customer_id] || "未知客戶").toLowerCase();
      return customerSortOrder 
        ? nameA.localeCompare(nameB, 'zh-TW') 
        : nameB.localeCompare(nameA, 'zh-TW');
    });
  } else if (sortByProductContent) {
    // 按商品內容排序
    sortedQuotes.sort((a, b) => {
      const contentA = quoteProductMap[a.id].toLowerCase();
      const contentB = quoteProductMap[b.id].toLowerCase();
      return productContentSortOrder
        ? contentA.localeCompare(contentB, 'zh-TW')
        : contentB.localeCompare(contentA, 'zh-TW');
    });
  }

  // 生成表格內容
  let rows = [];
  for (const q of sortedQuotes) {
    const custName = (customerMap[q.customer_id] || "").toLowerCase();
    const productText = quoteProductMap[q.id];
    // 搜尋匹配邏輯不變
    const match = !kw || q.quote_no.includes(kw) || custName.includes(kw) || productText.toLowerCase().includes(kw) || (q.status||"").toLowerCase().includes(kw);

    if (match) {
      rows.push(`<tr>
        <td><input type="checkbox" class="quote-checkbox" value="${q.id}"></td>
        <td>${q.quote_no}</td>
        <!-- 新增報價日期欄位 -->
        <td>${q.quote_date || "-"}</td>
        <td>${customerMap[q.customer_id] || "-"}</td>
        <td>${productText}</td>
        <td>${q.status || "待確認"}</td>
        <td>
          <button class='btn btn-sm btn-info' onclick='viewQuote("${q.id}")'>檢</button>
          <button class='btn btn-sm btn-warning' onclick='editQuote("${q.id}")'>編</button>
          <button class='btn btn-sm btn-danger' onclick='delQuote("${q.id}")'>刪</button>
        </td>
      </tr>`);
    }
  }
  quoteList.innerHTML = rows.join("") || "<tr><td colspan='7' class='text-center'>無資料</td></tr>"; // 注意 colspan 從 6 改為 7
}

  const totalAmount = items.reduce((sum, it) => sum + it.sub, 0);
  const totalCost = items.reduce((sum, it) => sum + (it.qty * it.cost), 0);
  const totalProfit = items.reduce((sum, it) => sum + (it.sub - (it.qty * it.cost)), 0);
  
  const { data: quote, error } = await sb.from("quotations").insert([{

    total_cost: totalCost,
    total_profit: totalProfit,
    user_id: uid()
  }]).select();
  
  if (error || !quote) { 
    console.error("報價單主表儲存失敗：", error); 
    alert("報價單儲存失敗：" + error.message); 
    return;

  const quoteItems = items.map(it => ({

    product_name: it.name,

    quantity: parseInt(it.qty),
    unit_price: parseFloat(it.price),
    cost: parseFloat(it.cost),
    subtotal: parseFloat(it.sub),

  }));

  const { error: itemError } = await sb.from("quotation_items").insert(quoteItems);
  
  if (itemError) { 
    console.error("報價明細儲存失敗：", itemError); 
    alert("商品明細儲存失敗：" + itemError.message); 
    return;

  alert("儲存成功！");

  loadQuotes();
}

    <div style="max-height:400px;overflow-y:auto">
      <table class="table table-sm table-bordered">
        <thead class="table-light">
          <tr>
            <th>報價日期</th><th>客戶</th><th>商品</th><th>數量</th><th>單位</th><th>單價</th><th>小計</th><th>利潤</th><th>單號</th>
          </tr>
        </thead>
        <tbody id="historyBody"></tbody>
      </table>
    </div>
  </div>`,true);
}

function clearSearchFields() {
  document.getElementById("searchProduct").value = "";
  document.getElementById("searchDate").value = "";
  document.getElementById("searchCustomer").value = "";
  document.getElementById("historyBody").innerHTML = "";
}

async function batchDeleteQuotes() {
  const selectedCheckboxes = document.querySelectorAll(".quote-checkbox:checked");
  if (selectedCheckboxes.length === 0) {
    alert("請至少選擇一筆報價單！");
    return;
  }

  const confirmDelete = confirm(`確定要刪除選取的 ${selectedCheckboxes.length} 筆報價單嗎？\n刪除後無法復原！`);
  if (!confirmDelete) return;

  try {
    const selectedIds = Array.from(selectedCheckboxes).map(checkbox => checkbox.value);
    
    for (const id of selectedIds) {
      await sb.from("quotation_items").delete().eq("quotation_id", id);
      await sb.from("quotations").delete().eq("id", id);
    }

    alert(`成功刪除 ${selectedCheckboxes.length} 筆報價單！`);
    loadQuotes();
    document.getElementById("selectAllQuotes").checked = false;
  } catch (error) {
    console.error("批次刪除失敗：", error);
    alert("刪除失敗！請稍後再試或檢查網路連線。");
  }
}

async function loadProductHistory(){
  const productKeyword = document.getElementById("searchProduct").value.trim().toLowerCase();
  const dateKeyword = document.getElementById("searchDate").value;
  const customerKeyword = document.getElementById("searchCustomer").value.trim().toLowerCase();
  
  if(!productKeyword && !dateKeyword && !customerKeyword){
    alert("請至少輸入一個搜尋條件（商品名稱、報價日期、客戶名稱）");
    return;
  }

  const b=document.getElementById("historyBody");
  b.innerHTML="<tr><td colspan='9' class='text-center'>查詢中...</td></tr>";

  try {
    let query = sb.from("quotation_items").select(`
      product_name,unit,unit_price,quantity,subtotal,profit,
      quotations(quote_no,quote_date,customer_id)
    `);
    
    if(productKeyword){
      query = query.ilike("product_name", `%${productKeyword}%`);
    }

    const {data:items, error} = await query;
    
    if(error || !items){
      b.innerHTML="<tr><td colspan='9' class='text-center'>查無資料</td></tr>";
      return;
    }

    let h="";
    for(const it of items){
      const q=it.quotations;
      if(!q) continue;

      if(dateKeyword && q.quote_date !== dateKeyword){
        continue;
      }

      let custName = "-";
      if(q.customer_id){
        const {data:cust} = await sb.from("customers").select("name").eq("id", q.customer_id).single();
        custName = cust?.name || "-";
        if(customerKeyword && !custName.toLowerCase().includes(customerKeyword)){
          continue;
        }
      }

      h+=`<tr>
        <td>${q.quote_date || "-"}</td>
        <td>${custName}</td>
        <td>${it.product_name}</td>
        <td class="text-end">${it.quantity}</td>
        <td>${it.unit || "-"}</td>
        <td class="text-end">${money(it.unit_price)}</td>
        <td class="text-end">${money(it.subtotal)}</td>
        <td class="text-end">${money(it.profit || 0)}</td>
        <td>${q.quote_no}</td>
      </tr>`;
    }

    b.innerHTML = h || "<tr><td colspan='9' class='text-center'>查無資料</td></tr>";
  } catch (error) {
    console.error("載入歷史報價失敗：", error);
    b.innerHTML="<tr><td colspan='9' class='text-center'>查詢失敗，請稍後再試</td></tr>";
  }
}

// 新增/修正 全選/取消全選 函數
function toggleSelectAllQuotes() {
  // 1. 獲取全選 checkbox（對應報價單表格thead中的checkbox）
  const selectAllCheckbox = document.querySelector("#quote table thead input[type='checkbox']");
  
  // 2. 空值判斷：避免元素不存在時報錯
  if (!selectAllCheckbox) {
    console.warn("全選按鈕未找到");
    return;
  }

  // 3. 切換全選狀態
  const isChecked = !selectAllCheckbox.checked;
  selectAllCheckbox.checked = isChecked;

  // 4. 選中/取消所有報價單的checkbox
  const quoteCheckboxes = document.querySelectorAll(".quote-checkbox");
  quoteCheckboxes.forEach(checkbox => {
    checkbox.checked = isChecked;
  });
}

// 加載所有資料
function loadAll() {
  loadCustomers();
  loadSuppliers();
  loadProducts();
  loadQuotes();
}

// 刪除廠商函數（保留）
async function delSupplier(id){
  if(confirm("確定刪除?")){
    await sb.from("suppliers").delete().eq("id",id);
    loadSuppliers();
  }
}

// 編輯廠商函數（與 openSupplier 合併，保留兼容性）
function editSupplier(id) {
  openSupplier(id);
}
