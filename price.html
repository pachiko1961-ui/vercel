<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>報價單系統</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- 登入介面 -->
<div id="login" class="d-flex vh-100 justify-content-center align-items-center">
  <div class="card p-4" style="width:400px">
    <h3 class="text-center mb-3">登入</h3>
    <input class="form-control mb-2" id="email" placeholder="信箱">
    <input class="form-control mb-2" id="pw" placeholder="密碼" type="password">
    <button class="btn btn-primary w-100 mb-2" onclick="loginFunc()">登入</button>
    <button class="btn btn-outline-secondary w-100" onclick="regFunc()">註冊</button>
  </div>
</div>

<!-- 主程式介面 -->
<div id="app" class="d-none container py-4">
  <div class="d-flex justify-content-between mb-3">
    <h4>報價單系統</h4>
    <button class="btn btn-danger btn-sm" onclick="logoutFunc()">登出</button>
  </div>
  <ul class="nav nav-tabs mb-3">
    <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#cust">客戶</a></li>
    <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#supp">廠商</a></li>
    <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#prod">商品</a></li>
    <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#quote">報價單</a></li>
  </ul>
  <div class="tab-content">
    <div id="cust" class="tab-pane active"></div>
    <div id="supp" class="tab-pane"></div>
    <div id="prod" class="tab-pane"></div>
    <div id="quote" class="tab-pane">
      <button class="btn btn-sm btn-success mb-2" onclick="newQuote()">新增報價單</button>
      <div id="listQuote"></div>
    </div>
  </div>
</div>

<!-- 彈窗 -->
<div class="modal fade" id="md">
  <div class="modal-dialog"><div class="modal-content"><div id="mdBody"></div></div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ============== 填入你的 Supabase 資訊 ==============
const SUPABASE_URL = "https://kqxwjzabeeexqmqjsont.supabase.co";
const SUPABASE_KEY = "sb_publishable_P4N84KRlgvy1n7tn7KPeVw_rNX4Igwm";
// ====================================================

// 初始化（放在最前面，絕對不會報錯）
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const modal = new bootstrap.Modal("#md");
let currentUser = null;

// 頁面載入
window.onload = async () => {
  const { data } = await supabase.auth.getUser();
  if (data.user) {
    currentUser = data.user;
    document.getElementById('login').classList.add('d-none');
    document.getElementById('app').classList.remove('d-none');
  }
};

// 登入
async function loginFunc() {
  const email = document.getElementById('email').value;
  const pw = document.getElementById('pw').value;
  const { error } = await supabase.auth.signInWithPassword({ email, password: pw });
  if (error) alert(error.message);
  else location.reload();
}

// 註冊
function regFunc() {
  document.getElementById("login").innerHTML = `
  <div class="card p-4" style="width:400px">
    <h3>註冊</h3>
    <input class="form-control mb-2" id="regEmail" placeholder="信箱">
    <input class="form-control mb-2" id="regPw" placeholder="密碼">
    <button class="btn btn-success w-100" onclick="doRegFunc()">註冊</button>
  </div>`;
}

async function doRegFunc() {
  const email = document.getElementById('regEmail').value;
  const pw = document.getElementById('regPw').value;
  const { error } = await supabase.auth.signUp({ email, password: pw });
  if (error) alert(error.message);
  else alert("註冊成功！請登入");
}

// 登出
async function logoutFunc() {
  await supabase.auth.signOut();
  location.reload();
}

// 報價單功能
let quoteItems = [];

async function newQuote() {
  // 取得客戶/廠商/商品
  const { data: customers } = await supabase.from("customers").select("id,name");
  const { data: suppliers } = await supabase.from("suppliers").select("id,name");
  const { data: products } = await supabase.from("products").select("*");

  document.getElementById('mdBody').innerHTML = `
  <div class="modal-header"><h5>新增報價單</h5></div>
  <div class="modal-body">
    <input class="form-control mb-2" id="quoteNo" value="Q${Date.now()}" readonly>
    <select class="form-control mb-2" id="customerId">
      ${customers.map(c => `<option value="${c.id}">${c.name}</option>`).join('')}
    </select>
    <select class="form-control mb-2" id="supplierId">
      ${suppliers.map(s => `<option value="${s.id}">${s.name}</option>`).join('')}
    </select>
    <div class="input-group mb-2">
      <input class="form-control" id="pName" placeholder="商品名稱">
      <input class="form-control" id="pQty" value="1" type="number">
      <input class="form-control" id="pPrice" placeholder="單價">
      <button class="btn btn-primary" onclick="addItem()">加入</button>
    </div>
    <div id="itemList"></div>
    <div class="text-end" id="total">總金額：0</div>
  </div>
  <div class="modal-footer"><button class="btn btn-success" onclick="saveQuote()">儲存</button></div>`;
  modal.show();
}

function addItem() {
  const name = document.getElementById('pName').value;
  const qty = Number(document.getElementById('pQty').value);
  const price = Number(document.getElementById('pPrice').value);
  if (!name || !price) return;
  quoteItems.push({ name, qty, price, sub: qty * price });
  calcTotal();
}

function calcTotal() {
  let total = 0;
  let html = "";
  quoteItems.forEach(item => {
    total += item.sub;
    html += `<div>${item.name} x ${item.qty} = ${item.sub}</div>`;
  });
  document.getElementById('itemList').innerHTML = html;
  document.getElementById('total').innerText = "總金額：" + total;
}

// 儲存報價單（有錯必提示）
async function saveQuote() {
  const total = quoteItems.reduce((a, b) => a + b.sub, 0);
  
  // 儲存主檔
  const { data, error } = await supabase.from("quotations").insert([{
    quote_no: document.getElementById('quoteNo').value,
    customer_id: document.getElementById('customerId').value,
    supplier_id: document.getElementById('supplierId').value,
    total_amount: total,
    user_id: currentUser.id
  }]).select();

  if (error) {
    alert("儲存失敗：" + error.message);
    return;
  }

  // 儲存明細
  await supabase.from("quotation_items").insert(
    quoteItems.map(i => ({
      quotation_id: data[0].id,
      product_name: i.name,
      quantity: i.qty,
      unit_price: i.price,
      subtotal: i.sub,
      user_id: currentUser.id
    }))
  );

  alert("儲存成功！");
  modal.hide();
}
</script>
</body>
</html>
