<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>報價管理系統</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .modal-lg { max-width: 900px; }
  </style>
</head>
<body>

<!-- 登入畫面 -->
<div id="loginPanel" class="d-flex vh-100 align-items-center justify-content-center">
  <div class="card p-4 shadow-sm" style="width:400px">
    <h3 class="text-center mb-3">🔐 系統登入</h3>
    <div id="loginForm">
      <input class="form-control mb-2" id="email" placeholder="電子信箱" type="email">
      <input class="form-control mb-2" id="password" placeholder="密碼" type="password">
      <button class="btn btn-primary w-100 mb-2" onclick="login()">登入</button>
      <button class="btn btn-outline-secondary w-100" onclick="showRegister()">註冊</button>
    </div>
  </div>
</div>

<!-- 主系統 -->
<div id="mainPanel" class="container py-3 d-none">
  <div class="d-flex justify-content-between mb-2">
    <h4>📋 報價管理系統</h4>
    <div>
      <span id="userEmail" class="me-2"></span>
      <button class="btn btn-sm btn-danger" onclick="logout()">登出</button>
    </div>
  </div>

  <ul class="nav nav-tabs mb-3">
    <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#cust">客戶</a></li>
    <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#supp">廠商</a></li>
    <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#prod">商品</a></li>
    <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#quote">報價單</a></li>
  </ul>

  <div class="tab-content">
    <!-- 客戶 -->
    <div id="cust" class="tab-pane fade show active">
      <div class="d-flex justify-content-between mb-2">
        <h5>客戶管理</h5>
        <button class="btn btn-sm btn-primary" onclick="openCustomer()">新增</button>
      </div>
      <input class="form-control mb-2" placeholder="搜尋" oninput="loadCustomers()">
      <table class="table table-bordered table-sm"><thead><tr><th>名稱</th><th>聯絡人</th><th>電話</th><th>操作</th></tr></thead><tbody id="custList"></tbody></table>
    </div>

    <!-- 廠商 -->
    <div id="supp" class="tab-pane fade">
      <div class="d-flex justify-content-between mb-2">
        <h5>廠商管理</h5>
        <button class="btn btn-sm btn-primary" onclick="openSupplier()">新增</button>
      </div>
      <input class="form-control mb-2" placeholder="搜尋" oninput="loadSuppliers()">
      <table class="table table-bordered table-sm"><thead><tr><th>名稱</th><th>聯絡人</th><th>電話</th><th>操作</th></tr></thead><tbody id="suppList"></tbody></table>
    </div>

    <!-- 商品 -->
    <div id="prod" class="tab-pane fade">
      <div class="d-flex justify-content-between mb-2">
        <h5>商品管理</h5>
        <button class="btn btn-sm btn-primary" onclick="openProduct()">新增</button>
      </div>
      <input class="form-control mb-2" placeholder="搜尋" oninput="loadProducts()">
      <table class="table table-bordered table-sm"><thead><tr><th>代號</th><th>名稱</th><th>單位</th><th>售價</th><th>操作</th></tr></thead><tbody id="prodList"></tbody></table>
    </div>

    <!-- 報價單 -->
    <div id="quote" class="tab-pane fade">
      <div class="d-flex justify-content-between mb-2">
        <h5>報價單管理</h5>
        <button class="btn btn-sm btn-success" onclick="openQuote()">新增報價單</button>
      </div>
      <input class="form-control mb-2" placeholder="搜尋" oninput="loadQuotes()">
      <table class="table table-bordered table-sm"><thead><tr><th>單號</th><th>客戶</th><th>廠商</th><th>金額</th><th>狀態</th><th>操作</th></tr></thead><tbody id="quoteList"></tbody></table>
    </div>
  </div>
</div>

<!-- 模態框 -->
<div class="modal fade" id="modal"><div class="modal-dialog" id="mdSize"><div class="modal-content" id="mdBody"></div></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
// ===================== 請填入你的 SUPABASE 資訊 =====================
const SUPABASE_URL = "https://kqxwjzabeeexqmqjsont.supabase.co";
const SUPABASE_KEY = "sb_publishable_P4N84KRlgvy1n7tn7KPeVw_rNX4Igwm";
// ==================================================================

const supabase = supabase.createClient(supabaseUrl, supabaseKey);
const modal = new bootstrap.Modal(document.getElementById('modal'));
let user = null;

window.onload = checkAuth;

// 驗證
async function checkAuth() {
  const { data } = await supabase.auth.getUser();
  if (data.user) {
    user = data.user;
    loginPanel.classList.add('d-none');
    mainPanel.classList.remove('d-none');
    userEmail.textContent = user.email;
    loadAll();
  }
}

async function login() {
  const { error } = await supabase.auth.signInWithPassword({
    email: email.value,
    password: password.value
  });
  if (error) alert("登入錯誤：" + error.message); 
  else location.reload();
}

async function logout() {
  await supabase.auth.signOut();
  location.reload();
}

function showRegister() {
  loginForm.innerHTML = `
    <h5>註冊帳號</h5>
    <input class="form-control mb-2" id="rEmail" type="email" placeholder="信箱">
    <input class="form-control mb-2" id="rPassword" type="password" placeholder="密碼（至少6碼）">
    <button class="btn btn-success w-100 mb-2" onclick="register()">註冊</button>
    <button class="btn w-100 btn-sm" onclick="location.reload()">返回</button>
  `;
}

// 【修正版】註冊函數（有錯一定提示）
async function register() {
  const email = rEmail.value.trim();
  const password = rPassword.value.trim();

  if (!email || !password) {
    alert("請輸入信箱與密碼！");
    return;
  }
  if (password.length < 6) {
    alert("密碼至少6位！");
    return;
  }

  const { data, error } = await supabase.auth.signUp({
    email: email,
    password: password
  });

  if (error) {
    alert("註冊失敗：" + error.message);
  } else {
    alert("註冊成功！現在可以登入");
    location.reload();
  }
}

// 工具
function show(html, lg = false) {
  mdSize.className = lg ? "modal-dialog modal-lg" : "modal-dialog";
  mdBody.innerHTML = html;
  modal.show();
}
function closeModal() { modal.hide(); }
function money(v) { return Number(v || 0).toLocaleString(); }
function uid() { return user.id; }
function quoteNo() {
  const d = new Date();
  const y = d.getFullYear().toString().slice(2);
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const r = Math.floor(1000 + Math.random() * 9000);
  return `Q${y}${m}${r}`;
}

// 客戶
async function loadCustomers() {
  const kw = document.querySelector("#cust input").value;
  const { data } = await supabase.from("customers").select("*").ilike('name', `%${kw}%`).order('created_at', { ascending: false });
  let h = "";
  data.forEach(i => h += `<tr><td>${i.name}</td><td>${i.contact_person || "-"}</td><td>${i.phone || "-"}</td><td>
    <button class='btn btn-sm btn-warning' onclick='editCustomer("${i.id}")'>編</button>
    <button class='btn btn-sm btn-danger' onclick='delCustomer("${i.id}")'>刪</button>
  </td></tr>`);
  custList.innerHTML = h;
}
function openCustomer(id) {
  show(`<div class="modal-header"><h5>${id ? "編輯" : "新增"}客戶</h5><button class="btn-close" onclick="closeModal()"></button></div>
  <div class="modal-body">
    <input class="form-control mb-2" id="c_name" placeholder="名稱">
    <input class="form-control mb-2" id="c_contact" placeholder="聯絡人">
    <input class="form-control mb-2" id="c_phone" placeholder="電話">
    <textarea class="form-control" id="c_addr" placeholder="地址"></textarea>
  </div>
  <div class="modal-footer"><button class="btn btn-primary" onclick="${id ? `updateCustomer('${id}')` : 'saveCustomer()'}">儲存</button></div>`);
  if (id) supabase.from("customers").select("*").eq("id", id).single().then(r => {
    c_name.value = r.data.name;
    c_contact.value = r.data.contact_person || "";
    c_phone.value = r.data.phone || "";
    c_addr.value = r.data.address || "";
  });
}
async function saveCustomer() {
  await supabase.from("customers").insert([{
    name: c_name.value, contact_person: c_contact.value, phone: c_phone.value, address: c_addr.value, user_id: uid()
  }]);
  closeModal(); loadCustomers();
}
async function updateCustomer(id) {
  await supabase.from("customers").update({
    name: c_name.value, contact_person: c_contact.value, phone: c_phone.value, address: c_addr.value
  }).eq("id", id);
  closeModal(); loadCustomers();
}
async function delCustomer(id) {
  if (confirm("確定刪除?")) {
    await supabase.from("customers").delete().eq("id", id);
    loadCustomers();
  }
}

// 廠商
async function loadSuppliers() {
  const kw = document.querySelector("#supp input").value;
  const { data } = await supabase.from("suppliers").select("*").ilike('name', `%${kw}%`).order('created_at', { ascending: false });
  let h = "";
  data.forEach(i => h += `<tr><td>${i.name}</td><td>${i.contact_person || "-"}</td><td>${i.phone || "-"}</td><td>
    <button class='btn btn-sm btn-warning' onclick='editSupplier("${i.id}")'>編</button>
    <button class='btn btn-sm btn-danger' onclick='delSupplier("${i.id}")'>刪</button>
  </td></tr>`);
  suppList.innerHTML = h;
}
function openSupplier(id) {
  show(`<div class="modal-header"><h5>${id ? "編輯" : "新增"}廠商</h5><button class="btn-close" onclick="closeModal()"></button></div>
  <div class="modal-body">
    <input class="form-control mb-2" id="s_name" placeholder="名稱">
    <input class="form-control mb-2" id="s_contact" placeholder="聯絡人">
    <input class="form-control mb-2" id="s_phone" placeholder="電話">
    <textarea class="form-control" id="s_addr" placeholder="地址"></textarea>
  </div>
  <div class="modal-footer"><button class="btn btn-primary" onclick="${id ? `updateSupplier('${id}')` : 'saveSupplier()'}">儲存</button></div>`);
  if (id) supabase.from("suppliers").select("*").eq("id", id).single().then(r => {
    s_name.value = r.data.name;
    s_contact.value = r.data.contact_person || "";
    s_phone.value = r.data.phone || "";
    s_addr.value = r.data.address || "";
  });
}
async function saveSupplier() {
  await supabase.from("suppliers").insert([{
    name: s_name.value, contact_person: s_contact.value, phone: s_phone.value, address: s_addr.value, user_id: uid()
  }]);
  closeModal(); loadSuppliers();
}
async function updateSupplier(id) {
  await supabase.from("suppliers").update({
    name: s_name.value, contact_person: s_contact.value, phone: s_phone.value, address: s_addr.value
  }).eq("id", id);
  closeModal(); loadSuppliers();
}
async function delSupplier(id) {
  if (confirm("確定刪除?")) {
    await supabase.from("suppliers").delete().eq("id", id);
    loadSuppliers();
  }
}

// 商品
async function loadProducts() {
  const kw = document.querySelector("#prod input").value;
  const { data } = await supabase.from("products").select("*").or(`product_code.ilike.%${kw}%,product_name.ilike.%${kw}%`).order('created_at', { ascending: false });
  let h = "";
  data.forEach(i => h += `<tr><td>${i.product_code}</td><td>${i.product_name}</td><td>${i.unit}</td><td>${money(i.sale_price)}</td><td>
    <button class='btn btn-sm btn-warning' onclick='editProduct("${i.id}")'>編</button>
    <button class='btn btn-sm btn-danger' onclick='delProduct("${i.id}")'>刪</button>
  </td></tr>`);
  prodList.innerHTML = h;
}
function openProduct(id) {
  show(`<div class="modal-header"><h5>${id ? "編輯" : "新增"}商品</h5><button class="btn-close" onclick="closeModal()"></button></div>
  <div class="modal-body">
    <input class="form-control mb-2" id="p_code" placeholder="商品代號">
    <input class="form-control mb-2" id="p_name" placeholder="名稱">
    <input class="form-control mb-2" id="p_unit" placeholder="單位">
    <input class="form-control mb-2" id="p_price" type="number" placeholder="售價">
    <textarea class="form-control" id="p_remark" placeholder="備註"></textarea>
  </div>
  <div class="modal-footer"><button class="btn btn-primary" onclick="${id ? `updateProduct('${id}')` : 'saveProduct()'}">儲存</button></div>`);
  if (id) supabase.from("products").select("*").eq("id", id).single().then(r => {
    p_code.value = r.data.product_code;
    p_name.value = r.data.product_name;
    p_unit.value = r.data.unit;
    p_price.value = r.data.sale_price;
    p_remark.value = r.data.remark || "";
  });
}
async function saveProduct() {
  await supabase.from("products").insert([{
    product_code: p_code.value, product_name: p_name.value, unit: p_unit.value, sale_price: p_price.value, remark: p_remark.value, user_id: uid()
  }]);
  closeModal(); loadProducts();
}
async function updateProduct(id) {
  await supabase.from("products").update({
    product_code: p_code.value, product_name: p_name.value, unit: p_unit.value, sale_price: p_price.value, remark: p_remark.value
  }).eq("id", id);
  closeModal(); loadProducts();
}
async function delProduct(id) {
  if (confirm("確定刪除?")) {
    await supabase.from("products").delete().eq("id", id);
    loadProducts();
  }
}

// 報價單
let items = [];
async function loadQuotes() {
  const kw = document.querySelector("#quote input").value;
  const { data } = await supabase.from("quotations").select(`*,customers(name),suppliers(name)`).ilike('quote_no', `%${kw}%`).order('created_at', { ascending: false });
  let h = "";
  data.forEach(i => h += `<tr><td>${i.quote_no}</td><td>${i.customers?.name || "-"}</td><td>${i.suppliers?.name || "-"}</td><td>${money(i.total_amount)}</td><td>${i.status}</td><td>
    <button class='btn btn-sm btn-info' onclick='viewQuote("${i.id}")'>檢</button>
    <button class='btn btn-sm btn-danger' onclick='delQuote("${i.id}")'>刪</button>
  </td></tr>`);
  quoteList.innerHTML = h;
}
async function openQuote() {
  items = [];
  const { data: c } = await supabase.from("customers").select("id,name");
  const { data: s } = await supabase.from("suppliers").select("id,name");
  const { data: p } = await supabase.from("products").select("*");
  
  show(`<div class="modal-header"><h5>新增報價單</h5><button class="btn-close" onclick="closeModal()"></button></div>
  <div class="modal-body">
    <div class="row mb-2">
      <div class="col-4"><input class="form-control" id="q_no" value="${quoteNo()}" readonly></div>
      <div class="col-4"><input type="date" class="form-control" id="q_date" value="${new Date().toISOString().split('T')[0]}"></div>
      <div class="col-4"><select class="form-control" id="q_status"><option>待確認</option><option>已成交</option><option>已取消</option></select></div>
    </div>
    <div class="row mb-2">
      <div class="col-6"><select class="form-control" id="q_cust">${c.map(x => `<option value="${x.id}">${x.name}</option>`).join('')}</select></div>
      <div class="col-6"><select class="form-control" id="q_supp">${s.map(x => `<option value="${x.id}">${x.name}</option>`).join('')}</select></div>
    </div>
    <select class="form-control mb-2" onchange="fillProduct()" id="q_prod">
      <option value="">選擇商品</option>
      ${p.map(x => `<option data-price="${x.sale_price}" value="${x.product_name}">${x.product_name}</option>`).join('')}
    </select>
    <div class="input-group mb-2">
      <input class="form-control" id="i_name" placeholder="商品">
      <input class="form-control" id="i_qty" type="number" value="1">
      <input class="form-control" id="i_price" type="number" placeholder="單價">
      <button class="btn btn-primary" onclick="addItem()">加入</button>
    </div>
    <table class="table table-sm"><thead><tr><th>商品</th><th>數量</th><th>單價</th><th>小計</th><th></th></tr></thead><tbody id="itemList"></tbody></table>
    <div class="text-end">總金額：<span id="total">0</span></div>
  </div>
  <div class="modal-footer"><button class="btn btn-success" onclick="saveQuote()">儲存</button></div>`, true);
  renderItems();
}
function fillProduct() {
  const opt = q_prod.options[q_prod.selectedIndex];
  if (opt.value) { i_name.value = opt.value; i_price.value = opt.dataset.price; }
}
function addItem() {
  const name = i_name.value, qty = Number(i_qty.value), price = Number(i_price.value);
  if (!name || !price) return;
  items.push({ name, qty, price, sub: qty * price });
  i_name.value = ""; i_qty.value = 1; i_price.value = "";
  renderItems();
}
function renderItems() {
  let h = "", total = 0;
  items.forEach((it, i) => { total += it.sub; h += `<tr><td>${it.name}</td><td>${it.qty}</td><td>${money(it.price)}</td><td>${money(it.sub)}</td><td><button class='btn btn-sm btn-danger' onclick='delItem(${i})'>刪</button></td></tr>`; });
  itemList.innerHTML = h;
  document.getElementById("total").innerText = money(total);
}
function delItem(i) { items.splice(i, 1); renderItems(); }
async function saveQuote() {
  const total = items.reduce((a, b) => a + b.sub, 0);
  const { data } = await supabase.from("quotations").insert([{
    quote_no: q_no.value,
    customer_id: q_cust.value,
    supplier_id: q_supp.value,
    quote_date: q_date.value,
    status: q_status.value,
    total_amount: total,
    user_id: uid()
  }]).select();
  const qid = data[0].id;
  await supabase.from("quotation_items").insert(items.map(i => ({
    quotation_id: qid,
    product_name: i.name,
    quantity: i.qty,
    unit_price: i.price,
    subtotal: i.sub,
    user_id: uid()
  })));
  closeModal(); loadQuotes();
}
async function viewQuote(id) {
  const { data: q } = await supabase.from("quotations").select(`*,customers(name),suppliers(name)`).eq("id", id).single();
  const { data: i } = await supabase.from("quotation_items").select("*").eq("quotation_id", id);
  let h = ""; i.forEach(x => h += `<tr><td>${x.product_name}</td><td>${x.quantity}</td><td>${money(x.unit_price)}</td><td>${money(x.subtotal)}</td></tr>`);
  show(`<div class="modal-header"><h5>報價單 ${q.quote_no}</h5><button class="btn-close" onclick="closeModal()"></button></div>
  <div class="modal-body">
    <p>客戶：${q.customers.name} / 廠商：${q.suppliers.name}</p>
    <table class="table table-sm">${h}</table>
    <div class="text-end">總金額：${money(q.total_amount)}</div>
  </div>`, true);
}
async function delQuote(id) {
  if (confirm("確定刪除?")) {
    await supabase.from("quotations").delete().eq("id", id);
    loadQuotes();
  }
}

function loadAll() {
  loadCustomers();
  loadSuppliers();
  loadProducts();
  loadQuotes();
}
</script>
</body>
</html>
