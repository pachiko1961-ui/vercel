<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>報價系統</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div id="loginBox" class="d-flex vh-100 justify-content-center align-items-center">
  <div class="card p-4" style="width:420px">
    <h3 class="text-center mb-3">系統登入</h3>
    <input class="form-control mb-2" id="loginEmail" placeholder="信箱">
    <input class="form-control mb-2" id="loginPw" placeholder="密碼" type="password">
    <button class="btn btn-primary w-100 mb-2" onclick="userLogin()">登入</button>
    <button class="btn btn-outline-secondary w-100" onclick="goRegister()">註冊</button>
  </div>
</div>

<div id="mainApp" class="d-none container py-4">
  <h4>報價單系統</h4>
  <button class="btn btn-success mb-3" onclick="createQuote()">新增報價單</button>
</div>

<div class="modal fade" id="commonModal">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div id="modalContent"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ==========================================
// 【唯一要填的地方】
const SUPABASE_URL = "https://kqxwjzabeeexqmqjsont.supabase.co";
const SUPABASE_KEY = "sb_publishable_P4N84KRlgvy1n7tn7KPeVw_rNX4Igwm";
// ==========================================

const client = supabase.createClient(supabaseUrl, supabaseKey);
const myModal = new bootstrap.Modal("#commonModal");
let loginUser = null;

window.onload = async function () {
  const { data } = await client.auth.getUser();
  if (data.user) {
    loginUser = data.user;
    loginBox.classList.add("d-none");
    mainApp.classList.remove("d-none");
  }
};

async function userLogin() {
  const { error } = await client.auth.signInWithPassword({
    email: loginEmail.value,
    password: loginPw.value
  });
  error ? alert(error.message) : location.reload();
}

function goRegister() {
  loginBox.innerHTML = `
  <div class="card p-4">
    <h3>註冊</h3>
    <input class="form-control mb-2" id="regEmail" placeholder="信箱">
    <input class="form-control mb-2" id="regPw" placeholder="密碼">
    <button class="btn btn-success w-100" onclick="userRegister()">註冊</button>
  </div>`;
}

async function userRegister() {
  const { error } = await client.auth.signUp({
    email: regEmail.value,
    password: regPw.value
  });
  error ? alert(error.message) : alert("註冊成功！請登入");
}

function createQuote() {}
</script>
</body>
</html>
