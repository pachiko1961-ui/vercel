<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>新增報價單</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .text-end{text-align:right!important}
    .text-center{text-align:center!important}
  </style>
</head>
<body class="p-3">
<div class="container">
  <div class="card shadow-sm">
    <div class="card-header bg-primary text-white">新增報價單</div>
    <div class="card-body">

      <div class="row mb-3">
        <div class="col-md-3">
          <label class="form-label small">報價單號</label>
          <input class="form-control" id="q_no" readonly>
        </div>
        <div class="col-md-3">
          <label class="form-label small">報價日期</label>
          <input type="date" class="form-control" id="q_date">
        </div>
        <div class="col-md-3">
          <label class="form-label small">客戶</label>
          <select class="form-control" id="cust"></select>
        </div>
        <div class="col-md-3">
          <label class="form-label small">備註</label>
          <textarea class="form-control" id="remark" rows="1"></textarea>
        </div>
      </div>

      <hr>

      <div class="border p-3 mb-3 bg-light rounded">
        <div class="row g-2">
          <div class="col-md-3">
            <input type="text" class="form-control form-control-sm" id="searchProduct" placeholder="搜尋商品">
          </div>
          <div class="col-md-3">
            <select class="form-control form-control-sm" id="productSelect"></select>
          </div>
          <div class="col-md-2">
            <input type="number" class="form-control form-control-sm" id="qty" value="1" min="1" placeholder="數量">
          </div>
          <div class="col-md-2">
            <input type="number" class="form-control form-control-sm" id="price" placeholder="單價" readonly>
          </div>
          <div class="col-md-2">
            <button class="btn btn-primary btn-sm w-100" onclick="addItem()">加入商品</button>
          </div>
        </div>
      </div>

      <table class="table table-bordered table-sm mb-1">
        <thead class="table-light">
          <tr>
            <th>商品名稱</th>
            <th class="text-center">數量</th>
            <th class="text-end">單價</th>
            <th class="text-end">小計</th>
            <th class="text-end">成本</th>
            <th class="text-end">利潤</th>
            <th class="text-center">操作</th>
          </tr>
        </thead>
        <tbody id="itemsBody"></tbody>
      </table>

      <div class="d-flex justify-content-end gap-4 mb-3 p-2 bg-light rounded">
        <div>總金額：<span id="totalAmount">0</span></div>
        <div>總成本：<span id="totalCost">0</span></div>
        <div>總利潤：<span id="totalProfit">0</span></div>
      </div>

      <div class="d-flex justify-content-end gap-2">
        <button class="btn btn-secondary" onclick="location.href='https://vercel-ashy-seven-53.vercel.app/index.html'">返回主選單</button>
        <button class="btn btn-success" onclick="saveQuote()">儲存報價單</button>
      </div>

    </div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://kqxwjzabeeexqmqjsont.supabase.co";
const SUPABASE_KEY = "sb_publishable_P4N84KRlgvy1n7tn7KPeVw_rNX4Igwm";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let items = [];

window.onload = async () => {
  document.getElementById("q_date").value = new Date().toISOString().split("T")[0];
  await genQuoteNo();
  await loadCust();
  await loadProducts();
};

// 金額格式化：千位分隔、無小數
function formatMoney(num) {
  return parseInt(num || 0).toLocaleString('zh-TW');
}

// 報價單號
async function genQuoteNo() {
  const now = new Date();
  const y = now.getFullYear().toString().slice(-2);
  const m = String(now.getMonth()+1).padStart(2,'0');
  const d = String(now.getDate()).padStart(2,'0');
  const prefix = `Q${y}${m}${d}`;

  const { data } = await sb.from("quotations")
    .select("quote_no")
    .like("quote_no", `${prefix}%`);

  let seq = 1;
  if (data?.length) seq = Math.max(...data.map(x=>parseInt(x.quote_no.slice(-2))||0)) +1;
  document.getElementById("q_no").value = prefix + String(seq).padStart(2,'0');
}

// 載入客戶
async function loadCust() {
  const { data } = await sb.from("customers").select("id,name").order("name");
  const sel = document.getElementById("cust");
  sel.innerHTML = `<option value="">請選擇客戶</option>`;
  data?.forEach(i => sel.innerHTML += `<option value="${i.id}">${i.name}</option>`);
}

// 載入商品
async function loadProducts(keyword = '') {
  let q = sb.from("products").select("id,product_code,product_name,unit,sale_price,cost");
  if (keyword) q = q.or(`product_code.ilike.%${keyword}%,product_name.ilike.%${keyword}%`);
  const { data } = await q;
  const sel = document.getElementById("productSelect");
  sel.innerHTML = `<option value="">請選擇商品</option>`;
  data?.forEach(p => {
    sel.innerHTML += `<option value="${p.id}" data-unit="${p.unit}" data-price="${p.sale_price}" data-cost="${p.cost}">
      [${p.product_code}] ${p.product_name}
    </option>`;
  });
  sel.onchange = () => {
    const opt = sel.options[sel.selectedIndex];
    if (opt.value) {
      document.getElementById("price").value = opt.dataset.price;
    }
  };
}

// 搜尋商品
document.getElementById("searchProduct").oninput = (e) => loadProducts(e.target.value);

// 加入商品（加入後清空搜尋框）
function addItem() {
  const sel = document.getElementById("productSelect");
  const qty = parseInt(document.getElementById("qty").value) || 1;
  const price = parseFloat(document.getElementById("price").value) || 0;

  if (!sel.value) { alert("請選擇商品"); return; }
  if (price <= 0) { alert("請輸入單價"); return; }

  const opt = sel.options[sel.selectedIndex];
  const product_name = opt.text.split('] ')[1] || opt.text;
  const unit = opt.dataset.unit || '';
  const cost = parseFloat(opt.dataset.cost) || 0;

  const subtotal = Math.round(qty * price);
  const costTotal = Math.round(qty * cost);
  const profit = Math.round(subtotal - costTotal);

  items.push({
    product_name, unit, quantity: qty,
    unit_price: Math.round(price), cost: Math.round(cost), subtotal, costTotal, profit
  });

  renderItems();
  document.getElementById("qty").value = 1;

  // ✅ 加入商品後清空「商品搜尋/代號」輸入框
  document.getElementById("searchProduct").value = "";
  // 同時清空商品下拉選單
  document.getElementById("productSelect").selectedIndex = 0;
  document.getElementById("price").value = "";
}

// 排序：上移
function moveUp(index) {
  if (index === 0) return;
  [items[index], items[index-1]] = [items[index-1], items[index]];
  renderItems();
}

// 排序：下移
function moveDown(index) {
  if (index === items.length - 1) return;
  [items[index], items[index+1]] = [items[index+1], items[index]];
  renderItems();
}

// 渲染
function renderItems() {
  const b = document.getElementById("itemsBody");
  b.innerHTML = '';
  
  items.forEach((it, i) => {
    b.innerHTML += `
    <tr>
      <td>${it.product_name}</td>
      <td class="text-center">${it.quantity}</td>
      <td class="text-end">${formatMoney(it.unit_price)}</td>
      <td class="text-end">${formatMoney(it.subtotal)}</td>
      <td class="text-end">${formatMoney(it.costTotal)}</td>
      <td class="text-end">${formatMoney(it.profit)}</td>
      <td class="text-center">
        <button class="btn btn-sm btn-outline-primary me-1" onclick="moveUp(${i})">↑</button>
        <button class="btn btn-sm btn-outline-primary me-1" onclick="moveDown(${i})">↓</button>
        <button class="btn btn-sm btn-danger" onclick="delItem(${i})">刪</button>
      </td>
    </tr>`;
  });

  const totalAmount = items.reduce((a,b)=>a+b.subtotal,0);
  const totalCost = items.reduce((a,b)=>a+b.costTotal,0);
  const totalProfit = items.reduce((a,b)=>a+b.profit,0);

  document.getElementById("totalAmount").innerText = formatMoney(totalAmount);
  document.getElementById("totalCost").innerText = formatMoney(totalCost);
  document.getElementById("totalProfit").innerText = formatMoney(totalProfit);
}

// 刪除商品
function delItem(i) {
  items.splice(i, 1);
  renderItems();
}

// 儲存（不跳頁）
async function saveQuote() {
  const quote_no = document.getElementById("q_no").value;
  const quote_date = document.getElementById("q_date").value;
  const customer_id = document.getElementById("cust").value;
  const remark = document.getElementById("remark").value;
  const total = items.reduce((a,b)=>a+b.subtotal,0);

  if (!quote_no || !quote_date || !customer_id || items.length === 0) {
    alert("請填寫完整資訊並加入商品");
    return;
  }

  try {
    const { data: h, error: e1 } = await sb.from("quotations").insert([{
      quote_no, quote_date, customer_id, total_amount: total, remark
    }]).select();
    if (e1) throw e1;

    const details = items.map(it => ({
      quotation_id: h[0].id,
      product_name: it.product_name,
      quantity: it.quantity,
      unit: it.unit,
      unit_price: it.unit_price,
      cost: it.cost,
      subtotal: it.subtotal
    }));

    const { error: e2 } = await sb.from("quotation_items").insert(details);
    if (e2) throw e2;

    alert("✅ 儲存成功！");
    items = [];
    renderItems();
    document.getElementById("remark").value = "";
    await genQuoteNo();

  } catch (e) {
    console.error(e);
    alert("❌ 儲存失敗：" + e.message);
  }
}
</script>
</body>
</html>
