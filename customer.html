<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客戶管理系統 (Supabase 雲端版)</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:微軟正黑體}
        body{background:#f5f7fa;padding:20px}
        .container{max-width:1000px;margin:0 auto;background:white;padding:25px;border-radius:10px;box-shadow:0 2px 10px #0000001a}
        h1{text-align:center;color:#333;margin-bottom:25px}
        .form{background:#f8f9fa;padding:20px;border-radius:8px;margin-bottom:25px}
        .form-group{display:flex;gap:15px;flex-wrap:wrap;margin-bottom:15px}
        .item{flex:1;min-width:220px}
        label{display:block;margin-bottom:5px;font-weight:bold}
        input{width:100%;padding:10px;border:1px solid #ddd;border-radius:5px}
        .btn{padding:10px 20px;border:none;border-radius:5px;cursor:pointer}
        .btn-save{background:#0ea5e9;color:white}
        .btn-edit{background:#10b981;color:white;margin-right:5px}
        .btn-del{background:#ef4444;color:white}
        .search{margin-bottom:15px}
        #search{width:100%;padding:10px;border-radius:5px;border:1px solid #ddd}
        table{width:100%;border-collapse:collapse}
        th,td{padding:12px;text-align:left;border-bottom:1px solid #eee}
        th{background:#1f2937;color:white}
    </style>
</head>
<body>

<div class="container">
    <h1>客戶管理系統（Supabase）</h1>

    <div class="form">
        <input type="hidden" id="editId">
        <div class="form-group">
            <div class="item"><label>客戶姓名</label><input id="name" placeholder="必填"></div>
            <div class="item"><label>連絡電話</label><input id="phone" placeholder="必填"></div>
        </div>
        <div class="form-group">
            <div class="item"><label>公司名稱</label><input id="company"></div>
            <div class="item"><label>通訊地址</label><input id="address"></div>
        </div>
        <button class="btn btn-save" onclick="saveCustomer()">儲存</button>
    </div>

    <div class="search"><input id="search" placeholder="搜尋姓名/電話/公司" oninput="loadList()"></div>

    <table>
        <thead>
            <tr><th>姓名</th><th>電話</th><th>公司</th><th>地址</th><th>操作</th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<!-- 載入 Supabase 套件 -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// ====================== 請填入你的金鑰 ======================
const SUPABASE_URL = "kqxwjzabeeexqmqjsont";
const SUPABASE_KEY = "sb_publishable_P4N84KRlgvy1n7tn7KPeVw_rNX4Igwm";
// ==========================================================

const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 儲存（新增/編輯）
async function saveCustomer() {
    const id = document.getElementById('editId').value;
    const name = document.getElementById('name').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const company = document.getElementById('company').value.trim();
    const address = document.getElementById('address').value.trim();

    if (!name || !phone) { alert('請填姓名與電話'); return; }

    const data = { name, phone, company, address };

    if (id) {
        await supabase.from('customers').update(data).eq('id', id);
        alert('修改完成');
    } else {
        await supabase.from('customers').insert([data]);
        alert('新增完成');
    }

    clearForm();
    loadList();
}

// 讀取客戶列表
async function loadList() {
    const keyword = document.getElementById('search').value.toLowerCase();
    let { data: list } = await supabase.from('customers').select('*').order('id', { ascending: false });

    const filtered = list.filter(c =>
        c.name.toLowerCase().includes(keyword) ||
        c.phone.toLowerCase().includes(keyword) ||
        (c.company && c.company.toLowerCase().includes(keyword))
    );

    const html = filtered.map(c => `
        <tr>
            <td>${c.name}</td>
            <td>${c.phone}</td>
            <td>${c.company || '-'}</td>
            <td>${c.address || '-'}</td>
            <td>
                <button class="btn btn-edit" onclick="edit('${c.id}','${c.name}','${c.phone}','${c.company}','${c.address}')">編輯</button>
                <button class="btn btn-del" onclick="del(${c.id})">刪除</button>
            </td>
        </tr>
    `).join('');

    document.getElementById('tableBody').innerHTML = html;
}

// 編輯
function edit(id, name, phone, company, address) {
    document.getElementById('editId').value = id;
    document.getElementById('name').value = name;
    document.getElementById('phone').value = phone;
    document.getElementById('company').value = company;
    document.getElementById('address').value = address;
}

// 刪除
async function del(id) {
    if (!confirm('確定刪除？')) return;
    await supabase.from('customers').delete().eq('id', id);
    loadList();
}

// 清空表單
function clearForm() {
    document.getElementById('editId').value = '';
    document.getElementById('name').value = '';
    document.getElementById('phone').value = '';
    document.getElementById('company').value = '';
    document.getElementById('address').value = '';
}

// 頁面啟動
window.onload = loadList;
</script>
</body>
</html>
