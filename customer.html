<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客戶管理系統</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:微軟正黑體}
        body{background:#f5f7fa;padding:20px}
        .container{max-width:1000px;margin:0 auto;background:white;padding:25px;border-radius:10px;box-shadow:0 2px 10px #0000001a}
        h1{text-align:center;color:#333;margin-bottom:25px}
        .form{background:#f8f9fa;padding:20px;border-radius:8px;margin-bottom:25px}
        .form-group{display:flex;gap:15px;flex-wrap:wrap;margin-bottom:15px}
        .item{flex:1;min-width:220px}
        label{display:block;margin-bottom:5px;font-weight:bold}
        input{width:100%;padding:10px;border:1px solid #ddd;border-radius:5px}
        .btn{padding:10px 20px;border:none;border-radius:5px;cursor:pointer}
        .btn-save{background:#0ea5e9;color:white}
        .btn-edit{background:#10b981;color:white;margin-right:5px}
        .btn-del{background:#ef4444;color:white}
        .search{margin-bottom:15px}
        #search{width:100%;padding:10px;border-radius:5px;border:1px solid #ddd}
        table{width:100%;border-collapse:collapse}
        th,td{padding:12px;text-align:left;border-bottom:1px solid #eee}
        th{background:#1f2937;color:white}
    </style>
</head>
<body>

<div class="container">
    <h1>客戶管理系統</h1>

    <div class="form">
        <input type="hidden" id="editId" value="">
        <div class="form-group">
            <div class="item"><label>客戶姓名</label><input id="name" placeholder="必填"></div>
            <div class="item"><label>連絡電話</label><input id="phone" placeholder="必填"></div>
        </div>
        <div class="form-group">
            <div class="item"><label>公司名稱</label><input id="company"></div>
            <div class="item"><label>通訊地址</label><input id="address"></div>
        </div>
        <button class="btn btn-save" onclick="saveCustomer()">儲存</button>
    </div>

    <div class="search"><input id="search" placeholder="搜尋姓名/電話/公司" oninput="loadList()"></div>

    <table>
        <thead>
            <tr><th>姓名</th><th>電話</th><th>公司</th><th>地址</th><th>操作</th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ====================== 已經幫你填好你的金鑰 ======================
const SUPABASE_URL = "https://kqxwjzabeeexqmqjsont.supabase.co";
const SUPABASE_KEY = "sb_publishable_P4N84KRlgvy1n7tn7KPeVw_rNX4Igwm";
// =================================================================

let supabaseClient;

window.onload = function() {
    supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    loadList();
};

async function saveCustomer() {
    let editId = document.getElementById('editId').value.trim();
    let name = document.getElementById('name').value.trim();
    let phone = document.getElementById('phone').value.trim();
    let company = document.getElementById('company').value.trim();
    let address = document.getElementById('address').value.trim();

    if (!name || !phone) {
        alert('請填寫姓名與聯絡電話');
        return;
    }

    let postData = { name, phone, company, address };

    try {
        if (editId) {
            const { error } = await supabaseClient
                .from('customers')
                .update(postData)
                .eq('id', parseInt(editId));
            if (error) throw error;
            alert('修改成功');
        } else {
            const { error } = await supabaseClient
                .from('customers')
                .insert([postData]);
            if (error) throw error;
            alert('新增成功');
        }
        clearForm();
        loadList();
    } catch (err) {
        alert('錯誤：' + err.message);
        console.log(err);
    }
}

async function loadList() {
    if (!supabaseClient) return;

    let key = document.getElementById('search').value.toLowerCase();
    const { data, error } = await supabaseClient
        .from('customers')
        .select('*')
        .order('id', { ascending: false });

    if (error) return;

    let list = data;
    if (key) {
        list = list.filter(item =>
            item.name.toLowerCase().includes(key) ||
            item.phone.toLowerCase().includes(key) ||
            (item.company && item.company.toLowerCase().includes(key))
        );
    }

    let html = '';
    list.forEach(item => {
        html += `<tr>
            <td>${item.name}</td>
            <td>${item.phone}</td>
            <td>${item.company || '-'}</td>
            <td>${item.address || '-'}</td>
            <td>
                <button class="btn btn-edit" onclick="editInfo(${item.id})">編輯</button>
                <button class="btn btn-del" onclick="delInfo(${item.id})">刪除</button>
            </td>
        </tr>`;
    });
    document.getElementById('tableBody').innerHTML = html;
}

async function editInfo(id) {
    const { data } = await supabaseClient
        .from('customers')
        .select('*')
        .eq('id', id)
        .single();

    if (!data) return;
    document.getElementById('editId').value = data.id;
    document.getElementById('name').value = data.name;
    document.getElementById('phone').value = data.phone;
    document.getElementById('company').value = data.company;
    document.getElementById('address').value = data.address;
}

async function delInfo(id) {
    if (!confirm('確定刪除？')) return;
    await supabaseClient.from('customers').delete().eq('id', id);
    loadList();
}

function clearForm() {
    document.getElementById('editId').value = '';
    document.getElementById('name').value = '';
    document.getElementById('phone').value = '';
    document.getElementById('company').value = '';
    document.getElementById('address').value = '';
}
</script>
</body>
</html>
