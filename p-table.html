<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>規格表管理</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .spec-btn {
      width: 100%;
      height: 120px;
      white-space: normal;
      word-wrap: break-word;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }
    .edit-modal .form-control {
      margin-bottom: 10px;
    }
    .btn-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
      width: 100%;
    }
    /* 響應式調整：不同螢幕尺寸自動調整列數 */
    @media (max-width: 576px) {
      .btn-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .spec-btn {
        height: 100px;
      }
    }
    @media (min-width: 577px) and (max-width: 992px) {
      .btn-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }
    @media (min-width: 993px) {
      .btn-grid {
        grid-template-columns: repeat(5, 1fr);
      }
    }
  </style>
</head>
<body class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3>📋 規格表管理</h3>
    <button class="btn btn-sm btn-outline-secondary" onclick="logout()">返回系統</button>
  </div>

  <!-- 響應式按鈕網格 - 顯示所有按鈕 -->
  <div class="mb-4">
    <div id="specGrid" class="btn-grid"></div>
  </div>

  <!-- 編輯按鈕的彈窗 -->
  <div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content edit-modal">
        <div class="modal-header">
          <h5 class="modal-title" id="modalTitle">編輯按鈕 #1</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="btnId">
          <div class="mb-2">
            <label class="form-label">按鈕名稱</label>
            <input type="text" class="form-control" id="btnName" placeholder="輸入按鈕顯示名稱">
          </div>
          <div class="mb-2">
            <label class="form-label">按鈕內容</label>
            <textarea class="form-control" id="btnContent" rows="3" placeholder="輸入按鈕詳細內容"></textarea>
          </div>
          <div class="mb-2">
            <label class="form-label">連結網址</label>
            <input type="url" class="form-control" id="btnUrl" placeholder="輸入完整網址 (http://...)">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
          <button type="button" class="btn btn-primary" onclick="saveButtonData()">儲存</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    // ===================== 請填入你的 SUPABASE 資訊 =====================
    const SUPABASE_URL = "https://kqxwjzabeeexqmqjsont.supabase.co";
    const SUPABASE_KEY = "sb_publishable_P4N84KRlgvy1n7tn7KPeVw_rNX4Igwm";
    // ==================================================================

    // 初始化Supabase
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const editModal = new bootstrap.Modal(document.getElementById('editModal'));
    let currentUser = null;

    // 頁面加載時驗證使用者並載入規格表
    window.onload = async () => {
      await checkAuth();
      await initSpecTable();
    };

    // 驗證使用者身份
    async function checkAuth() {
      const { data } = await sb.auth.getUser();
      if (!data.user) {
        alert("請先登入系統！");
        window.close(); // 關閉當前視窗返回登入頁
        return;
      }
      currentUser = data.user;
    }

    // 返回主系統
    function logout() {
      window.close();
    }

    // 初始化按鈕網格 (顯示所有20個按鈕)
    async function initSpecTable() {
      const gridContainer = document.getElementById('specGrid');
      gridContainer.innerHTML = "";

      // 建立20個按鈕 (1-20)
      for (let btnNum = 1; btnNum <= 20; btnNum++) {
        // 建立按鈕元素
        const btn = document.createElement('button');
        btn.className = "btn btn-primary spec-btn";
        btn.id = `specBtn-${btnNum}`;
        
        // 左鍵點擊開啟網址
        btn.onclick = () => openButtonUrl(btnNum);
        // 右鍵點擊開啟編輯彈窗 (阻止預設右鍵選單)
        btn.oncontextmenu = (e) => {
          e.preventDefault();
          openButtonEdit(btnNum);
          return false;
        };
        
        // 載入按鈕資料
        const btnData = await getButtonData(btnNum);
        btn.textContent = btnData?.name || `按鈕 ${btnNum}`;
        
        gridContainer.appendChild(btn);
      }
    }

    // 從Supabase取得按鈕資料
    async function getButtonData(btnNum) {
      try {
        const { data, error } = await sb
          .from("spec_buttons")
          .select("*")
          .eq("button_number", btnNum)
          .eq("user_id", currentUser.id)
          .single();

        if (error && error.code !== "PGRST116") { // PGRST116 = 無資料
          console.error("取得按鈕資料失敗：", error);
        }
        return data || null;
      } catch (err) {
        console.error("取得按鈕資料異常：", err);
        return null;
      }
    }

    // 開啟按鈕編輯彈窗
    async function openButtonEdit(btnNum) {
      // 設定彈窗標題
      document.getElementById('modalTitle').textContent = `編輯按鈕 #${btnNum}`;
      document.getElementById('btnId').value = btnNum;

      // 載入當前按鈕資料
      const btnData = await getButtonData(btnNum);
      document.getElementById('btnName').value = btnData?.name || `按鈕 ${btnNum}`;
      document.getElementById('btnContent').value = btnData?.content || "";
      document.getElementById('btnUrl').value = btnData?.url || "";

      // 開啟彈窗
      editModal.show();
    }

    // 點擊按鈕開啟對應網址
    async function openButtonUrl(btnNum) {
      const btnData = await getButtonData(btnNum);
      if (btnData?.url) {
        // 開啟新視窗跳轉到設定的網址
        window.open(btnData.url, '_blank');
      } else {
        // 若未設定網址，提示使用者並開啟編輯彈窗
        if (confirm("此按鈕尚未設定網址！是否立即設定？")) {
          openButtonEdit(btnNum);
        }
      }
    }

    // 儲存按鈕資料到Supabase
    async function saveButtonData() {
      const btnNum = parseInt(document.getElementById('btnId').value);
      const name = document.getElementById('btnName').value.trim();
      const content = document.getElementById('btnContent').value.trim();
      const url = document.getElementById('btnUrl').value.trim();

      if (!name) {
        alert("請輸入按鈕名稱！");
        return;
      }

      try {
        // 檢查是否已有該按鈕資料
        const existingData = await getButtonData(btnNum);
        
        let response;
        if (existingData) {
          // 更新既有資料
          response = await sb
            .from("spec_buttons")
            .update({ name, content, url, updated_at: new Date().toISOString() })
            .eq("id", existingData.id)
            .eq("user_id", currentUser.id);
        } else {
          // 新增新資料
          response = await sb
            .from("spec_buttons")
            .insert([{
              button_number: btnNum,
              name,
              content,
              url,
              user_id: currentUser.id,
              created_at: new Date().toISOString(),
              updated_at: new Date().toISOString()
            }]);
        }

        if (response.error) {
          throw response.error;
        }

        // 更新畫面按鈕顯示
        document.getElementById(`specBtn-${btnNum}`).textContent = name;
        
        // 關閉彈窗並提示
        editModal.hide();
        alert("儲存成功！");

      } catch (err) {
        console.error("儲存按鈕資料失敗：", err);
        alert("儲存失敗：" + err.message);
      }
    }
  </script>
</body>
</html>
