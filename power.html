<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>引力粒子系統 - 超交互版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: linear-gradient(135deg, #050118, #0a0430, #000000);
            height: 100vh;
            cursor: default;
        }
        #particleCanvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }

        /* 小小的觸發按鈕 */
        #toggleBtn {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: #4a90e2;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            z-index: 999;
            cursor: pointer;
            user-select: none;
        }

        /* 選單面板 - 預設隱藏 */
        .controls {
            position: fixed;
            top: 40px;
            left: 10px;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 6px;
            color: #fff;
            font-family: Arial, sans-serif;
            z-index: 999;
            width: 200px;
            font-size: 11px;
            backdrop-filter: blur(3px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 10px;
            display: none;
        }
        .control-item {
            margin: 6px 0;
        }
        label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 3px;
            font-size: 11px;
        }
        input[type="range"] {
            width: 100%;
            height: 5px;
            accent-color: #4a90e2;
        }
    </style>
</head>
<body>
<canvas id="particleCanvas"></canvas>

<div id="toggleBtn">選項</div>

<div class="controls" id="controlPanel">
    <div class="control-item">
        <label>吸引力：<span id="attractValue">0.06</span></label>
        <input type="range" id="attractSlider" min="0.01" max="0.2" step="0.01" value="0.06">
    </div>
    <div class="control-item">
        <label>排斥力：<span id="repelValue">0.15</span></label>
        <input type="range" id="repelSlider" min="0.05" max="0.3" step="0.01" value="0.15">
    </div>
    <div class="control-item">
        <label>引力範圍：<span id="radiusValue">130</span></label>
        <input type="range" id="radiusSlider" min="50" max="300" step="5" value="130">
    </div>
    <div class="control-item">
        <label>飄浮速度：<span id="speedValue">0.7</span></label>
        <input type="range" id="speedSlider" min="0.1" max="2" step="0.1" value="0.7">
    </div>
    <div class="control-item">
        <label>粒子慣性：<span id="inertiaValue">0.95</span></label>
        <input type="range" id="inertiaSlider" min="0.8" max="0.99" step="0.01" value="0.95">
    </div>
    <div class="control-item">
        <label>連線距離：<span id="lineValue">90</span></label>
        <input type="range" id="lineSlider" min="30" max="200" step="5" value="90">
    </div>
    <div class="control-item">
        <label>粒子數量：<span id="countValue">200</span></label>
        <input type="range" id="countSlider" min="100" max="1000" step="20" value="200">
    </div>
</div>

<script>
    const CONFIG = {
        particleCount: 200,
        attractForce: 0.06,
        repelForce: 0.15,
        mouseRadius: 130,
        particleSpeed: 0.7,
        inertia: 0.95,
        lineDistance: 90
    };

    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    let canvasWidth = window.innerWidth;
    let canvasHeight = window.innerHeight;
    canvas.width = canvasWidth;
    canvas.height = canvasHeight;

    const mouse = {
        x: canvasWidth / 2,
        y: canvasHeight / 2,
        radius: CONFIG.mouseRadius,
        isDown: false
    };

    // 鼠标按下 / 松开
    window.addEventListener('mousedown', () => { mouse.isDown = true; });
    window.addEventListener('mouseup', () => { mouse.isDown = false; });

    // 点击爆炸效果
    window.addEventListener('click', (e) => {
        particles.forEach(p => {
            const dx = p.x - e.clientX;
            const dy = p.y - e.clientY;
            const dist = Math.hypot(dx, dy);
            if (dist < 120) {
                p.vx = (dx / dist) * 3;
                p.vy = (dy / dist) * 3;
            }
        });
    });

    window.addEventListener('mousemove', (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
    });

    window.addEventListener('resize', () => {
        canvasWidth = window.innerWidth;
        canvasHeight = window.innerHeight;
        canvas.width = canvasWidth;
        canvas.height = canvasHeight;
    });

    class Particle {
        constructor() {
            this.x = Math.random() * canvasWidth;
            this.y = Math.random() * canvasHeight;
            this.vx = (Math.random() - 0.5) * CONFIG.particleSpeed;
            this.vy = (Math.random() - 0.5) * CONFIG.particleSpeed;
            this.size = Math.random() * 2.5 + 1.2;
            this.baseSize = this.size;
            this.hue = Math.random() * 360;
            this.color = `hsl(${this.hue}, 100%, 75%)`;
        }

        update() {
            const dx = mouse.x - this.x;
            const dy = mouse.y - this.y;
            const distance = Math.hypot(dx, dy);

            // 鼠标按住 = 超强吸引
            const forceMult = mouse.isDown ? 2.5 : 1;

            if (distance < mouse.radius) {
                const force = (mouse.radius - distance) / mouse.radius;
                
                if (distance > 25) {
                    this.vx += dx * force * CONFIG.attractForce * forceMult;
                    this.vy += dy * force * CONFIG.attractForce * forceMult;
                    this.size = this.baseSize * 1.3;
                } else {
                    this.vx -= dx * force * CONFIG.repelForce;
                    this.vy -= dy * force * CONFIG.repelForce;
                    this.size = this.baseSize * 0.8;
                }
            } else {
                this.size = this.baseSize;
            }

            // 动态变色
            this.hue += 0.3;
            this.color = `hsl(${this.hue}, 100%, 75%)`;

            this.vx *= CONFIG.inertia;
            this.vy *= CONFIG.inertia;
            this.x += this.vx;
            this.y += this.vy;

            if (this.x < 0 || this.x > canvasWidth) this.vx *= -0.8;
            if (this.y < 0 || this.y > canvasHeight) this.vy *= -0.8;
        }

        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.shadowBlur = 18;
            ctx.shadowColor = this.color;
            ctx.fill();
        }
    }

    let particles = [];
    function initParticles() {
        particles = [];
        for (let i = 0; i < CONFIG.particleCount; i++) {
            particles.push(new Particle());
        }
    }

    function connectParticles() {
        ctx.shadowBlur = 0;
        for (let a = 0; a < particles.length; a++) {
            for (let b = a + 1; b < particles.length; b++) {
                const dx = particles[a].x - particles[b].x;
                const dy = particles[a].y - particles[b].y;
                const distance = Math.hypot(dx, dy);
                
                if (distance < CONFIG.lineDistance) {
                    const opacity = 1 - (distance / CONFIG.lineDistance);
                    ctx.strokeStyle = `rgba(255, 255, 255, ${opacity * 0.55})`;
                    ctx.lineWidth = 0.35;
                    ctx.beginPath();
                    ctx.moveTo(particles[a].x, particles[a].y);
                    ctx.lineTo(particles[b].x, particles[b].y);
                    ctx.stroke();
                }
            }
        }
    }

    function animate() {
        ctx.clearRect(0,0,canvasWidth,canvasHeight);
        ctx.fillStyle = 'rgba(5,1,24,0.08)';
        ctx.fillRect(0,0,canvasWidth,canvasHeight);
        
        particles.forEach(p => {
            p.update();
            p.draw();
        });
        
        connectParticles();
        requestAnimationFrame(animate);
    }

    // 顯示 / 隱藏 選單
    const btn = document.getElementById('toggleBtn');
    const panel = document.getElementById('controlPanel');
    let isOpen = false;
    btn.onclick = () => {
        isOpen = !isOpen;
        panel.style.display = isOpen ? 'block' : 'none';
    };

    // 滑桿
    document.getElementById('attractSlider').addEventListener('input', e => {
        CONFIG.attractForce = parseFloat(e.target.value);
        document.getElementById('attractValue').textContent = CONFIG.attractForce.toFixed(2);
    });
    document.getElementById('repelSlider').addEventListener('input', e => {
        CONFIG.repelForce = parseFloat(e.target.value);
        document.getElementById('repelValue').textContent = CONFIG.repelForce.toFixed(2);
    });
    document.getElementById('radiusSlider').addEventListener('input', e => {
        CONFIG.mouseRadius = parseInt(e.target.value);
        mouse.radius = CONFIG.mouseRadius;
        document.getElementById('radiusValue').textContent = CONFIG.mouseRadius;
    });
    document.getElementById('speedSlider').addEventListener('input', e => {
        CONFIG.particleSpeed = parseFloat(e.target.value);
        document.getElementById('speedValue').textContent = CONFIG.particleSpeed.toFixed(1);
    });
    document.getElementById('inertiaSlider').addEventListener('input', e => {
        CONFIG.inertia = parseFloat(e.target.value);
        document.getElementById('inertiaValue').textContent = CONFIG.inertia.toFixed(2);
    });
    document.getElementById('lineSlider').addEventListener('input', e => {
        CONFIG.lineDistance = parseInt(e.target.value);
        document.getElementById('lineValue').textContent = CONFIG.lineDistance;
    });
    document.getElementById('countSlider').addEventListener('input', e => {
        CONFIG.particleCount = parseInt(e.target.value);
        document.getElementById('countValue').textContent = CONFIG.particleCount;
        initParticles();
    });

    initParticles();
    animate();
</script>
</body>
</html>
